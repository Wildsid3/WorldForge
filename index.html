<script>
// === IDB ===
const IDB={_db:null,
open(){return new Promise((r,j)=>{if(this._db)return r(this._db);const q=indexedDB.open('worldforge',3);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};q.onsuccess=e=>{this._db=e.target.result;r(this._db);};q.onerror=e=>j(e);});},
async get(k){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>r(t.result===undefined?null:t.result);t.onerror=e=>j(e);});},
async set(k,v){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>r(true);t.onerror=e=>j(e);});},
async del(k){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').delete(k);t.onsuccess=()=>r(true);t.onerror=e=>j(e);});},
async list(p){const d=await this.open();return new Promise((r,j)=>{const ks=[];const rng=IDBKeyRange.bound(p,p+'\uffff');const t=d.transaction('kv','readonly').objectStore('kv').openCursor(rng);t.onsuccess=e=>{const c=e.target.result;if(c){ks.push(c.key);c.continue();}else r(ks);};t.onerror=e=>j(e);});},
async clear(){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').clear();t.onsuccess=()=>r(true);t.onerror=e=>j(e);});}};

const CARD_TMPL={entity:["characters","organizations"],location:["locations"],notable:["notable-locations","architecture"],system:["magic-technology","politics","economy","languages","education","healthcare","transportation"],culture:["cultures","religion-beliefs","arts-entertainment","food-cuisine","fashion","calendar-time"],event:["history","military","story-elements","cosmology"],creature:["flora-fauna"],geography:["geography"]};
const TMPL_FOR={};Object.entries(CARD_TMPL).forEach(([t,ids])=>ids.forEach(id=>TMPL_FOR[id]=t));

const CAT_RULES=`CATEGORY RULES - follow strictly:
- characters: Named individuals with agency who act and decide.
- locations: Every named place (cities, towns, regions, bodies of water).
- notable-locations: Places with narrative SIGNIFICANCE (capitals, battle sites, holy sites).
- cultures: Shared identity groups (customs, language, values). NOT political structures.
- history: Events that HAPPENED. Tag sub-type: battle/death/revolution/birth/nation-formation/tech-advancement/treaty/disaster.
- politics: Current power structures and governance.
- religion-beliefs: Faith systems, deities, doctrines, clergy.
- organizations: Groups with structure (guilds, factions, orders).
- military: Armed forces, warfare doctrine, standing armies.
- magic-technology: Systems enabling capabilities.
- geography: Physical landscape (mountains, rivers, forests, biomes).
- flora-fauna: Non-person organisms.
- economy: Trade, currency, resources.
- languages: Communication systems, scripts.
CRITICAL: ONLY extract entities EXPLICITLY named in the text. NEVER invent from general knowledge. When uncertain, EXCLUDE.
TIMELINE: If any dates or years are mentioned alongside entities, include "year" field in your response.`;

window.ASPECTS=[
{id:"characters",name:"Characters",icon:"\u{1f464}",topicPrompt:"List every named character mentioned"},
{id:"locations",name:"Locations",icon:"\u{1f3d8}\ufe0f",topicPrompt:"List every named place, city, town, village, region mentioned"},

{id:"economy",name:"Economy",icon:"\u{1f4b0}",topicPrompt:"List every economic system mentioned"},

];

// Subcategories are dynamic — derived from topic.subcategory fields.

// === Template fields per aspect (for template-aware chat) ===
window.ASPECT_FIELDS={

  "healthcare":"Methods, Practitioners, Common Ailments, Magical vs Natural, Access",
};

// === Universe Aspects (6) ===
window.UNIVERSE_ASPECTS=[
{id:"cosmology-planes",name:"Cosmology & Planes",icon:"\u{1f30c}",topicPrompt:"List every cosmic plane, dimension, or realm mentioned"},
{id:"universal-laws",name:"Universal Laws",icon:"\u26a1",topicPrompt:"List every universal law, rule, or fundamental force mentioned"},
{id:"creation-myths",name:"Creation Myths",icon:"\u{1f4dc}",topicPrompt:"List every creation myth or origin story mentioned"},
{id:"overarching-timeline",name:"Overarching Timeline",icon:"\u23f3",topicPrompt:"List every universe-spanning event or epoch mentioned"},
{id:"cross-world-entities",name:"Cross-World Entities",icon:"\u{1f517}",topicPrompt:"List every entity that exists across multiple worlds"},

];

function normTag(t){return t.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');}
function normTags(a){return[...new Set((a||[]).map(normTag).filter(t=>t.length>0))];}
function mkId(){return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);}
function safeArr(v){if(!v)return[];if(Array.isArray(v))return v;if(typeof v==='object')return Object.values(v);return[];}

// === COA (Coat of Arms) Rendering ===
window.coaUrl=function(coa){
  if(!coa)return null;
  try{return"https://armoria.herokuapp.com/?coa="+encodeURIComponent(JSON.stringify(coa));}catch(e){return null;}
};
// MFCG city map link
window.mfcgUrl=function(burg,seed){
  if(!burg)return null;
  const s=seed||burg.MFCG||burg.i||0;
  const size=Math.max(1,Math.min(60,Math.round((burg.population||1)*10)));
  return"https://watabou.github.io/city-generator/?seed="+s+"&size="+size+(burg.port?"&coast=1":"")+(burg.citadel?"&citadel=1":"")+(burg.walls?"&walls=1":"")+(burg.plaza?"&plaza=1":"")+(burg.temple?"&temple=1":"")+(burg.shanty?"&shanty=1":"");
};
// Watabou generators
window.villageUrl=function(name,seed){const s=seed||Math.abs(name?name.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0):Math.random()*99999|0);return"https://watabou.github.io/village-generator/?seed="+s;};
window.dungeonUrl=function(name,seed){const s=seed||Math.abs(name?name.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0):Math.random()*99999|0);return"https://watabou.github.io/one-page-dungeon/?seed="+s;};
window.dwellingUrl=function(name,seed){const s=seed||Math.abs(name?name.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0):Math.random()*99999|0);return"https://watabou.github.io/dwellings/?seed="+s;};
window.neighbourhoodUrl=function(name,seed){const s=seed||Math.abs(name?name.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0):Math.random()*99999|0);return"https://watabou.github.io/neighbourhood/?seed="+s;};

// === Enriched Azgaar Parser ===
window.parseAzgaarMap=function(text){
  const R={svg:null,pack:null,params:null,error:null,debug:[]};
  try{
    R.debug.push("Size:"+text.length);
    const ss=text.indexOf('<svg'),se=text.lastIndexOf('</svg>');
    if(ss<0||se<0){R.error="No SVG";return R;}
    R.svg=text.substring(ss,se+6);
    // Params from first line
    const fl=text.substring(0,ss).split('\n')[0].trim();
    if(fl.startsWith('{')){try{R.params=JSON.parse(fl);}catch(e){}}
    // Find pack JSON
    const after=text.substring(se+6);
    const objs=[];let d=0,os=-1;
    for(let i=0;i<after.length;i++){if(after[i]==='{'){if(d===0)os=i;d++;}else if(after[i]==='}'){d--;if(d===0&&os>=0){objs.push({s:os,e:i+1});os=-1;}}}
    for(let i=0;i<objs.length;i++){
      const str=after.substring(objs[i].s,objs[i].e);
      try{const o=JSON.parse(str);if(o.states||o.burgs||o.cultures){R.pack=o;R.debug.push("Pack at "+i);break;}
        if(o.cells||o.vertices){continue;}}catch(e){R.debug.push("Obj "+i+" fail");}
    }
    if(!R.pack)R.error="Pack not found";
  }catch(e){R.error=e.message;}
  return R;
};

// === Enriched topic generation from Azgaar pack ===
window.generateTopicsFromPack=function(pack,wid,params){
  const T=[];if(!pack)return T;
  const states=safeArr(pack.states),burgs=safeArr(pack.burgs),cultures=safeArr(pack.cultures),
    religions=safeArr(pack.religions),rivers=safeArr(pack.rivers),military=safeArr(pack.military),
    provinces=safeArr(pack.provinces),biomes=safeArr(pack.biomes),cells=pack.cells||{};
  const sN={},cN={},rN={},sColor={},sCoa={};
  states.forEach(s=>{if(s&&s.i>0){sN[s.i]=s.name||s.fullName||"State "+s.i;sColor[s.i]=s.color||"";sCoa[s.i]=s.coa||null;}});
  cultures.forEach(c=>{if(c&&c.i>0)cN[c.i]=c.name||"Culture "+c.i;});
  religions.forEach(r=>{if(r&&r.i>0)rN[r.i]=r.name||"Religion "+r.i;});

  // Get biome name for a cell
  const biomeNames=["Marine","Hot desert","Cold desert","Savanna","Grassland","Tropical seasonalForest","Temperate deciduous forest","Tropical rainforest","Temperate rainforest","Taiga","Tundra","Glacier","Wetland"];
  const getBiome=(cellId)=>{
    if(cells.biome&&cells.biome[cellId]!==undefined){const bi=cells.biome[cellId];return biomeNames[bi]||"Biome "+bi;}return"";
  };
  const getElev=(cellId)=>cells.h&&cells.h[cellId]!==undefined?cells.h[cellId]:null;
  const getTemp=(cellId)=>cells.temp&&cells.temp[cellId]!==undefined?cells.temp[cellId]:null;

  // World year from params
  const worldYear=params?.options?.year||params?.year||null;
  const eraName=params?.options?.eraName||params?.eraName||"";

  // === STATES -> politics ===
  states.forEach(s=>{
    if(!s||!s.i||s.i===0||s.removed)return;
    const cap=s.capital&&burgs[s.capital]?burgs[s.capital]:null;
    const cult=s.culture?cN[s.culture]||"?":"?";
    const rel=s.religion?rN[s.religion]||"?":"?";
    const totalPop=Math.round(((s.rural||0)+(s.urban||0))*1000);
    // Diplomacy
    const diplo=[];
    if(s.diplomacy)s.diplomacy.forEach((d,i)=>{if(i>0&&d&&d!=="x"&&d!=="Neutral"&&sN[i])diplo.push(sN[i]+": "+d);});
    // Provinces
    const provs=provinces.filter(p=>p&&p.state===s.i&&p.name).map(p=>p.fullName||p.name);

    T.push({id:"azg-state-"+s.i,name:s.fullName||s.name,brief:(s.fullName||s.name)+", "+cult+" "+(s.form||"state")+". Pop: "+totalPop.toLocaleString(),
      template:"system",tags:normTags([s.form||"",cult,"state",s.name]),aspect_id:"politics",world_id:wid,source:"azgaar",subcategory:(s.form||"State").charAt(0).toUpperCase()+(s.form||"state").slice(1),
      coa:s.coa||null,color:s.color||"",born_year:null,died_year:null,timeline:[],
      fields:{principle:"Government: "+(s.form||"Unknown"),
        components:["Total population: "+totalPop.toLocaleString(),"Rural: "+Math.round((s.rural||0)*1000).toLocaleString(),"Urban: "+Math.round((s.urban||0)*1000).toLocaleString(),"Area: "+(s.area?Math.round(s.area):"?")+" cells"],
        practitioners:"Culture: "+cult+"\nReligion: "+rel,effects:"Capital: "+(cap?cap.name:"?")+"\n"+(provs.length?"Provinces: "+provs.join(", "):""),
        limitations:diplo.length?"Diplomacy:\n"+diplo.join("\n"):"",origin:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // === BURGS -> locations + notable-locations ===
  burgs.forEach(b=>{
    if(!b||!b.i||b.i===0||!b.name)return;
    const st=b.state?sN[b.state]||"Unclaimed":"Unclaimed";
    const cult=b.culture?cN[b.culture]||"?":"?";
    const rel=b.religion?rN[b.religion]||"?":"?";
    const pop=Math.round((b.population||0)*1000);
    const feats=[];
    if(b.capital)feats.push("Capital");if(b.port)feats.push("Port");if(b.citadel)feats.push("Citadel");
    if(b.walls)feats.push("Walled");if(b.plaza)feats.push("Market");if(b.temple)feats.push("Temple");if(b.shanty)feats.push("Shantytown");
    const biome=b.cell?getBiome(b.cell):"";
    const elev=b.cell?getElev(b.cell):null;
    const temp=b.cell?getTemp(b.cell):null;
    const tags=normTags([st,cult,...feats,b.name,biome]);
    const mfcg=mfcgUrl(b);
    const coa=b.coa||null;
    const subcat=b.capital?"Capital":pop>5000?"City":b.citadel||b.walls?"Fortress":b.port?"Port":pop<500?"Village":"Town";

    T.push({id:"azg-loc-"+b.i,name:b.name,brief:b.name+(b.capital?" (capital)":"")+", "+st+". Pop: "+pop.toLocaleString(),
      template:"location",tags,aspect_id:"locations",world_id:wid,source:"azgaar",subcategory:subcat,
      coa,mfcg_url:mfcg,coords:{x:b.x||0,y:b.y||0},born_year:null,died_year:null,timeline:[],
      fields:{type:feats.length?feats.join(", "):"Settlement",region:st,population:pop.toLocaleString(),
        government:st,culture:cult,religion:rel,
        climate:(biome||"")+(temp!==null?" ("+temp+"\u00b0)":""),
        resources:"Elevation: "+(elev!==null?elev:"?"),
        features:feats,mfcg_url:mfcg},
      created:new Date().toISOString(),updated:new Date().toISOString()});

    if(b.capital||feats.length>=2){
      T.push({id:"azg-notable-"+b.i,name:b.name,brief:b.name+" — "+(b.capital?"Capital of "+st:feats.join(", ")),
        template:"notable",tags:[...tags,"notable"],aspect_id:"notable-locations",world_id:wid,source:"azgaar",subcategory:b.capital?"Capital":(b.citadel?"Fortress":(b.temple?"Sacred Site":"Landmark")),
        coa,mfcg_url:mfcg,coords:{x:b.x||0,y:b.y||0},born_year:null,died_year:null,timeline:[],
        fields:{significance:b.capital?"Capital of "+st:"Notable for "+feats.join(", "),
          physical_desc:feats.join(", ")+(biome?" in "+biome:""),history_events:"",connected_entities:st+", "+cult,history:"Pop: "+pop.toLocaleString()},
        created:new Date().toISOString(),updated:new Date().toISOString()});
    }
  });

  // === CULTURES ===
  cultures.forEach(c=>{
    if(!c||!c.i||c.i===0||c.removed)return;
    const parentCulture=c.base!==undefined&&cN[c.base]?cN[c.base]:"Indigenous";
    const shieldShape=c.shield||"heater";
    T.push({id:"azg-culture-"+c.i,name:c.name||"Culture "+c.i,
      brief:(c.name||"")+" — "+(c.type||"")+" culture"+(c.base?" (from "+parentCulture+")":""),
      template:"culture",tags:normTags([c.type||"",c.name,"culture"]),aspect_id:"cultures",world_id:wid,source:"azgaar",subcategory:(c.type||"Culture").charAt(0).toUpperCase()+(c.type||"culture").slice(1),
      coa:c.coa||null,born_year:null,died_year:null,timeline:[],
      fields:{origin:"Type: "+(c.type||"?")+"\nDerived from: "+parentCulture+"\nShield style: "+shieldShape,
        values_beliefs:"",customs_practices:"Naming method: "+(c.code||"default"),
        art_expression:"",social_structure:"",language:"",relations:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // === RELIGIONS ===
  religions.forEach(r=>{
    if(!r||!r.i||r.i===0||r.removed)return;

  // === Auto-enrich from Azgaar pack (NO AI needed) ===
  async autoEnrichFromPack(wid){
    const pack=await this.getMapPack(wid);if(!pack)return{enriched:0};
    const states=safeArr(pack.states),burgs=safeArr(pack.burgs),cultures=safeArr(pack.cultures),
      religions=safeArr(pack.religions);
    const sN={},cN={},rN={};
    states.forEach(s=>{if(s&&s.i>0)sN[s.i]=s.name||s.fullName||"";});
    cultures.forEach(c=>{if(c&&c.i>0)cN[c.i]=c.name||"";});
    religions.forEach(r=>{if(r&&r.i>0)rN[r.i]=r.name||"";});
    let enriched=0;
    // Auto-populate Bible from pack data
    const b=await this.getBible(wid);if(!b.facts)b.facts={};
    // States -> politics facts
    states.forEach(s=>{if(!s||!s.i||s.i===0||s.removed)return;
      const name=s.fullName||s.name;if(!name)return;
      if(!b.facts['politics'])b.facts['politics']={};
      b.facts['politics'][name]=(s.form||"state")+", culture: "+(cN[s.culture]||"?")+", pop: "+Math.round(((s.rural||0)+(s.urban||0))*1000).toLocaleString();
    });
    // Cultures -> culture facts
    cultures.forEach(c=>{if(!c||!c.i||c.i===0||c.removed)return;
      if(!b.facts['cultures'])b.facts['cultures']={};
      b.facts['cultures'][c.name||"Culture "+c.i]=(c.type||"")+" culture";
    });
    // Religions -> religion facts
    religions.forEach(r=>{if(!r||!r.i||r.i===0||r.removed)return;
      if(!b.facts['religions'])b.facts['religions']={};
      b.facts['religions'][r.name||"Religion "+r.i]=(r.form||"")+" "+(r.type||"religion")+(r.deity?" — deity: "+r.deity:"");
    });
    await this.saveBible(wid,b);
    // Cross-reference: for each burg topic, add tags for its state, culture, religion
    const locTopics=await this.listTopics(wid,"locations");
    for(const t of locTopics){
      if(t.source!=="azgaar")continue;
      const burgId=parseInt((t.id.match(/\d+$/)||["0"])[0]);
      const burg=burgs[burgId];if(!burg)continue;
      const newTags=[...t.tags];
      if(burg.state&&sN[burg.state])newTags.push(sN[burg.state]);
      if(burg.culture&&cN[burg.culture])newTags.push(cN[burg.culture]);
      if(burg.religion&&rN[burg.religion])newTags.push(rN[burg.religion]);
      // Add biome if available
      if(burg.capital)newTags.push("capital");
      if(burg.port)newTags.push("port");
      const merged={...t,tags:normTags(newTags)};
      if(merged.tags.length!==t.tags.length){await this.saveTopic(merged);enriched++;}
    }
    // Cross-ref: state topics get tags for their burgs
    const polTopics=await this.listTopics(wid,"politics");

  // === SMART CONTEXT (Phase 3 — Priority Context Assembly) ===
  // Weight-aware: focus entity full → linked entities full → same-category summaries → budget stop
  async buildSmartContext(wid,userMsg,currentAspect){
    const all=await this.listAllTopics(wid);if(!all.length)return{mentioned:[],contextStr:""};
    const msgLower=userMsg.toLowerCase();
    // Step 1: Find focus entities — topics mentioned by name in user message
    const mentioned=all.filter(t=>t.name&&t.name.length>2&&msgLower.includes(t.name.toLowerCase()));
    if(!mentioned.length)return{mentioned:[],contextStr:""};

    if(!modelKey){const prov=await this.getProvider();modelKey=prov==="deepseek"?"deepseek":prov==="claude"?"claude":"local";}
    const modelTokens=(window.CONTEXT_MODELS[modelKey]||window.CONTEXT_MODELS.claude).tokens;
    const budget=Math.floor(modelTokens*0.30);let used=0;
    const est=(text)=>Math.ceil((text||"").length/4);
    // Step 3: Focus entities — full detail (all fields, full lore, relations, timeline)
    const seen=new Set();const blocks=[];
    for(const t of mentioned.slice(0,5)){
      if(seen.has(t.id))continue;seen.add(t.id);
      let block="["+t.name+"] ("+t.aspect_id+(t.subcategory?" / "+t.subcategory:"")+")";
      if(t.brief)block+="\n  "+t.brief;
      const f=t.fields||{};const fE=Object.entries(f).filter(([k,v])=>v&&v!=="Unknown"&&v!=="?");
      if(fE.length)block+="\n  Fields: "+fE.map(([k,v])=>k.replace(/_/g," ")+": "+(typeof v==="object"?JSON.stringify(v):String(v).slice(0,120))).join("; ");
      const lore=t.generatedLore||t.compiledLore;if(lore)block+="\n  Lore: "+lore;
      if(t.relations&&t.relations.length>0)block+="\n  Relations: "+t.relations.map(r=>(r.targetName||r.targetId)+" ("+r.relationship+")").join(", ");
      if(t.timeline&&t.timeline.length>0)block+="\n  Timeline: "+t.timeline.slice(0,5).map(e=>"Y"+e.year+": "+e.event).join("; ");
      const cost=est(block);if(used+cost>budget)break;
      used+=cost;blocks.push(block);
    }
    // Step 4: Linked entities — use summary if available, otherwise lore excerpt
    const linkedIds=new Set();
    for(const t of mentioned){for(const r of(t.relations||[])){if(!seen.has(r.targetId))linkedIds.add(r.targetId);}}
    for(const lid of linkedIds){
      if(used>=budget)break;const t=all.find(x=>x.id===lid);if(!t)continue;seen.add(t.id);
      let block="  → ["+t.name+"] ("+t.aspect_id+(t.subcategory?" / "+t.subcategory:"")+")";
      if(t.brief)block+="\n    "+t.brief;
      const f=t.fields||{};const fE=Object.entries(f).filter(([k,v])=>v&&v!=="Unknown"&&v!=="?").slice(0,6);
      if(fE.length)block+="\n    Fields: "+fE.map(([k,v])=>k.replace(/_/g," ")+": "+(typeof v==="object"?JSON.stringify(v):String(v).slice(0,80))).join("; ");
      // Prefer AI summary over full lore for linked entities (saves budget)
      if(t.summary)block+="\n    Summary: "+t.summary;
      else{const lore=t.generatedLore||t.compiledLore;if(lore)block+="\n    Lore: "+lore.slice(0,300)+(lore.length>300?"...":"");}
      const cost=est(block);if(used+cost>budget)break;
      used+=cost;blocks.push(block);
    }
    // Step 5: Same-category summaries (first sentence of brief) — fill remaining budget
    if(currentAspect){
      const sameAsp=all.filter(t=>t.aspect_id===currentAspect&&!seen.has(t.id)&&t.brief);
      if(sameAsp.length>0){
        let sumBlock="\n[Other "+currentAspect.replace(/-/g," ")+" entries]:";
        for(const t of sameAsp.slice(0,20)){
          const fs=(t.brief||"").split(/[.!?]\s/)[0];const line="\n  • "+t.name+" — "+fs;
          const cost=est(line);if(used+cost>budget)break;used+=cost;sumBlock+=line;}
        if(sumBlock.includes("•"))blocks.push(sumBlock);}
    }
    return{mentioned,contextStr:blocks.length?"\n\nTOPIC CONTEXT (referenced entities — check for contradictions):\n"+blocks.join("\n\n"):"",tokensUsed:used,tokenBudget:budget};},

// === Context Weight Tracker (Phase 1) ===
// Model context windows in tokens
window.CONTEXT_MODELS={claude:{name:"Claude (200K)",tokens:200000},deepseek:{name:"DeepSeek (128K)",tokens:128000},local:{name:"Local / 8K",tokens:8000},custom:{name:"Custom (32K)",tokens:32000}};
window.contextWeight={
  // Recency multiplier: recent edits get higher weight (more likely to be referenced)
  recencyMult(updatedAt){if(!updatedAt)return 1.0;const days=(Date.now()-new Date(updatedAt).getTime())/(1000*60*60*24);if(days<7)return 1.2;if(days<30)return 1.0;if(days<90)return 0.8;return 0.6;},
  // Calculate token weight for a single topic
  topicWeight(t){const parts=[t.name||"",t.brief||"",t.compiledLore||"",t.generatedLore||""];const fields=t.fields||{};for(const k in fields){const v=fields[k];if(v&&typeof v==="string")parts.push(v);else if(v&&typeof v==="object")parts.push(JSON.stringify(v));}
    const text=parts.join(" ");const baseTokens=text.length/4.0;const linkTokens=(t.relations||[]).length*50;const tagTokens=(t.tags||[]).length*5;const timelineTokens=(t.timeline||[]).length*30;
    return Math.round((baseTokens+linkTokens+tagTokens+timelineTokens)*this.recencyMult(t.updated));},
  // Calculate token weight for bible facts
  bibleWeight(bible){const f=bible?.facts||{};let tokens=0;for(const cat in f){for(const k in f[cat]){const v=f[cat][k];tokens+=((cat+k+(typeof v==="string"?v:JSON.stringify(v))).length)/4.0;}}return Math.round(tokens);},
  // Full world budget analysis
  async analyze(wid){const all=await db.listAllTopics(wid);const bible=await db.getBible(wid);
    // Per-topic weights
    const topicWeights=all.map(t=>({id:t.id,name:t.name,aspect_id:t.aspect_id,weight:this.topicWeight(t),updated:t.updated}));
    topicWeights.sort((a,b)=>b.weight-a.weight);
    // Per-aspect totals
    const aspectTotals={};for(const tw of topicWeights){aspectTotals[tw.aspect_id]=(aspectTotals[tw.aspect_id]||0)+tw.weight;}
    const bibleW=this.bibleWeight(bible);const topicTotal=topicWeights.reduce((s,tw)=>s+tw.weight,0);const totalTokens=topicTotal+bibleW;
    // Get stored model preference or auto-detect from provider
    let modelKey=await IDB.get("_context_model");
    if(!modelKey){const prov=await db.getProvider();modelKey=prov==="deepseek"?"deepseek":prov==="claude"?"claude":"local";}
    const model=window.CONTEXT_MODELS[modelKey]||window.CONTEXT_MODELS.claude;
    const pct=Math.min(100,Math.round((totalTokens/model.tokens)*100));
    return{totalTokens,topicTotal,bibleTokens:bibleW,topicCount:all.length,topicWeights,aspectTotals,modelKey,modelName:model.name,modelTokens:model.tokens,pct,heaviest:topicWeights.slice(0,10)};},
  // Store model preference
  async setModel(key){return IDB.set("_context_model",key);}
};

// Strips TODO/DRAFT/NOTE markers and exports clean markdown
window.STRIP_PATTERNS=[
  /\[TODO[:\s][^\]]*\]/gi, /\[DRAFT[:\s][^\]]*\]/gi, /\[NOTE[:\s][^\]]*\]/gi,
  /\[WIP[:\s][^\]]*\]/gi, /\[PLACEHOLDER[:\s][^\]]*\]/gi,
  /\[describe this later\]/gi, /\[needs detail\]/gi, /\[TBD\]/gi,
  /<!--[\s\S]*?-->/g, /⚠\s*Consistency warning:.*?(?=\n|$)/gi,
  /\[TODO\]/gi, /\[DRAFT\]/gi, /\[NOTE\]/gi, /\[WIP\]/gi, /\[PLACEHOLDER\]/gi
];
window.publication={
  // Strip all draft markers from text
  clean(text){if(!text)return"";let t=text;for(const p of window.STRIP_PATTERNS)t=t.replace(p,"");return t.replace(/\n{3,}/g,"\n\n").trim();},

  // Count draft markers in a text block
  countMarkers(text){if(!text)return 0;let c=0;for(const p of window.STRIP_PATTERNS){const m=text.match(p);if(m)c+=m.length;}return c;},

  // Build the full world markdown export
  async buildMarkdown(wid){
    const world=await IDB.get("world:"+wid);const bible=await db.getBible(wid);
    const wName=world?.name||"Unknown World";
    let md="# "+wName+"\n\n";
    if(world?.description)md+="> "+this.clean(world.description)+"\n\n";
    if(world?.current_year)md+="**Current Year:** "+world.current_year+(world?.calendar_name?" "+world.calendar_name:"")+"\n\n";
    md+="---\n\n";

    // Bible facts section
    const facts=bible?.facts||{};const cats=Object.keys(facts).sort();
    if(cats.length>0){
      md+="## World Facts\n\n";
      for(const cat of cats){
        const entries=facts[cat];const keys=Object.keys(entries);
        if(keys.length===0)continue;
        md+="### "+cat.replace(/-/g," ").replace(/\b\w/g,c=>c.toUpperCase())+"\n\n";
        for(const k of keys)md+="**"+k+":** "+this.clean(String(entries[k]))+"\n\n";
      }
      md+="---\n\n";
    }

    // Topics grouped by aspect group then aspect
    const allTopics=await db.listAllTopics(wid);
    for(const grp of window.ASPECT_GROUPS){
      const grpTopics=allTopics.filter(t=>grp.aspects.includes(t.aspect_id));
      if(grpTopics.length===0)continue;
      md+="## "+grp.icon+" "+grp.name+"\n\n";

      for(const aspId of grp.aspects){
        const asp=window.ASPECTS.find(a=>a.id===aspId);if(!asp)continue;
        const aspTopics=grpTopics.filter(t=>t.aspect_id===aspId);
        if(aspTopics.length===0)continue;

        // Group by subcategory
        const bySub={};for(const t of aspTopics){const sub=t.subcategory||"General";if(!bySub[sub])bySub[sub]=[];bySub[sub].push(t);}

        md+="### "+asp.icon+" "+asp.name+" ("+aspTopics.length+")\n\n";
        for(const[sub,topics] of Object.entries(bySub).sort()){
          if(sub!=="General")md+="#### "+sub+"\n\n";
          for(const t of topics.sort((a,b)=>(a.name||"").localeCompare(b.name||""))){
            md+="##### "+t.name+"\n\n";
            if(t.brief)md+="*"+this.clean(t.brief)+"*\n\n";
            // Fields
            const fields=t.fields||{};const fKeys=Object.keys(fields).filter(k=>fields[k]&&fields[k]!=="Unknown"&&fields[k]!=="?");
            if(fKeys.length>0){for(const k of fKeys){const v=fields[k];const label=k.replace(/_/g," ").replace(/\b\w/g,c=>c.toUpperCase());md+="**"+label+":** "+(typeof v==="object"?JSON.stringify(v):this.clean(String(v)))+"\n\n";}}
            // Lore
            const lore=t.generatedLore||t.compiledLore;
            if(lore)md+=this.clean(lore)+"\n\n";
            // Relations
            if(t.relations&&t.relations.length>0){
              const relStrs=t.relations.map(r=>{const target=allTopics.find(x=>x.id===r.targetId);return target?(r.label||"linked to")+" **"+target.name+"**":null;}).filter(Boolean);
              if(relStrs.length>0)md+="*Connections: "+relStrs.join(", ")+"*\n\n";
            }
          }
        }
      }
    }
    return md;
  },

  // Count total draft markers across the world
  async countWorldMarkers(wid){
    const allTopics=await db.listAllTopics(wid);const bible=await db.getBible(wid);
    let total=0;
    for(const t of allTopics){
      total+=this.countMarkers(t.brief);total+=this.countMarkers(t.compiledLore);total+=this.countMarkers(t.generatedLore);
      for(const v of Object.values(t.fields||{})){if(typeof v==="string")total+=this.countMarkers(v);}
    }
    for(const cat of Object.values(bible?.facts||{})){for(const v of Object.values(cat)){if(typeof v==="string")total+=this.countMarkers(v);}}
    return total;
  },

  // Trigger download
  download(md,worldName){
    const fn=(worldName||"world").replace(/[^a-zA-Z0-9_-]/g,"_").toLowerCase()+"_published.md";
    const blob=new Blob([md],{type:"text/markdown"});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=fn;a.click();URL.revokeObjectURL(url);
  }
};

// === Auto-Summarisation (Phase 4) ===
// When context budget exceeds threshold, offers to compress heavy entries via AI
window.summarizer={
  // Identify topics that are candidates for summarisation (sorted by weight, heaviest first)
  async candidates(wid,limit=20){
    const all=await db.listAllTopics(wid);
    const weighted=all.map(t=>({topic:t,weight:window.contextWeight.topicWeight(t),hasSummary:!!t.summary}))
      .filter(tw=>tw.weight>100&&!tw.hasSummary) // only unsummarised entries above 100 tokens
      .sort((a,b)=>b.weight-a.weight);
    return weighted.slice(0,limit);
  },

  // Build the AI prompt for summarising a single topic
  buildPrompt(topic){
    const parts=["Summarise the following worldbuilding entry into 2-3 concise sentences."];
    parts.push("Preserve all key facts (names, dates, relationships, stats) but remove atmospheric prose and redundant detail.");
    parts.push("The summary will be used as context for AI — prioritise factual density over readability.\n");
    parts.push("Entry: "+topic.name+" ("+topic.aspect_id+")");
    if(topic.brief)parts.push("Brief: "+topic.brief);
    const f=topic.fields||{};const fE=Object.entries(f).filter(([k,v])=>v&&v!=="Unknown"&&v!=="?");
    if(fE.length)parts.push("Fields: "+fE.map(([k,v])=>k.replace(/_/g," ")+": "+(typeof v==="object"?JSON.stringify(v):v)).join("; "));
    const lore=topic.generatedLore||topic.compiledLore;
    if(lore)parts.push("Lore:\n"+lore);
    parts.push("\nWrite ONLY the summary. No preamble, no labels.");
    return parts.join("\n");
  },

  // Summarise a single topic via AI and store the result
  async summariseOne(topic){
    const prompt=this.buildPrompt(topic);
    const result=await window.aiCall("You are a precise summariser for worldbuilding data.",
      [{role:"user",content:prompt}],500);
    if(result&&!result.startsWith("[")&&!result.startsWith("Error")){
      topic.summary=result.trim();
      topic.summary_date=new Date().toISOString();
      await db.saveTopic(topic);
      return{ok:true,summary:topic.summary};
    }
    return{ok:false,error:result};
  },

  // Batch summarise multiple topics with progress callback
  async summariseBatch(topics,onProgress){
    let done=0;const results=[];
    for(const t of topics){
      const r=await this.summariseOne(t);
      results.push({name:t.name,id:t.id,...r});
      done++;if(onProgress)onProgress(done,topics.length,t.name);
    }
    return results;
  },

  // Clear a topic's summary (revert to full content for context)
  async clearSummary(topic){
    delete topic.summary;delete topic.summary_date;
    await db.saveTopic(topic);
  }
};

  async toggleAsset(wid,entityId,entityName,assetType){

  // Get completion stats for the whole world
  async worldStats(wid){
    const m=await this.getManifest(wid);const entries=Object.values(m);
    if(!entries.length)return{total:0,complete:0,partial:0,pct:0};
    const total=entries.length;const typeCount=window.ASSET_TYPES.length;
    let doneCount=0;let partial=0;
    for(const e of entries){const done=Object.values(e.assets||{}).filter(Boolean).length;doneCount+=done;if(done>0&&done<typeCount)partial++;else if(done===typeCount)/* fully complete — not partial */;}
    const pct=Math.round((doneCount/(total*typeCount))*100);
    return{total,complete:entries.filter(e=>Object.values(e.assets||{}).filter(Boolean).length===typeCount).length,partial,pct};

  async setGlobal(rules){return IDB.set("forge_rules:global",rules);},
  // Build the rules preamble for injection into system prompts
  async buildPreamble(wid){
    const parts=[];

    if(wid){
      const world=await IDB.get("world:"+wid);if(world?.name)parts.push("World: "+world.name);

// Consistency check — AI-powered contradiction detection on save

const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:mt,system:sys,messages:msgs.map(m=>({role:m.role,content:m.content}))})});if(!r.ok){const e=await r.json().catch(()=>({}));return"Claude error: "+(e.error?.message||r.statusText);}const d=await r.json();return d.content?.map(b=>b.text||"").join("")||"No response.";}catch(e){const msg=e.message||"";if(msg.includes("Failed to fetch")||msg.includes("NetworkError")||msg.includes("blocked")||msg.includes("CORS"))return"Network error — API request may be blocked by your browser's tracker/ad blocker (Brave Shields, DuckDuckGo Protection, etc). Try disabling protection for this site, or switch to Safari/Chrome.";return"Error: "+msg;}};

  const workflow={
    "3":{class_type:"KSampler",inputs:{seed:Math.floor(Math.random()*999999999),steps,cfg,sampler_name:"euler",scheduler:"normal",denoise:1,model:["4",0],positive:["6",0],negative:["7",0],latent_image:["5",0]}},
    "4":{class_type:"CheckpointLoaderSimple",inputs:{ckpt_name:checkpoint}},
    "5":{class_type:"EmptyLatentImage",inputs:{width,height,batch_size:1}},

    "8":{class_type:"VAEDecode",inputs:{samples:["3",0],vae:["4",2]}},

  };
  const qRes=await fetch(host+'/prompt',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:workflow})});
  if(!qRes.ok)throw new Error('ComfyUI queue error: '+qRes.statusText+'. Is ComfyUI running with --listen --enable-cors-header?');
  const{prompt_id}=await qRes.json();
  return new Promise((resolve,reject)=>{
    const iv=setInterval(async()=>{
      try{
        const hRes=await fetch(host+'/history/'+prompt_id);
        const hist=await hRes.json();
        const job=hist[prompt_id];if(!job)return;
        clearInterval(iv);
        const imgNode=Object.values(job.outputs||{}).find(o=>o.images&&o.images.length);
        if(!imgNode)return reject(new Error('No image output from ComfyUI'));
        const img=imgNode.images[0];
        resolve(host+'/view?filename='+encodeURIComponent(img.filename)+'&subfolder='+encodeURIComponent(img.subfolder||'')+'&type='+(img.type||'output'));
      }catch(e){clearInterval(iv);reject(e);}
    },1000);
    setTimeout(()=>{clearInterval(iv);reject(new Error('Timed out waiting for ComfyUI'));},180000);
  });
};

    {title:"Abilities",icon:"💪",content:<>

        {abilityBlock("str","Strength")}{abilityBlock("dex","Dexterity")}{abilityBlock("con","Constitution")}
        {abilityBlock("int","Intelligence")}{abilityBlock("wis","Wisdom")}{abilityBlock("cha","Charisma")}

    </>},
    {title:"Background",icon:"📜",content:<>

    </>},
    {title:"Appearance",icon:"👤",content:<>

        <div>{label("Weight")}{inp("weight","e.g. 170 lbs, Heavy-set")}</div>
        <div>{label("Eyes")}{inp("eyes","e.g. Green, Glowing amber")}</div>
        <div>{label("Hair")}{inp("hair","e.g. Black, Long braided")}</div>
      </div>
      {label("Skin")}{inp("skin","e.g. Bronze, Scarred")}
      {label("Distinguishing Features")}{area("distinguishing","Scars, tattoos, markings, mannerisms...")}
    </>},
    {title:"Personality",icon:"🎭",content:<>
      {label("Personality Traits")}{area("traits","Two personality traits...",3)}
      {label("Motivations")}{area("motivations","What do they want?")}
      {label("Fears")}{area("fears","What are they afraid of?")}
      {label("Quirks")}{area("quirks","Habits, catchphrases, mannerisms...")}
    </>},
    {title:"Skills & Equipment",icon:"🎒",content:<>
      {label("Equipment / Inventory")}{area("equipment","Weapons, armour, items...",3)}
      {label("Skills & Proficiencies")}{area("proficiencies","Skills they excel at...")}
      {label("Languages")}{area("languages","Languages spoken...")}
    </>},
    {title:"History",icon:"📖",content:<>
      {label("Personal History")}{area("history","Their story so far...",5)}
      {label("Connections & Relationships")}{area("connections","NPCs, factions, places they're tied to...",3)}
    </>}
  ];
  const save=()=>{const fields={...topic.fields,...data};if(data.race==="Custom"&&data.species)fields.race=data.species;fields["class"]=data.charClass;fields.personal=data.traits;fields.relationships=data.connections;onSave(fields);};
  const cur=steps[step];
  return(<div style={{maxHeight:"80vh",display:"flex",flexDirection:"column"}}>
    <div style={{display:"flex",gap:4,padding:"0 0 12px",overflowX:"auto",flexShrink:0}}>{steps.map((s,i)=><button key={i} onClick={()=>setStep(i)} style={{padding:"6px 10px",background:i===step?T.gold+"22":"none",border:i===step?"1px solid "+T.gold:"1px solid transparent",borderRadius:6,cursor:"pointer",fontSize:11,color:i===step?T.gold:i<step?T.accent:T.txD,whiteSpace:"nowrap",fontFamily:"inherit"}}>{s.icon+" "+s.title}</button>)}</div>
    <div style={{flex:1,overflowY:"auto",minHeight:200}}>{cur.content}</div>
    <div style={{display:"flex",gap:8,paddingTop:12,borderTop:"1px solid "+T.bd,flexShrink:0}}>
      {step>0&&<Btn sm v="s" onClick={()=>setStep(step-1)}>← Back</Btn>}
      <div style={{flex:1}}/>
      {step<steps.length-1?<Btn sm onClick={()=>setStep(step+1)}>Next →</Btn>:<Btn sm onClick={()=>{save();onClose();}}>✓ Save Character</Btn>}
    </div>
  </div>);}

// === NPC System ===
const NPC_OCCUPATIONS=["Merchant","Blacksmith","Innkeeper","Guard","Farmer","Healer","Scholar","Priest","Thief","Hunter","Noble","Sailor","Miner","Baker","Fisher","Soldier","Bard","Alchemist","Tailor","Carpenter","Other"];
const NPC_BACKGROUNDS=["Commoner","Noble","Criminal","Outlander","Sage","Soldier","Artisan","Entertainer","Hermit","Acolyte","Folk Hero","Exile","Orphan","Other"];
const NPC_PERSONALITIES=["Friendly","Suspicious","Gruff","Cheerful","Secretive","Anxious","Boisterous","Gentle","Cunning","Stoic","Curious","Melancholic","Arrogant","Kind","Other"];
function NpcSection({npcs,onUpdate,onGenerate,onBulkGenerate,locationName,busy}){
  const[expanded,setExpanded]=useState(null);const[adding,setAdding]=useState(false);
  const[newName,setNewName]=useState("");
  const update=(idx,key,val)=>{const n=[...npcs];n[idx]={...n[idx],[key]:val};onUpdate(n);};
  const remove=(idx)=>{const n=npcs.filter((_,i)=>i!==idx);onUpdate(n);};
  const addNpc=()=>{if(!newName.trim())return;onUpdate([...npcs,{id:Date.now().toString(36),name:newName.trim(),occupation:"",background:"",age:"",personality:"",personalInfo:"",summary:""}]);setNewName("");setAdding(false);};
  const dd=(val,opts,onChange)=>(<select value={val||""} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"6px 8px",borderRadius:4,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:12,outline:"none"}}><option value="">— Select —</option>{opts.map(o=><option key={o} value={o}>{o}</option>)}</select>);
  return(<div style={{padding:"16px 24px",borderTop:"2px solid "+T.bd}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:600,color:T.gold,textTransform:"uppercase",letterSpacing:1,flex:1}}>👥 Residents ({npcs.length})</div>
      <Btn sm onClick={()=>setAdding(!adding)}>+ Add</Btn>
      {npcs.length>0&&<Btn sm v="a" onClick={onBulkGenerate} disabled={busy}>{busy?"...":"✨ All"}</Btn>}
    </div>
    {adding&&<div style={{display:"flex",gap:8,marginBottom:10}}><input autoFocus value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addNpc();}} placeholder="NPC name..." style={{flex:1,padding:"6px 10px",borderRadius:6,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:13,outline:"none"}}/><Btn sm onClick={addNpc} disabled={!newName.trim()}>Add</Btn></div>}
    {npcs.map((npc,i)=><div key={npc.id||i} style={{marginBottom:8,background:T.bg,borderRadius:8,border:"1px solid "+T.bd,overflow:"hidden"}}>
      <button onClick={()=>setExpanded(expanded===i?null:i)} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"10px 12px",background:"none",border:"none",cursor:"pointer",color:T.tx,textAlign:"left"}}>
        <span style={{fontSize:14,fontWeight:600,color:T.gold,flex:1}}>{npc.name||"Unnamed"}</span>
        {npc.occupation&&<span style={{fontSize:10,color:T.txD,background:T.sf2,padding:"2px 6px",borderRadius:4}}>{npc.occupation}</span>}
        <span style={{fontSize:11,color:T.txD}}>{expanded===i?"▲":"▼"}</span>
      </button>
      {expanded===i&&<div style={{padding:"0 12px 12px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <div><div style={{fontSize:9,color:T.goldD,textTransform:"uppercase",marginBottom:2}}>Name</div><input value={npc.name||""} onChange={e=>update(i,"name",e.target.value)} style={{width:"100%",padding:"6px 8px",borderRadius:4,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:12,outline:"none"}}/></div>
          <div><div style={{fontSize:9,color:T.goldD,textTransform:"uppercase",marginBottom:2}}>Age</div><input value={npc.age||""} onChange={e=>update(i,"age",e.target.value)} placeholder="e.g. 34, elderly" style={{width:"100%",padding:"6px 8px",borderRadius:4,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:12,outline:"none"}}/></div>
          <div><div style={{fontSize:9,color:T.goldD,textTransform:"uppercase",marginBottom:2}}>Occupation</div>{dd(npc.occupation,NPC_OCCUPATIONS,v=>update(i,"occupation",v))}</div>
          <div><div style={{fontSize:9,color:T.goldD,textTransform:"uppercase",marginBottom:2}}>Background</div>{dd(npc.background,NPC_BACKGROUNDS,v=>update(i,"background",v))}</div>
          <div style={{gridColumn:"span 2"}}><div style={{fontSize:9,color:T.goldD,textTransform:"uppercase",marginBottom:2}}>Personality</div>{dd(npc.personality,NPC_PERSONALITIES,v=>update(i,"personality",v))}</div>
        </div>
        <div style={{marginBottom:8}}><div style={{fontSize:9,color:T.goldD,textTransform:"uppercase",marginBottom:2}}>Personal Information</div><textarea value={npc.personalInfo||""} onChange={e=>update(i,"personalInfo",e.target.value)} rows={2} placeholder="Backstory, secrets, motivations..." style={{width:"100%",resize:"vertical",padding:6,borderRadius:4,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:12,fontFamily:"inherit",outline:"none",lineHeight:1.5}}/></div>
        <div style={{marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}><span style={{fontSize:9,color:T.goldD,textTransform:"uppercase"}}>Summary / Description</span><Btn sm v="a" onClick={()=>onGenerate(i)} disabled={busy}>{busy?"...":"✨"}</Btn></div><textarea value={npc.summary||""} onChange={e=>update(i,"summary",e.target.value)} rows={3} placeholder="Compiled description of who they are..." style={{width:"100%",resize:"vertical",padding:6,borderRadius:4,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:12,fontFamily:"inherit",outline:"none",lineHeight:1.5}}/></div>
        <Btn sm v="d" onClick={()=>remove(i)}>Remove</Btn>
      </div>}
    </div>)}
    {npcs.length===0&&!adding&&<div style={{fontSize:12,color:T.txD,textAlign:"center",padding:12}}>No residents. Click + Add to create placeholder NPCs.</div>}
  </div>);}

// === Asset Status Row (Phase 5) ===
function AssetStatusRow({topic}){
  const[assets,setAssets]=useState({});const[wid,setWid]=useState(null);
  useEffect(()=>{(async()=>{
    // Detect world ID from topic key pattern
    const keys=await IDB.list("world:");const worlds=[];
    for(const k of keys){const w=await IDB.get(k);if(w)worlds.push(w);}
    // Find which world owns this topic by checking all worlds
    for(const w of worlds){const all=await db.listAllTopics(w.id);if(all.find(t=>t.id===topic.id)){setWid(w.id);const s=await window.assetTracker.getStatus(w.id,topic.id);setAssets(s.assets||{});break;}}
  })();},[topic.id]);
  if(!wid)return null;
  const toggle=async(type)=>{const r=await window.assetTracker.toggleAsset(wid,topic.id,topic.name,type);setAssets(r.assets||{});};
  return(<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8,padding:"6px 0",borderTop:"1px solid "+T.bd+"55"}}>
    <span style={{fontSize:10,color:T.txD,alignSelf:"center",marginRight:4}}>Assets:</span>
    {window.ASSET_TYPES.map(at=>(<button key={at.id} onClick={()=>toggle(at.id)} title={(assets[at.id]?"✓ ":"Mark ")+at.label+(assets[at.id]?" — click to unmark":" as done")}
      style={{display:"flex",gap:4,alignItems:"center",padding:"3px 8px",borderRadius:6,fontSize:10,cursor:"pointer",fontFamily:"inherit",
        background:assets[at.id]?T.gold+"18":"transparent",border:"1px solid "+(assets[at.id]?T.gold+"44":T.bd),color:assets[at.id]?T.gold:T.txD}}>
      <span>{at.icon}</span><span>{assets[at.id]?"✓":"✗"}</span>
    </button>))}
  </div>);
}

function CardView({topic,viewYear,compiledLore,onRefreshLore,onGenerateLore,loadingLore,editingLore,onEditToggle,onSaveLore,onFieldEdit,onNpcUpdate,onNpcGenerate,onNpcBulkGenerate,npcBusy,onNavigate,allTopics}){

      {onGenerateLore&&<Btn sm v="p" onClick={onGenerateLore} disabled={loadingLore}>{loadingLore?"...":"✨ Generate"}</Btn>}
      {displayLore&&!editingLore&&<Btn sm v="s" onClick={onEditToggle}>✏️ Edit</Btn>}
      {editingLore&&<Btn sm v="s" onClick={onEditToggle}>Cancel</Btn>}
      {loreHist.length>0&&<Btn sm v="g" onClick={()=>setShowHist(!showHist)}>{showHist?"Hide":"📜 "+loreHist.length+" prev"}</Btn>}
    </div>
    {/* Summary indicator (Phase 4) */}
    {topic.summary&&<div style={{padding:"8px 12px",marginBottom:10,background:T.gold+"10",border:"1px solid "+T.gold+"33",borderRadius:8,fontSize:11,lineHeight:1.5}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <span style={{fontWeight:600,color:T.gold}}>📦 AI Summary (used in context assembly)</span>
        <Btn sm v="g" onClick={async()=>{await window.summarizer.clearSummary(topic);window.location.reload();}}>Clear</Btn>
      </div>

  // 2nd-degree connections
  const secondDeg=[];
  if(allTopics&&rels.length>0){const myRelIds=new Set(rels.map(r=>r.targetId));myRelIds.add(topic.id);
    rels.forEach(r=>{const linked=(allTopics||[]).find(t=>t.id===r.targetId);if(linked&&linked.relations){linked.relations.forEach(r2=>{if(!myRelIds.has(r2.targetId)&&!secondDeg.some(s=>s.targetId===r2.targetId)){secondDeg.push({...r2,via:r.targetName});}});}});}
  const ASPECTS_MAP={};ASPECTS.forEach(a=>{ASPECTS_MAP[a.id]=a;});UNIVERSE_ASPECTS.forEach(a=>{ASPECTS_MAP[a.id]=a;});

    {secondDeg.length>0&&<div style={{marginTop:12,paddingTop:10,borderTop:"1px dashed "+T.bd+"88"}}>

      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>{secondDeg.slice(0,12).map((r,i)=><button key={i} onClick={()=>onNavigate&&onNavigate(r.targetId,r.targetAspect)} style={{padding:"5px 10px",background:T.bg,border:"1px dashed "+T.bd,borderRadius:6,cursor:onNavigate?"pointer":"default",fontSize:11,color:T.txM,transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold+"88"} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}>
        <span style={{marginRight:4}}>{ASPECTS_MAP[r.targetAspect]?.icon||"?"}</span>{r.targetName}<span style={{color:T.txD,marginLeft:4,fontSize:9}}>via {r.via}</span>
      </button>)}</div>
    </div>}
  </div>):null;

  const tlBox=<TimelineView timeline={topic.timeline} viewYear={viewYear}/>;

  // === Location Card (enriched) ===
  if(tmpl==="location"){
    return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}{portraitBox}

      {(()=>{const sub=(topic.subcategory||"").toLowerCase();const nm=topic.name;

// === Map Viewer (compact) ===
function MapViewer({svgStr,pack,onSelectEntity,onEditBurgs}){
  // viewbox is Azgaar's main container — always on, never toggleable
  const ALWAYS_ON=new Set(['viewbox']);
  const DEFAULT_ON=new Set(['viewbox','rivers','regions','borders','routes','ice','icons','labels','vignette','ocean','lakes','landmass','coastline']);

  const[zoom,setZoom]=useState(1);const[pan,setPan]=useState({x:0,y:0});
  const[drag,setDrag]=useState(false);const[ds,setDs]=useState({x:0,y:0});const[sb,setSb]=useState(null);
  const[layers,setLayers]=useState({});const[sideTab,setSideTab]=useState("info");const[sideOpen,setSideOpen]=useState(true);
  const[selMode,setSelMode]=useState(false);const[selRect,setSelRect]=useState(null);const[selStart,setSelStart]=useState(null);const[selBurgs,setSelBurgs]=useState([]);const[editPack,setEditPack]=useState(null);
  const mob=useIsMobile();
  const containerRef=useRef(null);const mapRef=useRef(null);const sa=window.safeArr;
  const zRef=useRef(1);const pRef=useRef({x:0,y:0});
  zRef.current=zoom;pRef.current=pan;

  // Detect layers, apply defaults, center map
  useEffect(()=>{
    if(!mapRef.current)return;
    const svg=mapRef.current.querySelector('svg');if(!svg)return;
    // Set SVG to its native viewBox pixel dimensions — CSS transform handles scaling
    const vb=svg.getAttribute('viewBox');
    let vw=1920,vh=937;
    if(vb){const p=vb.split(/[\s,]+/).map(Number);if(p.length===4){vw=p[2];vh=p[3];}}
    svg.setAttribute('width',vw);svg.setAttribute('height',vh);
    svg.style.width=vw+'px';svg.style.height=vh+'px';svg.style.display='block';
    const groups={};
    const scanGroups=(parent,depth)=>{if(depth>2)return;
      parent.querySelectorAll(':scope > g').forEach(g=>{
        const id=g.id;if(!id||id.length<2)return;
        groups[id]={visible:true,el:g};
      });};
    scanGroups(svg,0);svg.querySelectorAll(':scope > g').forEach(g=>scanGroups(g,1));
    // Apply defaults — viewbox always on, others per DEFAULT_ON
    Object.keys(groups).forEach(id=>{
      if(ALWAYS_ON.has(id)){groups[id].visible=true;groups[id].el.style.display='';}
      else{const vis=DEFAULT_ON.has(id);groups[id].visible=vis;groups[id].el.style.display=vis?'':'none';}
    });
    setLayers(groups);
    // Center map using already-parsed viewBox dimensions
    const rect=containerRef.current?.getBoundingClientRect();
    if(rect){const s=Math.min(rect.width/vw,rect.height/vh)*0.9;
      const ox=(rect.width-vw*s)/2;const oy=(rect.height-vh*s)/2;
      setZoom(s);setPan({x:ox,y:oy});
      zRef.current=s;pRef.current={x:ox,y:oy};
    }
  },[svgStr]);

  // Toggle — never toggle always-on layers
  const toggleLayer=id=>{if(ALWAYS_ON.has(id))return;
    setLayers(prev=>{const n={...prev};if(n[id]){n[id]={...n[id],visible:!n[id].visible};if(n[id].el)n[id].el.style.display=n[id].visible?'':'none';}return n;});};

  // Presets — viewbox always included
  const applyPreset=preset=>{
    const presets={
      political:['ocean','lakes','landmass','coastline','rivers','borders','regions','labels','icons','markers','routes','zones','terrs'],
      physical:['ocean','lakes','landmass','coastline','rivers','borders','labels','icons','markers','terrs'],
      religious:['ocean','lakes','landmass','coastline','rivers','relig','borders','labels','icons'],
      cultural:['ocean','lakes','landmass','coastline','rivers','cults','borders','labels','icons'],
      provinces:['ocean','lakes','landmass','coastline','rivers','provs','borders','labels','icons'],
      biomes:['ocean','lakes','landmass','coastline','rivers','biomes','labels','icons'],
      heightmap:['ocean','lakes','landmass','coastline','rivers','terrs'],
      military:['ocean','lakes','landmass','coastline','rivers','borders','regions','armies','labels','icons'],
      emblems:['ocean','lakes','landmass','coastline','borders','regions','emblems','labels']
    };
    const show=new Set(presets[preset]||[]);
    ALWAYS_ON.forEach(id=>show.add(id));
    setLayers(prev=>{const n={...prev};Object.keys(n).forEach(id=>{
      const vis=show.size===0||show.has(id);
      n[id]={...n[id],visible:vis};if(n[id].el)n[id].el.style.display=vis?'':'none';
    });return n;});
  };

  // Wheel zoom — must use addEventListener with passive:false
  useEffect(()=>{
    const el=containerRef.current;if(!el)return;
    const handler=e=>{
      e.preventDefault();e.stopPropagation();
      const f=e.deltaY<0?1.15:1/1.15;
      const rect=el.getBoundingClientRect();
      const cx=e.clientX-rect.left;const cy=e.clientY-rect.top;
      const oz=zRef.current;const op=pRef.current;
      const nz=Math.max(0.01,Math.min(100,oz*f));
      const mx=(cx-op.x)/oz;const my=(cy-op.y)/oz;
      const np={x:cx-mx*nz,y:cy-my*nz};
      setZoom(nz);setPan(np);zRef.current=nz;pRef.current=np;
    };
    el.addEventListener('wheel',handler,{passive:false});
    return ()=>el.removeEventListener('wheel',handler);
  },[]);

  // Click — walk up from target, match state/burg IDs and text labels
  const handleClick=useCallback(e=>{
    let el=e.target;
    while(el&&el.tagName!=='svg'){
      const id=el.id||'';
      // State regions
      if(id.match(/^(state|region)\d+/)){
        const n=parseInt((id.match(/\d+/)||[0])[0]);
        const s=sa(pack?.states)[n];
        if(s&&s.name){setSb({type:"state",d:s,name:s.name||s.fullName});setSideTab("info");return;}
      }
      // Burgs
      if(id.match(/^burg\d+/)){
        const n=parseInt((id.match(/\d+/)||[0])[0]);
        const b=sa(pack?.burgs)[n];
        if(b&&b.name){setSb({type:"burg",d:b,name:b.name});setSideTab("info");return;}
      }
      // Text labels — match name to state or burg
      if(el.tagName==='text'||el.tagName==='tspan'){
        const txt=(el.textContent||'').trim();
        if(txt&&pack){
          const st=sa(pack.states).find(s=>s&&s.name===txt);
          if(st){setSb({type:"state",d:st,name:st.name||st.fullName});setSideTab("info");return;}
          const bg=sa(pack.burgs).find(b=>b&&b.name===txt);
          if(bg){setSb({type:"burg",d:bg,name:bg.name});setSideTab("info");return;}
        }
      }
      el=el.parentElement;
    }
  },[pack]);

  // Mouse drag
  const screenToSvg=(sx,sy)=>{const r=containerRef.current?.getBoundingClientRect();if(!r)return{x:0,y:0};return{x:(sx-r.left-pRef.current.x)/zRef.current,y:(sy-r.top-pRef.current.y)/zRef.current};};
  const startDrag=useCallback(e=>{if(e.button===0){if(selMode){const pt=screenToSvg(e.clientX,e.clientY);setSelStart(pt);setSelRect({x:pt.x,y:pt.y,w:0,h:0});}else{setDrag(true);setDs({x:e.clientX-pRef.current.x,y:e.clientY-pRef.current.y});}}},[selMode]);
  const onDrag=useCallback(e=>{if(selMode&&selStart){const pt=screenToSvg(e.clientX,e.clientY);setSelRect({x:Math.min(selStart.x,pt.x),y:Math.min(selStart.y,pt.y),w:Math.abs(pt.x-selStart.x),h:Math.abs(pt.y-selStart.y)});return;}if(!drag)return;const np={x:e.clientX-ds.x,y:e.clientY-ds.y};setPan(np);pRef.current=np;},[drag,ds,selMode,selStart]);
  const endDrag=useCallback(()=>{if(selMode&&selRect&&selRect.w>5&&selRect.h>5&&pack?.burgs){const found=pack.burgs.filter(b=>b&&b.i&&b.x>=selRect.x&&b.x<=selRect.x+selRect.w&&b.y>=selRect.y&&b.y<=selRect.y+selRect.h);setSelBurgs(found);setSideTab("select");setSelStart(null);return;}setSelStart(null);setSelRect(null);setDrag(false);},[selMode,selRect,pack]);

  // Touch pan/pinch
  const touchRef=useRef({dist:0});
  const onTouchStart=useCallback(e=>{
    if(e.touches.length===1){setDrag(true);setDs({x:e.touches[0].clientX-pRef.current.x,y:e.touches[0].clientY-pRef.current.y});}
    if(e.touches.length===2){const t=e.touches;touchRef.current.dist=Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY);}
  },[]);
  const onTouchMove=useCallback(e=>{e.preventDefault();
    if(e.touches.length===1&&drag){
      const np={x:e.touches[0].clientX-ds.x,y:e.touches[0].clientY-ds.y};setPan(np);pRef.current=np;
    }
    if(e.touches.length===2){
      const t=e.touches;const dist=Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY);
      const f=dist/touchRef.current.dist;if(!f||!isFinite(f))return;
      const rect=containerRef.current.getBoundingClientRect();

function RelationshipWeb({topics,onSelect,onBack}){
  const canvasRef=useRef(null);const frameRef=useRef(null);const nodesRef=useRef([]);const edgesRef=useRef([]);
  const dragRef=useRef(null);const panRef=useRef({x:0,y:0});const zoomRef=useRef(1);const dragStartRef=useRef(null);
  const[selected,setSelected]=useState(null);const[hovered,setHovered]=useState(null);
  const mob=useIsMobile();
  const ASPECTS_MAP={};ASPECTS.forEach(a=>{ASPECTS_MAP[a.id]=a;});UNIVERSE_ASPECTS.forEach(a=>{ASPECTS_MAP[a.id]=a;});
  const ASPECT_COLORS={"characters":"#e8c25e","locations":"#5ea8e8","notable-locations":"#e85e8a","cultures":"#8ae85e","history":"#e8a85e","geography":"#5ee8a8","politics":"#a85ee8","religion-beliefs":"#e85ea8","organizations":"#5e8ae8","military":"#e85e5e","magic-technology":"#a8e85e","economy":"#e8e85e","flora-fauna":"#5ee85e"};
  const getColor=aid=>ASPECT_COLORS[aid]||T.gold;

  useEffect(()=>{
    // Build nodes & edges from topics with relations
    const withRels=topics.filter(t=>(t.relations||[]).length>0);
    const relatedIds=new Set();withRels.forEach(t=>{relatedIds.add(t.id);(t.relations||[]).forEach(r=>relatedIds.add(r.targetId));});
    const relevant=topics.filter(t=>relatedIds.has(t.id));
    if(relevant.length===0){nodesRef.current=[];edgesRef.current=[];return;}

    const canvas=canvasRef.current;if(!canvas)return;
    const W=canvas.parentElement.clientWidth;const H=canvas.parentElement.clientHeight;
    canvas.width=W*2;canvas.height=H*2;canvas.style.width=W+"px";canvas.style.height=H+"px";

    // Init nodes in a circle
    const nodes=relevant.map((t,i)=>{const angle=(i/relevant.length)*Math.PI*2;const r=Math.min(W,H)*0.3;
      return{id:t.id,name:t.name,aspect:t.aspect_id,relCount:(t.relations||[]).length,x:W+Math.cos(angle)*r,y:H+Math.sin(angle)*r,vx:0,vy:0};});
    const nodeMap={};nodes.forEach(n=>nodeMap[n.id]=n);
    const edges=[];const edgeSet=new Set();
    relevant.forEach(t=>{(t.relations||[]).forEach(r=>{const key=[t.id,r.targetId].sort().join(":");if(!edgeSet.has(key)&&nodeMap[r.targetId]){edgeSet.add(key);edges.push({source:t.id,target:r.targetId,label:r.relationship||"related"});}});});
    nodesRef.current=nodes;edgesRef.current=edges;

    // Center pan
    panRef.current={x:0,y:0};zoomRef.current=1;

    // Simulation
    let running=true;let frame=0;
    const simulate=()=>{if(!running)return;
      const ns=nodesRef.current;const es=edgesRef.current;
      // Repulsion
      for(let i=0;i<ns.length;i++){for(let j=i+1;j<ns.length;j++){let dx=ns[j].x-ns[i].x;let dy=ns[j].y-ns[i].y;let d=Math.sqrt(dx*dx+dy*dy)||1;let f=800/(d*d);ns[i].vx-=dx/d*f;ns[i].vy-=dy/d*f;ns[j].vx+=dx/d*f;ns[j].vy+=dy/d*f;}}
      // Attraction along edges
      for(const e of es){const s=nodeMap[e.source],t=nodeMap[e.target];if(!s||!t)continue;let dx=t.x-s.x;let dy=t.y-s.y;let d=Math.sqrt(dx*dx+dy*dy)||1;let f=(d-120)*0.01;s.vx+=dx/d*f;s.vy+=dy/d*f;t.vx-=dx/d*f;t.vy-=dy/d*f;}
      // Center gravity
      for(const n of ns){n.vx+=(W-n.x)*0.001;n.vy+=(H-n.y)*0.001;}
      // Apply with damping
      const damp=frame<60?0.85:0.92;
      for(const n of ns){if(dragRef.current&&dragRef.current.id===n.id)continue;n.vx*=damp;n.vy*=damp;n.x+=n.vx;n.y+=n.vy;}
      // Draw
      const ctx=canvas.getContext("2d");ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.save();ctx.scale(2,2);ctx.translate(panRef.current.x,panRef.current.y);ctx.scale(zoomRef.current,zoomRef.current);
      // Edges
      for(const e of es){const s=nodeMap[e.source],t=nodeMap[e.target];if(!s||!t)continue;
        const isHL=(hovered&&(hovered===e.source||hovered===e.target))||(selected&&(selected===e.source||selected===e.target));
        ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(t.x,t.y);ctx.strokeStyle=isHL?"#c8a24e66":"#2a2a3266";ctx.lineWidth=isHL?2:1;ctx.stroke();
        if(isHL&&e.label){const mx=(s.x+t.x)/2,my=(s.y+t.y)/2;ctx.fillStyle="#7a7670";ctx.font="9px 'Source Sans 3',sans-serif";ctx.textAlign="center";ctx.fillText(e.label,mx,my-4);}}
      // Nodes
      for(const n of ns){const isSel=selected===n.id;const isHL=hovered===n.id;const isConn=selected&&(es.some(e=>(e.source===selected&&e.target===n.id)||(e.target===selected&&e.source===n.id)));
        const radius=Math.max(6,Math.min(16,4+n.relCount*2));const col=getColor(n.aspect);
        ctx.beginPath();ctx.arc(n.x,n.y,radius+(isSel?3:isHL?2:0),0,Math.PI*2);
        ctx.fillStyle=isSel?col:(isConn?col+"cc":(isHL?col+"aa":col+"66"));ctx.fill();
        if(isSel||isHL){ctx.strokeStyle=col;ctx.lineWidth=2;ctx.stroke();}
        // Label
        const showLabel=isSel||isHL||isConn||ns.length<30;
        if(showLabel){ctx.fillStyle=isSel||isHL?"#e8e4dc":(isConn?"#b8b4ac":"#7a7670");ctx.font=(isSel?"600 ":"")+"11px 'Source Sans 3',sans-serif";ctx.textAlign="center";ctx.fillText(n.name,n.x,n.y-radius-5);}}
      ctx.restore();
      frame++;frameRef.current=requestAnimationFrame(simulate);
    };
    frameRef.current=requestAnimationFrame(simulate);
    return()=>{running=false;if(frameRef.current)cancelAnimationFrame(frameRef.current);};
  },[topics]);

  // Mouse/touch handlers
  const getPos=e=>{const r=canvasRef.current.getBoundingClientRect();const x=(e.clientX-r.left)/zoomRef.current-panRef.current.x;const y=(e.clientY-r.top)/zoomRef.current-panRef.current.y;return{x,y};};
  const findNode=(pos)=>{const ns=nodesRef.current;for(let i=ns.length-1;i>=0;i--){const dx=ns[i].x-pos.x,dy=ns[i].y-pos.y;const r=Math.max(6,Math.min(16,4+ns[i].relCount*2))+4;if(dx*dx+dy*dy<r*r)return ns[i];}return null;};
  const onDown=e=>{const pos=getPos(e.touches?e.touches[0]:e);const node=findNode(pos);if(node){dragRef.current=node;dragStartRef.current=pos;}else{dragStartRef.current={x:e.clientX||e.touches[0].clientX,y:e.clientY||e.touches[0].clientY,panX:panRef.current.x,panY:panRef.current.y};}};
  const onMove=e=>{e.preventDefault();const ev=e.touches?e.touches[0]:e;if(dragRef.current){const pos=getPos(ev);dragRef.current.x=pos.x;dragRef.current.y=pos.y;dragRef.current.vx=0;dragRef.current.vy=0;}else if(dragStartRef.current&&dragStartRef.current.panX!==undefined){const dx=(ev.clientX-dragStartRef.current.x)/zoomRef.current;const dy=(ev.clientY-dragStartRef.current.y)/zoomRef.current;panRef.current={x:dragStartRef.current.panX+dx,y:dragStartRef.current.panY+dy};}else{const pos=getPos(ev);const n=findNode(pos);setHovered(n?n.id:null);}};
  const onUp=e=>{if(dragRef.current&&dragStartRef.current){const pos=getPos(e.changedTouches?e.changedTouches[0]:e);const dx=pos.x-dragStartRef.current.x,dy=pos.y-dragStartRef.current.y;if(dx*dx+dy*dy<25){setSelected(s=>s===dragRef.current.id?null:dragRef.current.id);}}dragRef.current=null;dragStartRef.current=null;};
  const onWheel=e=>{e.preventDefault();const f=e.deltaY<0?1.1:1/1.1;zoomRef.current=Math.max(0.3,Math.min(3,zoomRef.current*f));};

  // Info panel for selected node
  const selTopic=selected?topics.find(t=>t.id===selected):null;
  const selRels=selTopic?.relations||[];

  return(<div style={{height:"100%",display:"flex",flexDirection:mob?"column":"row",background:T.bg}}>
    <div style={{flex:1,position:"relative",overflow:"hidden"}} onWheel={onWheel}>
      <canvas ref={canvasRef} style={{cursor:dragRef.current?"grabbing":"grab",touchAction:"none"}} onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp} onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}/>
      {nodesRef.current.length===0&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}><div style={{fontSize:48,opacity:.3}}>🕸️</div><div style={{color:T.txD,fontSize:14}}>No relationships yet. Link topics with 🔗 on any card.</div></div>}
      <div style={{position:"absolute",bottom:mob?8:12,left:mob?8:12,display:"flex",gap:4,flexWrap:"wrap"}}>{Object.entries(ASPECT_COLORS).slice(0,8).map(([aid,col])=><div key={aid} style={{display:"flex",alignItems:"center",gap:3,padding:"2px 6px",background:T.sf+"cc",borderRadius:4,fontSize:9,color:T.txD}}><div style={{width:8,height:8,borderRadius:4,background:col}}/>{ASPECTS_MAP[aid]?.name||aid}</div>)}</div>
    </div>
    {selTopic&&<div style={{width:mob?"100%":280,height:mob?"40vh":"auto",background:T.sf,borderLeft:mob?"none":"1px solid "+T.bd,borderTop:mob?"1px solid "+T.bd:"none",overflowY:"auto",padding:14,flexShrink:0}}>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:T.gold,marginBottom:4}}>{selTopic.name}</div>
      <div style={{display:"flex",gap:4,marginBottom:8}}>{selTopic.subcategory&&<Tag label={selTopic.subcategory} active/>}<Tag label={ASPECTS_MAP[selTopic.aspect_id]?.name||selTopic.aspect_id}/></div>
      {selTopic.brief&&<div style={{fontSize:12,color:T.txM,lineHeight:1.4,marginBottom:10}}>{selTopic.brief}</div>}
      <div style={{fontSize:10,color:T.goldD,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Connections ({selRels.length})</div>
      {selRels.map((r,i)=><button key={i} onClick={()=>{setSelected(r.targetId);}} style={{display:"block",width:"100%",padding:"6px 8px",marginBottom:3,background:T.bg,border:"1px solid "+T.bd,borderRadius:6,cursor:"pointer",textAlign:"left",color:T.tx,fontSize:11}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}>
        <span style={{marginRight:4}}>{ASPECTS_MAP[r.targetAspect]?.icon||"?"}</span><span style={{color:T.gold}}>{r.targetName}</span>{r.relationship&&<span style={{color:T.txD}}>{" · "+r.relationship}</span>}
      </button>)}
      <div style={{display:"flex",gap:6,marginTop:12}}><Btn sm onClick={()=>{if(onSelect)onSelect(selTopic);}}>Open Card</Btn></div>
    </div>}
  </div>);
}

      <div style={{fontSize:11,color:T.txD,marginBottom:8,textAlign:"center"}}>— or paste manually —</div>
      <textarea value={impTxt} onChange={e=>setImpTxt(e.target.value)} placeholder="Paste JSON (v5 or v6)..." rows={mob?6:10} style={{width:"100%",resize:"vertical",padding:mob?10:14,borderRadius:8,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:mob?12:13,fontFamily:"monospace",outline:"none"}}/>
      {impTxt&&<div style={{fontSize:11,color:T.accent,marginTop:4}}>{(impTxt.length/1024).toFixed(1)}KB loaded</div>}
      <div style={{display:"flex",gap:8,marginTop:12}}><Btn onClick={doImport} disabled={!impTxt.trim()}>Import</Btn><Btn v="s" onClick={()=>{setImpTxt("");setScr("settings");}}>Cancel</Btn></div>
    </div></>);

  return S(<div style={{padding:40,textAlign:"center",color:T.txD}}>Loading...</div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
