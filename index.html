<style>

.feature-badge.active{background:#c8a24e22;border-color:#c8a24e55;color:#e8c25e}

<body><div id="root"></div>
<script>
// === IDB ===
const IDB={_db:null,
open(){return new Promise((r,j)=>{if(this._db)return r(this._db);const q=indexedDB.open('worldforge',3);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};q.onsuccess=e=>{this._db=e.target.result;r(this._db);};q.onerror=e=>j(e);});},
async get(k){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>r(t.result===undefined?null:t.result);t.onerror=e=>j(e);});},
async set(k,v){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>r(true);t.onerror=e=>j(e);});},
async del(k){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').delete(k);t.onsuccess=()=>r(true);t.onerror=e=>j(e);});},
async list(p){const d=await this.open();return new Promise((r,j)=>{const ks=[];const rng=IDBKeyRange.bound(p,p+'\uffff');const t=d.transaction('kv','readonly').objectStore('kv').openCursor(rng);t.onsuccess=e=>{const c=e.target.result;if(c){ks.push(c.key);c.continue();}else r(ks);};t.onerror=e=>j(e);});},
async clear(){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').clear();t.onsuccess=()=>r(true);t.onerror=e=>j(e);});}};

// === Config ===
const CARD_TMPL={entity:["characters","organizations"],location:["locations"],notable:["notable-locations","architecture"],system:["magic-technology","politics","economy","languages","education","healthcare","transportation"],culture:["cultures","religion-beliefs","arts-entertainment","food-cuisine","fashion","calendar-time"],event:["history","military","story-elements","cosmology"],creature:["flora-fauna"],geography:["geography"]};
const TMPL_FOR={};Object.entries(CARD_TMPL).forEach(([t,ids])=>ids.forEach(id=>TMPL_FOR[id]=t));

const CAT_RULES=`CATEGORY RULES - follow strictly:
- characters: Named individuals with agency who act and decide.
- locations: Every named place (cities, towns, regions, bodies of water).
- notable-locations: Places with narrative SIGNIFICANCE (capitals, battle sites, holy sites).
- cultures: Shared identity groups (customs, language, values). NOT political structures.
- history: Events that HAPPENED. Tag sub-type: battle/death/revolution/birth/nation-formation/tech-advancement/treaty/disaster.
- politics: Current power structures and governance.
- religion-beliefs: Faith systems, deities, doctrines, clergy.
- organizations: Groups with structure (guilds, factions, orders).
- military: Armed forces, warfare doctrine, standing armies.
- magic-technology: Systems enabling capabilities.
- geography: Physical landscape (mountains, rivers, forests, biomes).
- flora-fauna: Non-person organisms.
- economy: Trade, currency, resources.
- languages: Communication systems, scripts.
CRITICAL: ONLY extract entities EXPLICITLY named in the text. NEVER invent from general knowledge. When uncertain, EXCLUDE.
TIMELINE: If any dates or years are mentioned alongside entities, include "year" field in your response.`;

window.ASPECTS=[
{id:"characters",name:"Characters",icon:"\u{1f464}",topicPrompt:"List every named character mentioned"},
{id:"locations",name:"Locations",icon:"\u{1f3d8}\ufe0f",topicPrompt:"List every named place, city, town, village, region mentioned"},
{id:"notable-locations",name:"Notable Locations",icon:"\u{1f4cd}",topicPrompt:"List every location of narrative significance"},
{id:"cultures",name:"Cultures",icon:"\u{1f3db}\ufe0f",topicPrompt:"List every culture or civilization mentioned"},
{id:"history",name:"History",icon:"\u{1f4dc}",topicPrompt:"List every historical event mentioned. Include year if stated."},
{id:"geography",name:"Geography",icon:"\u{1f5fa}\ufe0f",topicPrompt:"List every physical landscape feature mentioned"},
{id:"politics",name:"Politics",icon:"\u2696\ufe0f",topicPrompt:"List every political entity or government mentioned"},
{id:"religion-beliefs",name:"Religion & Beliefs",icon:"\u{1f56f}\ufe0f",topicPrompt:"List every religion or faith system mentioned"},
{id:"organizations",name:"Organizations",icon:"\u{1f3f4}",topicPrompt:"List every organized group mentioned"},
{id:"military",name:"Military & Warfare",icon:"\u2694\ufe0f",topicPrompt:"List every military force mentioned"},
{id:"magic-technology",name:"Magic / Technology",icon:"\u2728",topicPrompt:"List every magic system or technology mentioned"},
{id:"economy",name:"Economy",icon:"\u{1f4b0}",topicPrompt:"List every economic system mentioned"},
{id:"languages",name:"Languages",icon:"\u{1f524}",topicPrompt:"List every language mentioned"},
{id:"flora-fauna",name:"Flora & Fauna",icon:"\u{1f33f}",topicPrompt:"List every creature or species mentioned"},
{id:"story-elements",name:"Story Elements",icon:"\u{1f4d6}",topicPrompt:"List every plot thread mentioned"},
{id:"cosmology",name:"Cosmology",icon:"\u{1f30c}",topicPrompt:"List every cosmic entity mentioned"},
{id:"calendar-time",name:"Calendar & Time",icon:"\u{1f4c5}",topicPrompt:"List every calendar or festival mentioned"},
{id:"arts-entertainment",name:"Arts & Entertainment",icon:"\u{1f3ad}",topicPrompt:"List every art form mentioned"},
{id:"food-cuisine",name:"Food & Cuisine",icon:"\u{1f37d}\ufe0f",topicPrompt:"List every dish mentioned"},
{id:"fashion",name:"Fashion",icon:"\u{1f458}",topicPrompt:"List every clothing style mentioned"},
{id:"architecture",name:"Architecture",icon:"\u{1f3f0}",topicPrompt:"List every building mentioned"},
{id:"transportation",name:"Transportation",icon:"\u{1f6a2}",topicPrompt:"List every transport system mentioned"},
{id:"education",name:"Education",icon:"\u{1f4da}",topicPrompt:"List every school mentioned"},
{id:"healthcare",name:"Healthcare",icon:"\u{1f3e5}",topicPrompt:"List every medical practice mentioned"},
];
window.MAX_WORLDS=10;

function normTag(t){return t.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');}
function normTags(a){return[...new Set((a||[]).map(normTag).filter(t=>t.length>0))];}
function mkId(){return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);}
function safeArr(v){if(!v)return[];if(Array.isArray(v))return v;if(typeof v==='object')return Object.values(v);return[];}

// === COA (Coat of Arms) Rendering ===
window.coaUrl=function(coa){
  if(!coa)return null;
  try{return"https://armoria.herokuapp.com/?coa="+encodeURIComponent(JSON.stringify(coa));}catch(e){return null;}
};
// MFCG city map link
window.mfcgUrl=function(burg,seed){
  if(!burg)return null;
  const s=seed||burg.MFCG||burg.i||0;
  const size=Math.max(1,Math.min(60,Math.round((burg.population||1)*10)));
  return"https://watabou.github.io/city-generator/?seed="+s+"&size="+size+(burg.port?"&coast=1":"")+(burg.citadel?"&citadel=1":"")+(burg.walls?"&walls=1":"")+(burg.plaza?"&plaza=1":"")+(burg.temple?"&temple=1":"")+(burg.shanty?"&shanty=1":"");
};

// === Enriched Azgaar Parser ===
window.parseAzgaarMap=function(text){
  const R={svg:null,pack:null,params:null,error:null,debug:[]};
  try{
    R.debug.push("Size:"+text.length);
    const ss=text.indexOf('<svg'),se=text.lastIndexOf('</svg>');
    if(ss<0||se<0){R.error="No SVG";return R;}
    R.svg=text.substring(ss,se+6);
    // Params from first line
    const fl=text.substring(0,ss).split('\n')[0].trim();
    if(fl.startsWith('{')){try{R.params=JSON.parse(fl);}catch(e){}}
    // Find pack JSON
    const after=text.substring(se+6);
    const objs=[];let d=0,os=-1;
    for(let i=0;i<after.length;i++){if(after[i]==='{'){if(d===0)os=i;d++;}else if(after[i]==='}'){d--;if(d===0&&os>=0){objs.push({s:os,e:i+1});os=-1;}}}
    for(let i=0;i<objs.length;i++){
      const str=after.substring(objs[i].s,objs[i].e);
      try{const o=JSON.parse(str);if(o.states||o.burgs||o.cultures){R.pack=o;R.debug.push("Pack at "+i);break;}
        if(o.cells||o.vertices){continue;}}catch(e){R.debug.push("Obj "+i+" fail");}
    }
    if(!R.pack)R.error="Pack not found";
  }catch(e){R.error=e.message;}
  return R;
};

// === Enriched topic generation from Azgaar pack ===
window.generateTopicsFromPack=function(pack,wid,params){
  const T=[];if(!pack)return T;
  const states=safeArr(pack.states),burgs=safeArr(pack.burgs),cultures=safeArr(pack.cultures),
    religions=safeArr(pack.religions),rivers=safeArr(pack.rivers),military=safeArr(pack.military),
    provinces=safeArr(pack.provinces),biomes=safeArr(pack.biomes),cells=pack.cells||{};
  const sN={},cN={},rN={},sColor={},sCoa={};
  states.forEach(s=>{if(s&&s.i>0){sN[s.i]=s.name||s.fullName||"State "+s.i;sColor[s.i]=s.color||"";sCoa[s.i]=s.coa||null;}});
  cultures.forEach(c=>{if(c&&c.i>0)cN[c.i]=c.name||"Culture "+c.i;});
  religions.forEach(r=>{if(r&&r.i>0)rN[r.i]=r.name||"Religion "+r.i;});

  // Get biome name for a cell
  const biomeNames=["Marine","Hot desert","Cold desert","Savanna","Grassland","Tropical seasonalForest","Temperate deciduous forest","Tropical rainforest","Temperate rainforest","Taiga","Tundra","Glacier","Wetland"];
  const getBiome=(cellId)=>{
    if(cells.biome&&cells.biome[cellId]!==undefined){const bi=cells.biome[cellId];return biomeNames[bi]||"Biome "+bi;}return"";
  };
  const getElev=(cellId)=>cells.h&&cells.h[cellId]!==undefined?cells.h[cellId]:null;
  const getTemp=(cellId)=>cells.temp&&cells.temp[cellId]!==undefined?cells.temp[cellId]:null;

  // World year from params
  const worldYear=params?.options?.year||params?.year||null;
  const eraName=params?.options?.eraName||params?.eraName||"";

  // === STATES -> politics ===
  states.forEach(s=>{
    if(!s||!s.i||s.i===0||s.removed)return;
    const cap=s.capital&&burgs[s.capital]?burgs[s.capital]:null;
    const cult=s.culture?cN[s.culture]||"?":"?";
    const rel=s.religion?rN[s.religion]||"?":"?";
    const totalPop=Math.round(((s.rural||0)+(s.urban||0))*1000);
    // Diplomacy
    const diplo=[];
    if(s.diplomacy)s.diplomacy.forEach((d,i)=>{if(i>0&&d&&d!=="x"&&d!=="Neutral"&&sN[i])diplo.push(sN[i]+": "+d);});
    // Provinces
    const provs=provinces.filter(p=>p&&p.state===s.i&&p.name).map(p=>p.fullName||p.name);

    T.push({id:"azg-state-"+s.i,name:s.fullName||s.name,brief:(s.fullName||s.name)+", "+cult+" "+(s.form||"state")+". Pop: "+totalPop.toLocaleString(),
      template:"system",tags:normTags([s.form||"",cult,"state",s.name]),aspect_id:"politics",world_id:wid,source:"azgaar",
      coa:s.coa||null,color:s.color||"",born_year:null,died_year:null,timeline:[],
      fields:{principle:"Government: "+(s.form||"Unknown"),
        components:["Total population: "+totalPop.toLocaleString(),"Rural: "+Math.round((s.rural||0)*1000).toLocaleString(),"Urban: "+Math.round((s.urban||0)*1000).toLocaleString(),"Area: "+(s.area?Math.round(s.area):"?")+" cells"],
        practitioners:"Culture: "+cult+"\nReligion: "+rel,effects:"Capital: "+(cap?cap.name:"?")+"\n"+(provs.length?"Provinces: "+provs.join(", "):""),
        limitations:diplo.length?"Diplomacy:\n"+diplo.join("\n"):"",origin:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // === BURGS -> locations + notable-locations ===
  burgs.forEach(b=>{
    if(!b||!b.i||b.i===0||!b.name)return;
    const st=b.state?sN[b.state]||"Unclaimed":"Unclaimed";
    const cult=b.culture?cN[b.culture]||"?":"?";
    const rel=b.religion?rN[b.religion]||"?":"?";
    const pop=Math.round((b.population||0)*1000);
    const feats=[];
    if(b.capital)feats.push("Capital");if(b.port)feats.push("Port");if(b.citadel)feats.push("Citadel");
    if(b.walls)feats.push("Walled");if(b.plaza)feats.push("Market");if(b.temple)feats.push("Temple");if(b.shanty)feats.push("Shantytown");
    const biome=b.cell?getBiome(b.cell):"";
    const elev=b.cell?getElev(b.cell):null;
    const temp=b.cell?getTemp(b.cell):null;
    const tags=normTags([st,cult,...feats,b.name,biome]);
    const mfcg=mfcgUrl(b);
    const coa=b.coa||null;

    T.push({id:"azg-loc-"+b.i,name:b.name,brief:b.name+(b.capital?" (capital)":"")+", "+st+". Pop: "+pop.toLocaleString(),
      template:"location",tags,aspect_id:"locations",world_id:wid,source:"azgaar",
      coa,mfcg_url:mfcg,coords:{x:b.x||0,y:b.y||0},born_year:null,died_year:null,timeline:[],
      fields:{type:feats.length?feats.join(", "):"Settlement",region:st,population:pop.toLocaleString(),
        government:st,culture:cult,religion:rel,
        climate:(biome||"")+(temp!==null?" ("+temp+"\u00b0)":""),
        resources:"Elevation: "+(elev!==null?elev:"?"),
        features:feats,mfcg_url:mfcg},
      created:new Date().toISOString(),updated:new Date().toISOString()});

    if(b.capital||feats.length>=2){
      T.push({id:"azg-notable-"+b.i,name:b.name,brief:b.name+" — "+(b.capital?"Capital of "+st:feats.join(", ")),
        template:"notable",tags:[...tags,"notable"],aspect_id:"notable-locations",world_id:wid,source:"azgaar",
        coa,mfcg_url:mfcg,coords:{x:b.x||0,y:b.y||0},born_year:null,died_year:null,timeline:[],
        fields:{significance:b.capital?"Capital of "+st:"Notable for "+feats.join(", "),
          physical_desc:feats.join(", ")+(biome?" in "+biome:""),history_events:"",connected_entities:st+", "+cult,history:"Pop: "+pop.toLocaleString()},
        created:new Date().toISOString(),updated:new Date().toISOString()});
    }
  });

  // === CULTURES ===
  cultures.forEach(c=>{
    if(!c||!c.i||c.i===0||c.removed)return;
    const parentCulture=c.base!==undefined&&cN[c.base]?cN[c.base]:"Indigenous";
    const shieldShape=c.shield||"heater";
    T.push({id:"azg-culture-"+c.i,name:c.name||"Culture "+c.i,
      brief:(c.name||"")+" — "+(c.type||"")+" culture"+(c.base?" (from "+parentCulture+")":""),
      template:"culture",tags:normTags([c.type||"",c.name,"culture"]),aspect_id:"cultures",world_id:wid,source:"azgaar",
      coa:c.coa||null,born_year:null,died_year:null,timeline:[],
      fields:{origin:"Type: "+(c.type||"?")+"\nDerived from: "+parentCulture+"\nShield style: "+shieldShape,
        values_beliefs:"",customs_practices:"Naming method: "+(c.code||"default"),
        art_expression:"",social_structure:"",language:"",relations:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // === RELIGIONS ===
  religions.forEach(r=>{
    if(!r||!r.i||r.i===0||r.removed)return;
    const originCult=r.culture!==undefined?cN[r.culture]||"?":"?";
    T.push({id:"azg-religion-"+r.i,name:r.name||"Religion "+r.i,
      brief:(r.name||"")+" — "+(r.form||"")+" "+(r.type||"religion")+". Origin: "+originCult,
      template:"culture",tags:normTags([r.type||"",r.form||"",r.name,"religion"]),aspect_id:"religion-beliefs",world_id:wid,source:"azgaar",
      born_year:null,died_year:null,timeline:[],
      fields:{origin:"Type: "+(r.type||"?")+"\nForm: "+(r.form||"?")+"\nOrigin culture: "+originCult,
        values_beliefs:r.deity?"Central deity: "+r.deity:"No central deity",
        customs_practices:"",art_expression:"",social_structure:"",language:"",relations:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // === RIVERS -> geography ===
  rivers.forEach(rv=>{
    if(!rv||!rv.i||!rv.name)return;
    T.push({id:"azg-river-"+rv.i,name:rv.name+(rv.type&&rv.type!=="River"?" ("+rv.type+")":""),
      brief:rv.name+" — "+(rv.type||"river")+", length "+(rv.length?Math.round(rv.length):"?"),
      template:"geography",tags:normTags([rv.type||"river",rv.name,"geography"]),aspect_id:"geography",world_id:wid,source:"azgaar",
      born_year:null,died_year:null,timeline:[],
      fields:{type:rv.type||"River",scale:"Length: "+(rv.length?Math.round(rv.length):"?"),
        physical_desc:"",climate_ecology:"Basin: "+(rv.basin||"?"),resources:"",connected:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // === MILITARY ===
  military.forEach((m,idx)=>{
    if(!m||idx===0)return;const units=safeArr(m);if(!units.length)return;
    const sn=sN[idx]||"State "+idx;
    const regs=units.map(r=>(r.name||"Unit")+" ("+(r.type||"?")+": "+(r.n||0)+")").slice(0,15);
    T.push({id:"azg-mil-"+idx,name:sn+" Armed Forces",brief:"Military of "+sn+" — "+units.length+" regiments",
      template:"system",tags:normTags([sn,"military"]),aspect_id:"military",world_id:wid,source:"azgaar",
      born_year:null,died_year:null,timeline:[],
      fields:{principle:sn+" military forces",composition:regs,command:sn,doctrine:"",
        campaigns:[],strengths:"Total: "+units.length+" regiments",limitations:"",origin:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  return T;
};

// === Data Layer ===
window.db={
  async listWorlds(){const ks=await IDB.list("world:");const ws=[];for(const k of ks){const w=await IDB.get(k);if(w)ws.push(w);}ws.sort((a,b)=>(a.created||"").localeCompare(b.created||""));return ws;},
  async createWorld(n,desc,calName,curYear){const id=n.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40)+'-'+Math.random().toString(36).slice(2,8);const m={id,name:n,description:desc||"",calendar_name:calName||"Year",current_year:parseInt(curYear)||0,viewing_year:parseInt(curYear)||0,eras:[],created:new Date().toISOString(),updated:new Date().toISOString()};await IDB.set("world:"+id,m);await IDB.set("bible:"+id,{world_id:id,world_name:n,last_updated:new Date().toISOString(),facts:{}});return m;},
  async saveWorld(w){w.updated=new Date().toISOString();return IDB.set("world:"+w.id,w);},
  async deleteWorld(wid){await IDB.del("world:"+wid);await IDB.del("bible:"+wid);await IDB.del("mapsvg:"+wid);await IDB.del("mappack:"+wid);const ck=await IDB.list("chat:"+wid+":");for(const k of ck)await IDB.del(k);const tk=await IDB.list("topic:"+wid+":");for(const k of tk)await IDB.del(k);},
  async getBible(wid){return(await IDB.get("bible:"+wid))||{world_id:wid,facts:{}};},
  async saveBible(wid,b){b.last_updated=new Date().toISOString();return IDB.set("bible:"+wid,b);},
  async addFact(wid,cat,key,val){if(!wid)return false;const b=await this.getBible(wid);if(!b.facts)b.facts={};const c=cat.toLowerCase().replace(/\s+/g,'-');if(!b.facts[c])b.facts[c]={};b.facts[c][key]=val;await this.saveBible(wid,b);return true;},
  async listChats(wid,aid){const ks=await IDB.list("chat:"+wid+":"+aid+":");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createChat(wid,aid,title){const id=mkId();const ch={id,world_id:wid,aspect_id:aid,title:title||("Chat "+new Date().toLocaleString()),created:new Date().toISOString(),updated:new Date().toISOString(),messages:[]};await IDB.set("chat:"+wid+":"+aid+":"+id,ch);return ch;},
  async saveChat(c){c.updated=new Date().toISOString();return IDB.set("chat:"+c.world_id+":"+c.aspect_id+":"+c.id,c);},
  async loadChat(wid,aid,cid){return IDB.get("chat:"+wid+":"+aid+":"+cid);},
  async listGeneralChats(){const ks=await IDB.list("chat:__general__:__general__:");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createGeneralChat(t){return this.createChat("__general__","__general__",t);},
  async fileNote(wid,aid,text){const chats=await this.listChats(wid,aid);let tgt=chats.find(c=>c.title==="Cross-World Notes");if(tgt)tgt=await this.loadChat(wid,aid,tgt.id);if(!tgt)tgt=await this.createChat(wid,aid,"Cross-World Notes");tgt.messages.push({role:"user",content:text,timestamp:new Date().toISOString(),source:"cross-world"});await this.saveChat(tgt);},
  async gatherAspectText(wid,aid){const chats=await this.listChats(wid,aid);const ts=[];for(const ch of chats){const f=await this.loadChat(wid,aid,ch.id);if(f)for(const m of f.messages||[])ts.push(m.content||"");}return ts.join("\n\n");},
  async gatherAllText(wid){let all="";for(const a of ASPECTS){const t=await this.gatherAspectText(wid,a.id);if(t)all+="\n["+a.name+"]\n"+t;}const w=await this.gatherAspectText(wid,"__worldchat__");if(w)all+="\n[World Chat]\n"+w;return all;},
  // Topics with timeline
  async saveTopic(t){t.updated=new Date().toISOString();t.tags=normTags(t.tags);if(!t.timeline)t.timeline=[];if(t.born_year===undefined)t.born_year=null;if(t.died_year===undefined)t.died_year=null;await IDB.set("topic:"+t.world_id+":"+t.aspect_id+":"+t.id,t);return t;},
  async listTopics(wid,aid){const ks=await IDB.list("topic:"+wid+":"+aid+":");const ts=[];for(const k of ks){const t=await IDB.get(k);if(t)ts.push(t);}ts.sort((a,b)=>(a.name||"").localeCompare(b.name||""));return ts;},
  async deleteTopic(wid,aid,tid){return IDB.del("topic:"+wid+":"+aid+":"+tid);},
  async countTopics(wid,aid){return(await IDB.list("topic:"+wid+":"+aid+":")).length;},
  async listAllTags(wid){const ks=await IDB.list("topic:"+wid+":");const tags={};for(const k of ks){const t=await IDB.get(k);if(t&&t.tags)for(const tg of t.tags)tags[tg]=(tags[tg]||0)+1;}return Object.entries(tags).sort((a,b)=>b[1]-a[1]).map(([t,c])=>({tag:t,count:c}));},
  // Filter topics by viewing year
  filterByYear(topics,year){if(year===null||year===undefined)return topics;return topics.filter(t=>{const born=t.born_year;const died=t.died_year;if(born!==null&&year<born)return false;if(died!==null&&year>died)return false;return true;});},
  // Add timeline event to topic
  async addTimelineEvent(wid,aid,tid,year,event,changes){const t=await IDB.get("topic:"+wid+":"+aid+":"+tid);if(!t)return;if(!t.timeline)t.timeline=[];t.timeline.push({year,event,changes:changes||{},added:new Date().toISOString()});t.timeline.sort((a,b)=>a.year-b.year);await this.saveTopic(t);return t;},
  // Get topic state at a given year (apply timeline events up to that year)
  getTopicAtYear(topic,year){if(!topic||year===null||year===undefined)return topic;const t={...topic,fields:{...(topic.fields||{})}};if(!t.timeline||!t.timeline.length)return t;for(const ev of t.timeline){if(ev.year<=year&&ev.changes){Object.entries(ev.changes).forEach(([k,v])=>{t.fields[k]=v;});}}return t;},
  async getWorldSummary(wid){const b=await this.getBible(wid);const f=b.facts||{};const p=[];for(const[c,e] of Object.entries(f)){const k=Object.keys(e).slice(0,3);if(k.length)p.push(c.replace(/-/g,' ')+": "+k.join(", "));}return p.slice(0,4).join(". ")||"New world";},
  // Map
  async saveMapSvg(wid,svg){return IDB.set("mapsvg:"+wid,svg);},
  async getMapSvg(wid){return IDB.get("mapsvg:"+wid);},
  async saveMapPack(wid,pack){return IDB.set("mappack:"+wid,pack);},
  async getMapPack(wid){return IDB.get("mappack:"+wid);},
  async hasMap(wid){return!!(await IDB.get("mapsvg:"+wid));},
  async importAzgaarMap(wid,fileText){
    const parsed=parseAzgaarMap(fileText);if(parsed.error)return{error:parsed.error,debug:parsed.debug};
    if(parsed.svg)await this.saveMapSvg(wid,parsed.svg);
    // Auto-set world year from params
    if(parsed.params){const w=await IDB.get("world:"+wid);if(w){
      if(parsed.params.options?.year)w.current_year=parsed.params.options.year;
      if(parsed.params.options?.era)w.calendar_name=parsed.params.options.era;
      if(parsed.params.mapName)w.name=w.name||parsed.params.mapName;
      await this.saveWorld(w);}}
    if(parsed.pack){await this.saveMapPack(wid,parsed.pack);
      const topics=generateTopicsFromPack(parsed.pack,wid,parsed.params);
      let added=0;for(const t of topics){const ex=await IDB.get("topic:"+wid+":"+t.aspect_id+":"+t.id);if(!ex){await this.saveTopic(t);added++;}else{await this.saveTopic({...ex,fields:{...(ex.fields||{}),...(t.fields||{})},tags:normTags([...(ex.tags||[]),...(t.tags||[])]),coa:t.coa||ex.coa,mfcg_url:t.mfcg_url||ex.mfcg_url,coords:t.coords||ex.coords});}}
      return{added,total:topics.length,debug:parsed.debug};}
    return{added:0,total:0,debug:parsed.debug};},
  async importJsonExport(wid,jsonText){
    let pack;try{pack=JSON.parse(jsonText);}catch(e){return{error:"Invalid JSON"};}
    if(pack.pack)pack=pack.pack;if(!pack.states&&!pack.burgs)return{error:"No states/burgs. Keys: "+Object.keys(pack).slice(0,10).join(",")};
    await this.saveMapPack(wid,pack);
    const topics=generateTopicsFromPack(pack,wid);
    let added=0;for(const t of topics){const ex=await IDB.get("topic:"+wid+":"+t.aspect_id+":"+t.id);if(!ex){await this.saveTopic(t);added++;}else{await this.saveTopic({...ex,fields:{...(ex.fields||{}),...(t.fields||{})},tags:normTags([...(ex.tags||[]),...(t.tags||[])]),coa:t.coa||ex.coa,mfcg_url:t.mfcg_url||ex.mfcg_url,coords:t.coords||ex.coords});}}
    return{added,total:topics.length};},
  // Export
  async exportAll(){const data={version:"worldforge-v5",exported:new Date().toISOString(),worlds:[],bibles:[],chats:[],topics:[],generalChats:[]};const ws=await this.listWorlds();for(const w of ws){data.worlds.push(w);data.bibles.push({wid:w.id,...(await this.getBible(w.id))});for(const asp of ASPECTS){const cs=await this.listChats(w.id,asp.id);for(const ch of cs){const f=await this.loadChat(w.id,asp.id,ch.id);if(f)data.chats.push(f);}const tps=await this.listTopics(w.id,asp.id);for(const t of tps)data.topics.push(t);}const wgc=await this.listChats(w.id,"__worldchat__");for(const ch of wgc){const f=await this.loadChat(w.id,"__worldchat__",ch.id);if(f)data.chats.push(f);}}const gc=await this.listGeneralChats();for(const ch of gc){const f=await this.loadChat("__general__","__general__",ch.id);if(f)data.generalChats.push(f);}return data;},
  async importAll(data){let ct={worlds:0,chats:0,topics:0};for(const w of data.worlds||[]){await IDB.set("world:"+w.id,w);ct.worlds++;}for(const b of data.bibles||[]){const wid=b.wid||b.world_id;if(wid)await IDB.set("bible:"+wid,b);}for(const c of data.chats||[]){await IDB.set("chat:"+c.world_id+":"+c.aspect_id+":"+c.id,c);ct.chats++;}for(const c of data.generalChats||[]){await IDB.set("chat:__general__:__general__:"+c.id,c);ct.chats++;}for(const t of data.topics||[]){await IDB.set("topic:"+t.world_id+":"+t.aspect_id+":"+t.id,t);ct.topics++;}return ct;},
  async getApiKey(){return IDB.get("_apikey");},async setApiKey(k){return IDB.set("_apikey",k);},
  async getProvider(){return(await IDB.get("_provider"))||"claude";},async setProvider(p){return IDB.set("_provider",p);},
  async getCustomEndpoint(){return(await IDB.get("_custom_endpoint"))||"";},async setCustomEndpoint(u){return IDB.set("_custom_endpoint",u);},
};

// === Multi-Provider AI ===
window.aiCall=async function(sys,msgs,mt){mt=mt||1500;const key=await db.getApiKey();if(!key)return"[No API key.]";const prov=await db.getProvider();
try{if(prov==="deepseek"){const r=await fetch("https://api.deepseek.com/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:"deepseek-chat",max_tokens:mt,messages:[{role:"system",content:sys},...msgs.map(m=>({role:m.role,content:m.content}))]})});if(!r.ok){const e=await r.json().catch(()=>({}));return"DeepSeek error: "+(e.error?.message||r.statusText);}const d=await r.json();return d.choices?.[0]?.message?.content||"No response.";}
if(prov==="custom"){const ep=await db.getCustomEndpoint();if(!ep)return"[No custom endpoint.]";const r=await fetch(ep,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:"default",max_tokens:mt,messages:[{role:"system",content:sys},...msgs.map(m=>({role:m.role,content:m.content}))]})});if(!r.ok)return"Custom API error "+r.status;const d=await r.json();return d.choices?.[0]?.message?.content||d.content?.[0]?.text||"No response.";}
const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:mt,system:sys,messages:msgs.map(m=>({role:m.role,content:m.content}))})});if(!r.ok){const e=await r.json().catch(()=>({}));return"Claude error: "+(e.error?.message||r.statusText);}const d=await r.json();return d.content?.map(b=>b.text||"").join("")||"No response.";}catch(e){return"Error: "+e.message;}};

// Prompts
window.buildExtractPrompt=function(aspect){return CAT_RULES+'\n\nExtract for "'+aspect.id+'" category. '+aspect.topicPrompt+'.\nFor EACH entity: {"name","brief","tags":[2-5]'+(aspect.id==="history"?',"hist_type":"battle|death|revolution|birth|nation-formation|tech-advancement|treaty|disaster|general","year":number_or_null':',\"year\":number_or_null')+'}\nReturn ONLY a JSON array. If nothing found: []';};
window.buildLorePrompt=function(name,wn){return'Compile ALL information about "'+name+'" in "'+wn+'" from the text below into comprehensive prose paragraphs. Include every detail mentioned. Only use provided text.';};

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>

<script type="text/babel" data-type="module">
const {useState,useEffect,useCallback,useRef}=React;
const ASPECTS=window.ASPECTS,MAX_WORLDS=window.MAX_WORLDS,db=window.db,aiCall=window.aiCall;
const TMPL_FOR=window.TMPL_FOR||{},CAT_RULES=window.CAT_RULES||"";
const T={bg:"#0a0a0c",sf:"#141418",sf2:"#1a1a20",sfH:"#222228",card:"#16161c",bd:"#2a2a32",
  gold:"#c8a24e",goldD:"#8a7030",goldB:"#e8c25e",tx:"#e8e4dc",txD:"#7a7670",txM:"#b8b4ac",
  red:"#8a3a3a",redTx:"#d46a6a",accent:"#3a6a5a"};
const iS={width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid "+T.bd,background:T.bg,color:T.tx,fontSize:14,fontFamily:"inherit",outline:"none"};
const pL=v=>typeof v==='string'?v.split(/[,;]\s*/).filter(Boolean):Array.isArray(v)?v:v?[String(v)]:[];

// === Shared Components ===
function Modal({open,title,children,onClose,wide}){if(!open)return null;return(<div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}><div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)"}}/><div style={{position:"relative",background:T.sf,border:"1px solid "+T.bd,borderRadius:12,padding:24,width:"100%",maxWidth:wide?750:420,maxHeight:"90vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>{title&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.gold,marginBottom:16}}>{title}</div>}{children}</div></div>);}
function Btn({children,onClick,v="p",full,sm,disabled,style:s}){const m={p:{background:T.gold,color:T.bg,fontWeight:600},s:{background:T.sf2,color:T.tx,border:"1px solid "+T.bd},g:{background:"none",color:T.gold},d:{background:T.red,color:"#fff"},a:{background:T.accent,color:T.tx}};return(<button onClick={onClick} disabled={disabled} style={{...m[v],border:m[v].border||"none",padding:sm?"5px 12px":"10px 20px",borderRadius:8,fontSize:sm?12:14,cursor:disabled?"default":"pointer",width:full?"100%":"auto",fontFamily:"inherit",opacity:disabled?0.4:1,...s}}>{children}</button>);}
function Tag({label,onClick,active}){return(<span onClick={onClick} style={{display:"inline-block",padding:"3px 10px",borderRadius:12,fontSize:11,fontWeight:500,cursor:onClick?"pointer":"default",background:active?T.gold+"33":T.sf2,color:active?T.gold:T.txM,border:"1px solid "+(active?T.gold+"55":T.bd)}}>{label}</span>);}
function Bub({msg}){const u=msg.role==="user";return(<div style={{display:"flex",justifyContent:u?"flex-end":"flex-start",padding:"4px 0",maxWidth:700}}><div style={{maxWidth:"75%",padding:"10px 16px",borderRadius:u?"14px 14px 4px 14px":"14px 14px 14px 4px",background:u?T.gold+"1a":T.sf2,border:"1px solid "+(u?T.gold+"33":T.bd),fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",color:T.tx}}>{msg.content}{msg._filed&&msg._filed.length>0&&<div style={{fontSize:11,color:T.goldD,marginTop:6,borderTop:"1px solid "+T.bd,paddingTop:4}}>{msg._filed.map((f,i)=><div key={i}>{"📁 "+f}</div>)}</div>}</div></div>);}
function FBox({label,val}){if(!val||val==="Unknown"||val==="?")return null;return(<div style={{padding:"12px 14px",background:T.bg,borderRadius:8,border:"1px solid "+T.bd,marginBottom:10}}><div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:T.goldD,marginBottom:4}}>{label}</div><div style={{fontSize:13,color:T.txM,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{val}</div></div>);}
function FList({label,val}){const items=pL(val);if(!items.length||items[0]==="Unknown")return null;return(<div style={{marginBottom:10}}><div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:T.goldD,marginBottom:3}}>{label}</div>{items.map((v,i)=><div key={i} style={{fontSize:13,color:T.txM,paddingLeft:8}}>{"• "+v}</div>)}</div>);}

// === COA Emblem Component ===
function CoaImg({coa,size}){
  const url=window.coaUrl(coa);
  if(!url)return(<div style={{width:size||80,height:size||96,background:T.sf2,borderRadius:4,border:"1px solid "+T.bd,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:24,opacity:.3}}>🛡️</span></div>);
  return(<img src={url} className="coa-img" style={{width:size||80,height:size||96,objectFit:"contain"}} onError={e=>{e.target.style.display="none";}} alt="Emblem"/>);
}

// === Feature Badges ===
function FeatureBadges({feats}){const items=pL(feats);if(!items.length)return null;return(<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>{items.map(f=><span key={f} className={"feature-badge active"}>{f}</span>)}</div>);}

// === Timeline Viewer on Card ===
function TimelineView({timeline,viewYear}){
  if(!timeline||!timeline.length)return null;
  return(<div style={{marginTop:12,padding:"12px 14px",background:T.bg,borderRadius:8,border:"1px solid "+T.bd}}>
    <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1,color:T.goldD,marginBottom:8}}>Timeline</div>
    {timeline.map((ev,i)=>{const past=viewYear===null||viewYear===undefined||ev.year<=viewYear;
      return(<div key={i} style={{display:"flex",gap:10,opacity:past?1:0.4}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}><div className={"timeline-dot"+(past?" active":"")}/>{i<timeline.length-1&&<div className="timeline-line"/>}</div>
        <div style={{paddingBottom:8}}><div style={{fontSize:12,fontWeight:600,color:past?T.gold:T.txD}}>Year {ev.year}</div><div style={{fontSize:12,color:T.txM}}>{ev.event}</div></div>
      </div>);})}
  </div>);
}

// === CARD VIEW ===
function CardView({topic,viewYear,compiledLore,onRefreshLore,loadingLore}){
  if(!topic)return null;
  const tmpl=TMPL_FOR[topic.aspect_id]||"culture";
  const displayed=viewYear!==null&&viewYear!==undefined?db.getTopicAtYear(topic,viewYear):topic;
  const f=displayed.fields||{};
  const histType=topic.hist_type||topic.tags?.find(t=>["battle","death","revolution","birth","nation-formation","tech-advancement","treaty","disaster"].includes(t))||"general";
  const hasCoa=!!topic.coa;const hasMfcg=!!topic.mfcg_url;

  const header=(<div style={{padding:"20px 24px 16px",borderBottom:"1px solid "+T.bd}}>
    <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
      {hasCoa&&<CoaImg coa={topic.coa} size={70}/>}
      <div style={{flex:1}}>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:T.gold}}>{topic.name}</div>
        {topic.brief&&<div style={{fontSize:13,color:T.txM,marginTop:4,fontStyle:"italic",lineHeight:1.5}}>{topic.brief}</div>}
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
          {topic.tags?.map(t=><Tag key={t} label={t}/>)}
          {topic.born_year!==null&&<Tag label={"Born: "+topic.born_year}/>}
          {topic.died_year!==null&&<Tag label={"Died: "+topic.died_year}/>}
          {topic.source==="azgaar"&&<Tag label="📍 Map"/>}
        </div>
      </div>
    </div>
    {hasMfcg&&<div style={{marginTop:8}}><a href={topic.mfcg_url} target="_blank" rel="noopener" style={{fontSize:12,color:T.accent}}>🏘️ View City Map (MFCG)</a></div>}
  </div>);

  const loreBox=(<div style={{padding:"20px 24px",borderTop:"2px solid "+T.bd,background:T.bg+"cc"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:600,color:T.gold,textTransform:"uppercase",letterSpacing:1}}>Compiled Lore</div>
      <Btn sm v="a" onClick={onRefreshLore} disabled={loadingLore}>{loadingLore?"Compiling...":"Compile"}</Btn>
    </div>
    <div style={{fontSize:13,color:T.txM,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{compiledLore||"Click Compile to synthesize all mentions across every chat."}</div>
  </div>);

  const tlBox=<TimelineView timeline={topic.timeline} viewYear={viewYear}/>;

  // === Location Card (enriched) ===
  if(tmpl==="location"){
    return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}
      {f.features&&<div style={{padding:"12px 24px"}}><FeatureBadges feats={f.features}/></div>}
      <div style={{padding:"0 24px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <FBox label="Type" val={f.type}/><FBox label="Region / State" val={f.region}/>
        <FBox label="Population" val={f.population}/><FBox label="Government" val={f.government}/>
        <FBox label="Culture" val={f.culture}/><FBox label="Religion" val={f.religion}/>
        <FBox label="Climate / Biome" val={f.climate}/><FBox label="Elevation" val={f.resources}/>
      </div>{tlBox}{loreBox}</div>);
  }

  // === Notable Location ===
  if(tmpl==="notable"){
    return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}
      {f.significance&&<div style={{padding:"12px 24px",background:T.gold+"0d",borderBottom:"1px solid "+T.bd}}><div style={{fontSize:14,color:T.goldB,fontStyle:"italic"}}>{f.significance}</div></div>}
      <div style={{display:"flex",minHeight:180}}>
        <div style={{flex:1,padding:"16px 24px",borderRight:"1px solid "+T.bd}}><FBox label="Physical Description" val={f.physical_desc}/></div>
        <div style={{flex:1,padding:"16px 24px"}}><FBox label="History & Events" val={f.history_events||f.history}/></div>
      </div><FBox label="Connected Entities" val={f.connected_entities}/>{tlBox}{loreBox}</div>);
  }

  // === Entity (Characters/Organizations) ===
  if(tmpl==="entity"){const isOrg=topic.aspect_id==="organizations";
    return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}
      <div style={{padding:"16px 24px"}}>
        {(f.quote||f.motto)&&<div style={{fontSize:15,fontStyle:"italic",color:T.goldB,padding:"10px 16px",background:T.gold+"0d",borderLeft:"3px solid "+T.gold,borderRadius:4,marginBottom:14}}>{'"'+(f.quote||f.motto)+'"'}</div>}
        <div style={{display:"flex",gap:14,marginBottom:12}}><div style={{flex:1}}><FList label={isOrg?"Leadership":"Skills"} val={isOrg?f.leadership:f.skills}/></div><div style={{flex:1}}><FList label={isOrg?"Goals":"Equipment"} val={isOrg?f.goals:f.equipment}/></div></div>
        <FBox label={isOrg?"Structure":"Personal Information"} val={isOrg?f.membership:f.personal}/>
        <FBox label="History" val={f.history||f.territory}/>
        <FList label={isOrg?"Relations":"Relationships"} val={isOrg?f.relations:f.relationships}/>
      </div>{tlBox}{loreBox}</div>);
  }

  // === Geography ===
  if(tmpl==="geography"){
    return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}
      <div style={{padding:"16px 24px"}}><FBox label="Type & Scale" val={(f.type||"")+(f.scale?" — "+f.scale:"")}/>
        <div style={{display:"flex",gap:14}}><div style={{flex:1}}><FBox label="Physical Description" val={f.physical_desc}/></div><div style={{flex:1}}><FBox label="Climate & Ecology" val={f.climate_ecology}/></div></div>
        <FBox label="Resources" val={f.resources}/><FBox label="Connected" val={f.connected}/>
      </div>{tlBox}{loreBox}</div>);
  }

  // === Culture / Religion ===
  if(tmpl==="culture"){const isRel=topic.aspect_id==="religion-beliefs";
    return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}
      <div style={{padding:"16px 24px"}}>
        <FBox label={isRel?"Doctrine & Core Beliefs":"Origin & Roots"} val={isRel?f.values_beliefs:f.origin}/>
        {isRel&&<FBox label="Origin" val={f.origin}/>}

        <FBox label="Relationship to Society" val={f.relations||f.language}/>
      </div>{tlBox}{loreBox}</div>);
  }

  // === Event / History (sub-type) ===
  if(tmpl==="event"){
    if(histType==="battle"){
      return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}

          <div style={{flex:1,padding:16,background:T.bg,borderLeft:"1px solid "+T.bd,textAlign:"center"}}><div style={{fontSize:10,textTransform:"uppercase",color:T.goldD,marginBottom:8}}>Defender</div><FList label="Forces" val={f.defender_forces}/><FBox label="Commander" val={f.defender_commander}/><FBox label="Losses" val={f.defender_losses}/></div>
        </div><div style={{padding:"0 24px 16px"}}><FBox label="Outcome" val={f.outcome}/></div>{tlBox}{loreBox}</div>);}
    if(histType==="death"){
      return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}
        <div style={{padding:"16px 24px"}}><FBox label="Circumstances" val={f.cause}/></div>
        <div style={{display:"flex"}}><div style={{flex:1,padding:16,background:T.bg,borderRight:"1px solid "+T.bd,textAlign:"center"}}><div style={{fontSize:10,textTransform:"uppercase",color:T.goldD,marginBottom:8}}>Achievements</div><div style={{fontSize:13,color:T.txM,lineHeight:1.5}}>{f.impact||"Unknown"}</div></div>
          <div style={{flex:1,padding:16,background:T.bg,textAlign:"center"}}><div style={{fontSize:10,textTransform:"uppercase",color:T.goldD,marginBottom:8}}>Legacy & Family</div><div style={{fontSize:13,color:T.txM,lineHeight:1.5}}>{f.outcome||"Unknown"}</div></div>
        </div>{tlBox}{loreBox}</div>);}
    if(histType==="tech-advancement"){
      return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}
        <div style={{padding:"16px 24px"}}><FBox label="Discovery" val={f.cause}/></div>
        <div style={{display:"flex"}}><div style={{flex:1,padding:16,background:T.bg,borderRight:"1px solid "+T.bd}}><FBox label="Location & Context" val={f.era}/></div>
          <div style={{flex:1,padding:16,background:T.bg}}><FList label="Discoverer(s)" val={f.participants}/></div>
        </div><FBox label="Impact" val={f.impact}/>{tlBox}{loreBox}</div>);}
    // Default event
    return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}
      <div style={{padding:"16px 24px"}}><FBox label="Era" val={f.era}/><FList label="Participants" val={f.participants}/><FBox label="Cause" val={f.cause}/><FBox label="Outcome" val={f.outcome}/><FBox label="Impact" val={f.impact}/></div>{tlBox}{loreBox}</div>);
  }

  // === Creature ===
  if(tmpl==="creature"){
    return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}
      <div style={{padding:"16px 24px"}}><div style={{display:"flex",gap:14}}><div style={{flex:1}}><FBox label="Classification" val={f.classification}/></div><div style={{flex:1}}><FBox label="Habitat" val={f.habitat}/></div></div>
        <FList label="Abilities" val={f.abilities}/><FBox label="Behaviour" val={f.behaviour}/><FBox label="Uses" val={f.uses}/></div>{tlBox}{loreBox}</div>);}

  // === System (Politics/Military/Magic/Economy) ===
  if(tmpl==="system"){
    return(<div style={{background:T.sf,border:"2px solid "+T.bd,borderRadius:12,overflow:"hidden"}}>{header}
      <div style={{padding:"16px 24px"}}>
        {f.principle&&f.principle!=="Unknown"&&<div style={{fontSize:14,color:T.goldB,padding:"10px 16px",background:T.gold+"0d",borderLeft:"3px solid "+T.gold,borderRadius:4,marginBottom:14}}>{f.principle}</div>}
        <FList label="Components / Forces" val={f.components||f.composition}/>
        <div style={{display:"flex",gap:14}}><div style={{flex:1}}><FBox label="Practitioners / Command" val={f.practitioners||f.command}/></div><div style={{flex:1}}><FBox label="Effects / Doctrine" val={f.effects||f.doctrine}/></div></div>
        <FBox label="Limitations / Diplomacy" val={f.limitations}/>

  // Fallback

// === Map Viewer (compact) ===
function MapViewer({svgStr,pack,onSelectEntity}){
  const[zoom,setZoom]=useState(1);const[pan,setPan]=useState({x:0,y:0});const[drag,setDrag]=useState(false);const[ds,setDs]=useState({x:0,y:0});const[sb,setSb]=useState(null);
  const[layers,setLayers]=useState({});const[showLayers,setShowLayers]=useState(false);
  const containerRef=useRef(null);const mapRef=useRef(null);const sa=window.safeArr;

  // Detect layers from SVG after render
  useEffect(()=>{
    if(!mapRef.current)return;
    const svg=mapRef.current.querySelector('svg');if(!svg)return;
    const groups={};
    svg.querySelectorAll(':scope > g, :scope > g > g').forEach(g=>{
      const id=g.id;if(!id||id.length<2)return;
      groups[id]={visible:g.style.display!=='none'&&g.getAttribute('display')!=='none',el:g};
    });
    setLayers(groups);
  },[svgStr]);

  const toggleLayer=(id)=>{
    setLayers(prev=>{const n={...prev};if(n[id]){n[id]={...n[id],visible:!n[id].visible};
      if(n[id].el){n[id].el.style.display=n[id].visible?'':'none';}}return n;});
  };

  const applyPreset=(preset)=>{
    const presets={
      political:['ocean','lakes','coastline','rivers','borders','states','labels','icons','markers','routes','ruler'],
      physical:['ocean','lakes','coastline','rivers','relief','texture','borders','labels','icons','markers'],
      religious:['ocean','lakes','coastline','rivers','religions','borders','labels','icons'],
      cultural:['ocean','lakes','coastline','rivers','cultures','borders','labels','icons'],
      provinces:['ocean','lakes','coastline','rivers','provinces','borders','labels','icons'],
      biomes:['ocean','lakes','coastline','rivers','biomes','labels','icons'],
      heightmap:['ocean','lakes','coastline','heightmap','rivers'],
      military:['ocean','lakes','coastline','rivers','borders','states','military','labels','icons'],
      emblems:['ocean','lakes','coastline','borders','states','emblems','labels'],
    };
    const show=presets[preset]||[];
    setLayers(prev=>{const n={...prev};
      Object.keys(n).forEach(id=>{const vis=show.length===0||show.some(s=>id.toLowerCase().includes(s));
        n[id]={...n[id],visible:vis};if(n[id].el)n[id].el.style.display=vis?'':'none';});
      return n;});
  };

  // Zoom to cursor
  const handleWheel=useCallback((e)=>{
    e.preventDefault();
    const factor=e.deltaY>0?0.9:1.1;
    const rect=containerRef.current.getBoundingClientRect();
    // Mouse position relative to container
    const mx=e.clientX-rect.left;
    const my=e.clientY-rect.top;
    // Point on map under cursor before zoom
    // map_point = (screen_point - pan) / zoom
    setZoom(prevZoom=>{
      const newZoom=Math.max(0.05,Math.min(15,prevZoom*factor));
      // Adjust pan so the map point under cursor stays fixed
      // new_pan = screen_point - map_point * new_zoom
      // map_point = (screen_point - old_pan) / old_zoom
      setPan(prevPan=>{
        const mapX=(mx-prevPan.x)/prevZoom;
        const mapY=(my-prevPan.y)/prevZoom;
        return{x:mx-mapX*newZoom,y:my-mapY*newZoom};
      });
      return newZoom;
    });
  },[]);

  const handleClick=useCallback(e=>{let el=e.target;while(el&&el.tagName!=='svg'){const id=el.id||"";
    if(id.match(/^state\d+/)){const n=parseInt((id.match(/\d+/)||[0])[0]);const s=sa(pack?.states)[n];if(s)setSb({type:"state",d:s,name:s.name||s.fullName});return;}
    if(id.match(/^burg\d+/)){const n=parseInt((id.match(/\d+/)||[0])[0]);const b=sa(pack?.burgs)[n];if(b)setSb({type:"burg",d:b,name:b.name});return;}
    el=el.parentElement;}},[pack]);

  const PRESETS=[["Political","political"],["Physical","physical"],["Religious","religious"],["Cultural","cultural"],["Provinces","provinces"],["Biomes","biomes"],["Heightmap","heightmap"],["Military","military"],["Emblems","emblems"],["All",null]];
  const layerIds=Object.keys(layers).sort();

  return(<div style={{display:"flex",height:"100%"}}>
    {/* Map canvas */}
    <div ref={containerRef} style={{flex:1,position:"relative",overflow:"hidden",background:"#e8ecf0",cursor:drag?"grabbing":"grab"}}
      onWheel={handleWheel}
      onMouseDown={e=>{if(e.button===0){setDrag(true);setDs({x:e.clientX-pan.x,y:e.clientY-pan.y});}}}
      onMouseMove={e=>{if(drag)setPan({x:e.clientX-ds.x,y:e.clientY-ds.y});}}
      onMouseUp={()=>setDrag(false)} onMouseLeave={()=>setDrag(false)}>
      <div ref={mapRef} className="map-container" onClick={handleClick}
        style={{transform:"translate("+pan.x+"px,"+pan.y+"px) scale("+zoom+")",transformOrigin:"0 0",transition:drag?"none":"transform .05s"}}
        dangerouslySetInnerHTML={{__html:svgStr}}/>
      {/* Controls */}
      <div style={{position:"absolute",bottom:16,right:16,display:"flex",gap:6}}>
        <Btn sm v="s" onClick={()=>setShowLayers(!showLayers)}>{showLayers?"✕ Layers":"☰ Layers"}</Btn>
        <Btn sm v="s" onClick={()=>{const f=1.3;setZoom(z=>{const nz=Math.min(15,z*f);setPan(p=>{const cx=containerRef.current?.clientWidth/2||400;const cy=containerRef.current?.clientHeight/2||300;const mx=(cx-p.x)/z;const my=(cy-p.y)/z;return{x:cx-mx*nz,y:cy-my*nz};});return nz;});}}>+</Btn>
        <Btn sm v="s" onClick={()=>{const f=1.3;setZoom(z=>{const nz=Math.max(.05,z/f);setPan(p=>{const cx=containerRef.current?.clientWidth/2||400;const cy=containerRef.current?.clientHeight/2||300;const mx=(cx-p.x)/z;const my=(cy-p.y)/z;return{x:cx-mx*nz,y:cy-my*nz};});return nz;});}}>−</Btn>
        <Btn sm v="s" onClick={()=>{setZoom(1);setPan({x:0,y:0});}}>Reset</Btn>
      </div>
      {/* Layer panel */}
      {showLayers&&<div style={{position:"absolute",top:12,left:12,background:T.sf+"ee",border:"1px solid "+T.bd,borderRadius:10,padding:14,maxHeight:"80%",overflowY:"auto",width:200,backdropFilter:"blur(8px)"}}>
        <div style={{fontSize:11,fontWeight:600,color:T.gold,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Layer Presets</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12}}>
          {PRESETS.map(([label,key])=><button key={label} onClick={()=>key?applyPreset(key):applyPreset("all")}
            style={{padding:"3px 8px",fontSize:10,background:T.sf2,border:"1px solid "+T.bd,borderRadius:4,color:T.txM,cursor:"pointer"}}
            onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold}
            onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}>{label}</button>)}
        </div>
        <div style={{fontSize:11,fontWeight:600,color:T.gold,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Layers ({layerIds.length})</div>
        {layerIds.map(id=>(
          <label key={id} style={{display:"flex",alignItems:"center",gap:6,padding:"2px 0",cursor:"pointer",fontSize:12,color:layers[id]?.visible?T.txM:T.txD}}>
            <input type="checkbox" checked={layers[id]?.visible||false} onChange={()=>toggleLayer(id)} style={{accentColor:T.gold}}/>
            {id}
          </label>
        ))}
      </div>}
    </div>
    {/* Sidebar */}
    <div style={{width:320,flexShrink:0,background:T.sf,borderLeft:"1px solid "+T.bd,overflowY:"auto",padding:20}}>
      {!sb?<div style={{color:T.txD,fontSize:13,textAlign:"center",paddingTop:40}}>Click a state or settlement</div>
      :<div>
        {sb.d.coa&&<div style={{textAlign:"center",marginBottom:12}}><CoaImg coa={sb.d.coa} size={80}/></div>}
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.gold,marginBottom:12}}>{sb.name}</div>
        {sb.type==="state"&&<div>{[["Government",sb.d.form],["Pop",Math.round(((sb.d.rural||0)+(sb.d.urban||0))*1000).toLocaleString()],["Culture",sb.d.culture!==undefined?(sa(pack.cultures)[sb.d.culture]||{}).name:"?"],["Religion",sb.d.religion!==undefined&&pack.religions?(sa(pack.religions)[sb.d.religion]||{}).name:"?"]].map(([k,v],i)=>v&&v!=="?"?<div key={i} style={{marginBottom:6}}><div style={{fontSize:10,color:T.goldD,textTransform:"uppercase"}}>{k}</div><div style={{fontSize:13,color:T.txM}}>{v}</div></div>:null)}</div>}
        {sb.type==="burg"&&<div>{[["State",sb.d.state?(sa(pack.states)[sb.d.state]||{}).name:"?"],["Pop",sb.d.population?Math.round(sb.d.population*1000).toLocaleString():"?"],["Features",[sb.d.capital?"Capital":"",sb.d.port?"Port":"",sb.d.citadel?"Citadel":"",sb.d.walls?"Walled":""].filter(Boolean).join(", ")||"None"]].map(([k,v],i)=>v?<div key={i} style={{marginBottom:6}}><div style={{fontSize:10,color:T.goldD,textTransform:"uppercase"}}>{k}</div><div style={{fontSize:13,color:T.txM}}>{v}</div></div>:null)}
          {sb.d.coa&&<div style={{marginTop:8}}><CoaImg coa={sb.d.coa} size={60}/></div>}
          {window.mfcgUrl(sb.d)&&<a href={window.mfcgUrl(sb.d)} target="_blank" rel="noopener" style={{display:"block",marginTop:8,fontSize:12,color:T.accent}}>🏘️ City Map</a>}
        </div>}
        <Btn sm v="a" style={{marginTop:12}} onClick={()=>{const aid=sb.type==="state"?"politics":"locations";const pre="azg-"+(sb.type==="state"?"state":"loc")+"-"+(sb.d.i||0);onSelectEntity(aid,pre);}}>View Card</Btn>
      </div>}
    </div></div>);
}

// === MAIN APP ===
function App(){
  const[scr,setScr]=useState("main");const[worlds,setWorlds]=useState([]);const[wDescs,setWDescs]=useState({});
  const[cW,setCW]=useState(null);const[cA,setCA]=useState(null);const[cC,setCC]=useState(null);
  const[cList,setCList]=useState([]);const[topicList,setTopicList]=useState([]);const[curTopic,setCurTopic]=useState(null);
  const[compiledLore,setCompiledLore]=useState("");const[loadingLore,setLoadingLore]=useState(false);
  const[inp,setInp]=useState("");const[busy,setBusy]=useState(false);const[toast,setToast]=useState("");
  const[gen,setGen]=useState(false);const[wc,setWc]=useState(false);
  const[impTxt,setImpTxt]=useState("");const[mod,setMod]=useState(null);const[modIn,setModIn]=useState("");const[modIn2,setModIn2]=useState("");const[modIn3,setModIn3]=useState("");
  const[bibleData,setBibleData]=useState(null);const[apiKeyInput,setApiKeyInput]=useState("");const[hasKey,setHasKey]=useState(false);
  const[providerSel,setProviderSel]=useState("claude");const[customEndpoint,setCustomEndpoint]=useState("");
  const[aspCounts,setAspCounts]=useState({});const[aspChats,setAspChats]=useState({});
  const[tagFilter,setTagFilter]=useState("");const[allTags,setAllTags]=useState([]);const[tagInput,setTagInput]=useState("");
  const[mapSvg,setMapSvg]=useState(null);const[mapPack,setMapPack]=useState(null);const[hasMapData,setHasMapData]=useState(false);
  const[scanResults,setScanResults]=useState(null);const[scanNotif,setScanNotif]=useState("");
  const[viewYear,setViewYear]=useState(null);
  const endRef=useRef(null);const svgFileRef=useRef(null);const jsonFileRef=useRef(null);const mapFileRef=useRef(null);

  const flash=m=>{setToast(m);setTimeout(()=>setToast(""),3000);};
  const ldW=useCallback(async()=>{const ws=await db.listWorlds();setWorlds(ws);const d={};for(const w of ws)d[w.id]=w.description||await db.getWorldSummary(w.id);setWDescs(d);},[]);
  useEffect(()=>{ldW();(async()=>{const k=await db.getApiKey();if(k)setHasKey(true);setProviderSel(await db.getProvider());setCustomEndpoint(await db.getCustomEndpoint()||"");})();},[]);
  useEffect(()=>{if(scr==="chat")endRef.current?.scrollIntoView({behavior:"smooth"});},[cC?.messages?.length,scr]);

  const loadAspCounts=async wid=>{const c={},ch={};for(const a of ASPECTS){c[a.id]=await db.countTopics(wid,a.id);ch[a.id]=(await db.listChats(wid,a.id)).length;}ch["__worldchat__"]=(await db.listChats(wid,"__worldchat__")).length;setAspCounts(c);setAspChats(ch);setHasMapData(await db.hasMap(wid));};

  const goMain=()=>{setScr("main");setCW(null);setCA(null);setCC(null);setCurTopic(null);setGen(false);setWc(false);setMapSvg(null);setMapPack(null);setViewYear(null);};
  const goWorlds=async()=>{await ldW();setScr("worlds");};
  const goWorld=async w=>{setCW(w);setCA(null);setCC(null);setCurTopic(null);setWc(false);setViewYear(w.viewing_year||w.current_year||null);await loadAspCounts(w.id);setScr("world");};
  const goAspect=async a=>{setCA(a);setTopicList(await db.listTopics(cW.id,a.id));setCList(await db.listChats(cW.id,a.id));setTagFilter("");setAllTags(await db.listAllTags(cW.id));setScr("aspect");};
  const goChat=async(ch,g=false,w=false)=>{const wid=g?"__general__":cW.id;const aid=g?"__general__":(w?"__worldchat__":cA.id);const full=await db.loadChat(wid,aid,ch.id);if(full){setCC(full);setGen(g);setWc(w);setScr("chat");}};
  const goGen=async()=>{setCList(await db.listGeneralChats());setGen(true);setWc(false);setCW(null);setCA(null);setScr("general");};
  const goWorldChat=async()=>{setCList(await db.listChats(cW.id,"__worldchat__"));setWc(true);setGen(false);setScr("worldchatlist");};
  const goMap=async()=>{setBusy(true);setMapSvg(await db.getMapSvg(cW.id));setMapPack(await db.getMapPack(cW.id));setBusy(false);setScr("mapview");};

  const openNewWorld=()=>{setModIn("");setModIn2("");setModIn3("");setMod({t:"nw"});};
  const doNewWorld=async()=>{const n=modIn.trim();setMod(null);if(!n)return;if(worlds.length>=MAX_WORLDS){flash("Max "+MAX_WORLDS);return;}const w=await db.createWorld(n,modIn2.trim(),"Year",parseInt(modIn3)||0);flash("Created: "+n);await ldW();goWorld(w);};

  // File handlers
  const handleSvgFile=async e=>{const f=e.target.files[0];if(!f||!cW)return;setBusy(true);await db.saveMapSvg(cW.id,await f.text());await loadAspCounts(cW.id);flash("Map loaded!");setMod(null);setBusy(false);svgFileRef.current.value="";};
  const handleJsonFile=async e=>{const f=e.target.files[0];if(!f||!cW)return;setBusy(true);flash("Parsing JSON...");const r=await db.importJsonExport(cW.id,await f.text());if(r.error)flash("Error: "+r.error);else{flash(r.added+" topics from "+r.total);await loadAspCounts(cW.id);setMod(null);}setBusy(false);jsonFileRef.current.value="";};
  const handleMapFile=async e=>{const f=e.target.files[0];if(!f||!cW)return;setBusy(true);flash("Parsing .map...");const r=await db.importAzgaarMap(cW.id,await f.text());if(r.error)flash("Error: "+r.error);else{flash(r.added+" topics from "+r.total);const w=await IDB.get("world:"+cW.id);if(w){setCW(w);if(w.current_year)setViewYear(w.current_year);}await loadAspCounts(cW.id);setMod(null);}setBusy(false);mapFileRef.current.value="";};

  // Scan
  const scanAspect=async(wid,aspect,review)=>{const text=(await db.gatherAspectText(wid,aspect.id)+"\n"+await db.gatherAspectText(wid,"__worldchat__")).trim();if(!text)return{added:0};
    const resp=await aiCall(window.buildExtractPrompt(aspect),[{role:"user",content:text.slice(0,12000)}],2048);let parsed=[];
    try{const c=resp.trim().replace(/^```\w*\n?/,"").replace(/\n?```$/,"");const a=c.match(/\[[\s\S]*\]/);parsed=a?JSON.parse(a[0]):[];}catch(e){return{added:0,error:"parse"};}
    if(review)return{parsed};
    const existing=await db.listTopics(wid,aspect.id);const byN={};existing.forEach(t=>byN[t.name.toLowerCase()]=t);let added=0;
    for(const p of parsed){const key=p.name?.toLowerCase();if(!key)continue;
      if(byN[key]){const o=byN[key];await db.saveTopic({...o,brief:p.brief||o.brief,tags:normTags([...(o.tags||[]),...(p.tags||[])]),hist_type:p.hist_type||o.hist_type,born_year:p.year||o.born_year});}
      else{await db.saveTopic({id:mkId(),name:p.name,brief:p.brief||"",template:TMPL_FOR[aspect.id]||"culture",tags:normTags(p.tags||[]),hist_type:p.hist_type||"general",born_year:p.year||null,died_year:null,timeline:p.year?[{year:p.year,event:p.brief||p.name}]:[],fields:{},aspect_id:aspect.id,world_id:wid,created:new Date().toISOString(),updated:new Date().toISOString()});added++;}}

  const scanCurrent=async()=>{if(!cW||!cA)return;setBusy(true);const r=await scanAspect(cW.id,cA,true);setBusy(false);if(r.parsed){r.parsed.forEach(p=>p._accept=true);setScanResults(r.parsed);setMod({t:"review"});}else flash("Nothing found");};

    <DateBar/><div style={{display:"flex",gap:6,marginLeft:8}}><Btn sm v="a" onClick={scanCurrent} disabled={busy}>{busy?"...":"🔍"}</Btn><Btn sm onClick={async()=>{const c=await db.createChat(cW.id,cA.id);setCC(c);setGen(false);setWc(false);setScr("chat");}}>💬</Btn>{cList.length>0&&<Btn sm v="s" onClick={()=>setScr("chatlist")}>▶</Btn>}</div></div>
    <div style={{flex:1,overflowY:"auto",padding:"16px 32px"}}>
      {(topicList.length>0||allTags.length>0)&&<div style={{marginBottom:12,display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}><span style={{fontSize:10,color:T.txD,textTransform:"uppercase"}}>Filter:</span><Tag label="All" active={!tagFilter} onClick={()=>setTagFilter("")}/>{allTags.filter(t=>topicList.some(tp=>(tp.tags||[]).includes(t.tag))).slice(0,12).map(t=><Tag key={t.tag} label={t.tag} active={tagFilter===t.tag} onClick={()=>setTagFilter(tagFilter===t.tag?"":t.tag)}/>)}</div>}
      {yearFilteredTopics.length===0?<div style={{textAlign:"center",padding:40}}><div style={{fontSize:48,opacity:.3}}>{cA.icon}</div><div style={{color:T.txD,margin:"16px 0"}}>No entries{viewYear!==null?" at Year "+viewYear:""}. Chat then Scan.</div></div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200,1fr))",gap:12}}>{yearFilteredTopics.map(t=>{const dead=t.died_year!==null&&viewYear!==null&&t.died_year<viewYear;
          return(<button key={t.id} onClick={()=>{setCurTopic(t);setCompiledLore("");setScr("card");}} style={{padding:14,background:T.sf,border:"1px solid "+T.bd,borderRadius:10,cursor:"pointer",textAlign:"left",transition:"border-color .2s",opacity:dead?.5:1}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}>
            <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>{t.coa&&<CoaImg coa={t.coa} size={32}/>}<div><div style={{fontSize:14,fontWeight:600,color:T.gold}}>{t.name}</div>{t.brief&&<div style={{fontSize:11,color:T.txM,lineHeight:1.3,marginTop:2}}>{t.brief.slice(0,80)}</div>}</div></div>
            {t.tags&&t.tags.length>0&&<div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:6}}>{t.tags.slice(0,3).map(tg=><Tag key={tg} label={tg}/>)}</div>}
            {t.source==="azgaar"&&<div style={{fontSize:9,color:T.accent,marginTop:4}}>📍 Map</div>}
          </button>);})}</div>}
    </div></>);

  if(scr==="card"&&curTopic)return S(<><div style={{padding:"14px 32px 10px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={()=>setScr("aspect")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{flex:1}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.gold}}>{curTopic.name}</div><div style={{fontSize:11,color:T.txD}}>{cA?.name+" · "+cW?.name}</div></div>
    <DateBar/><div style={{display:"flex",gap:6,marginLeft:8}}><Btn sm v="s" onClick={()=>{setModIn("");setModIn2("");setMod({t:"addTL"});}}>📅+</Btn><Btn sm v="s" onClick={()=>{setTagInput("");setMod({t:"addTag"});}}>🏷️</Btn><Btn sm v="d" onClick={async()=>{await db.deleteTopic(cW.id,cA.id,curTopic.id);setTopicList(await db.listTopics(cW.id,cA.id));flash("Deleted");setScr("aspect");}}>Del</Btn></div></div>
    <div style={{flex:1,overflowY:"auto",padding:"16px 32px"}}><div style={{maxWidth:820,margin:"0 auto"}}><CardView topic={curTopic} viewYear={viewYear} compiledLore={compiledLore} onRefreshLore={compileLore} loadingLore={loadingLore}/></div></div></>);

  if(scr==="chatlist")return S(<><div style={{padding:"14px 32px 10px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={()=>setScr("aspect")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.gold,flex:1}}>Chats</div></div><div style={{flex:1,overflowY:"auto",padding:"16px 32px",maxWidth:700}}>{cList.map(c=><button key={c.id} onClick={()=>goChat(c)} style={{display:"block",width:"100%",padding:"12px 14px",marginBottom:6,background:T.sf,border:"1px solid "+T.bd,borderRadius:8,cursor:"pointer",textAlign:"left",color:T.tx}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}><div style={{fontSize:14,fontWeight:500}}>{c.title}</div><div style={{fontSize:11,color:T.txD,marginTop:3}}>{new Date(c.updated).toLocaleDateString()+" · "+(c.messages?.length||0)+" msgs"}</div></button>)}</div></>);

  if(scr==="worldchatlist")return S(<><div style={{padding:"14px 32px 10px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={()=>setScr("world")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{flex:1}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.gold}}>World Chat</div></div><Btn sm onClick={async()=>{const c=await db.createChat(cW.id,"__worldchat__");setCC(c);setGen(false);setWc(true);setScr("chat");}}>+ New</Btn></div><div style={{flex:1,overflowY:"auto",padding:"16px 32px",maxWidth:700}}>{cList.length===0?<div style={{textAlign:"center",padding:40}}><Btn onClick={async()=>{const c=await db.createChat(cW.id,"__worldchat__");setCC(c);setGen(false);setWc(true);setScr("chat");}}>Start</Btn></div>:cList.map(c=><button key={c.id} onClick={()=>goChat(c,false,true)} style={{display:"block",width:"100%",padding:"12px 14px",marginBottom:6,background:T.sf,border:"1px solid "+T.bd,borderRadius:8,cursor:"pointer",textAlign:"left",color:T.tx}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}><div style={{fontSize:14,fontWeight:500}}>{c.title}</div></button>)}</div></>);

  if(scr==="mapview"&&cW)return S(<><div style={{padding:"10px 32px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd,flexShrink:0}}><button onClick={()=>setScr("world")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.gold,flex:1}}>{"🗺️ "+cW.name}</div><DateBar/></div>
    <div style={{flex:1,overflow:"hidden"}}>{mapSvg?<MapViewer svgStr={mapSvg} pack={mapPack} onSelectEntity={async(aid,pre)=>{const topics=await db.listTopics(cW.id,aid);const t=topics.find(tp=>tp.id.startsWith(pre));if(t){setCA(ASPECTS.find(a=>a.id===aid));setCurTopic(t);setCompiledLore("");setTopicList(topics);setScr("card");}else flash("Not found");}}/>:<div style={{padding:40,textAlign:"center",color:T.txD}}>No map</div>}</div></>);

  if(scr==="general")return S(<><div style={{padding:"14px 32px 10px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={goMain} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{flex:1}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:T.gold}}>ForgeMaster</div></div><Btn sm onClick={async()=>{const c=await db.createGeneralChat();setCC(c);setGen(true);setWc(false);setScr("chat");}}>+ New</Btn></div><div style={{flex:1,overflowY:"auto",padding:"16px 32px",maxWidth:700}}>{cList.length===0?<div style={{textAlign:"center",padding:40}}><Btn onClick={async()=>{const c=await db.createGeneralChat();setCC(c);setGen(true);setWc(false);setScr("chat");}}>New Chat</Btn></div>:cList.map(c=><button key={c.id} onClick={()=>goChat(c,true)} style={{display:"block",width:"100%",padding:"12px 14px",marginBottom:6,background:T.sf,border:"1px solid "+T.bd,borderRadius:8,cursor:"pointer",textAlign:"left",color:T.tx}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}><div style={{fontSize:14,fontWeight:500}}>{c.title}</div></button>)}</div></>);

  if(scr==="chat"&&cC)return S(<React.Fragment>
    <div style={{padding:"10px 32px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd,flexShrink:0}}><button onClick={exitChat} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{flex:1,minWidth:0}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:700,color:T.gold,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{gen?"ForgeMaster":(wc?"World Chat":cA?.name)}</div><div style={{fontSize:11,color:T.txD}}>{gen?cC.title:cW?.name}</div></div><div style={{display:"flex",gap:6}}>{!gen&&<Btn sm v="g" onClick={openFact}>📝</Btn>}{!gen&&<Btn sm v="g" onClick={openBible}>📖</Btn>}</div></div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 32px"}}><div style={{maxWidth:700,margin:"0 auto"}}>{(!cC.messages||cC.messages.length===0)&&<div style={{padding:"40px 0",textAlign:"center",color:T.txD,fontSize:14}}>Start worldbuilding!</div>}{(cC.messages||[]).map((m,i)=><Bub key={i} msg={m}/>)}{busy&&<div style={{padding:"12px 0",color:T.goldD,fontSize:13,fontStyle:"italic"}}>Forging...</div>}<div ref={endRef}/></div></div>
    <div style={{padding:"10px 32px 14px",borderTop:"1px solid "+T.bd,background:T.sf,flexShrink:0}}><div style={{maxWidth:700,margin:"0 auto",display:"flex",gap:10,alignItems:"flex-end"}}><textarea value={inp} onChange={e=>setInp(e.target.value)} placeholder="Type..." onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} rows={1} style={{flex:1,resize:"none",padding:"10px 16px",borderRadius:10,border:"1px solid "+T.bd,background:T.bg,color:T.tx,fontSize:14,fontFamily:"inherit",outline:"none",maxHeight:140,lineHeight:1.4}} onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,140)+"px";}}/><button onClick={send} disabled={busy||!inp.trim()} style={{background:T.gold,border:"none",borderRadius:10,width:44,height:44,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:busy||!inp.trim()?.4:1,fontSize:18,flexShrink:0,color:T.bg,fontWeight:700}}>{"↑"}</button></div></div>
  </React.Fragment>);

  if(scr==="settings")return S(<><div style={{padding:"14px 32px 10px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={goMain} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:T.gold}}>Settings</div></div>
    <div style={{flex:1,overflowY:"auto",padding:"24px 32px",maxWidth:600}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>AI Provider</div>
      <select value={providerSel} onChange={e=>setProviderSel(e.target.value)} style={{...iS,maxWidth:300,marginBottom:12}}><option value="claude">Claude (Anthropic)</option><option value="deepseek">DeepSeek</option><option value="custom">Custom</option></select>
      {providerSel==="custom"&&<input value={customEndpoint} onChange={e=>setCustomEndpoint(e.target.value)} placeholder="https://..." style={{...iS,maxWidth:400,marginBottom:12}}/>}
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,marginTop:16,textTransform:"uppercase",letterSpacing:1}}>API Key</div>
      <input type="password" value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} placeholder="API key..." style={{...iS,fontFamily:"monospace",fontSize:13,maxWidth:400}}/>
      <div style={{display:"flex",gap:8,marginTop:10}}><Btn onClick={saveSettings}>Save</Btn>{hasKey&&<Btn v="s" onClick={async()=>{setApiKeyInput("");await db.setApiKey(null);setHasKey(false);flash("Removed");}}>Remove</Btn>}</div>
      <div style={{fontSize:11,color:T.txD,marginTop:8}}>{hasKey?"✅ "+providerSel:"⚠️ No key"}</div>
      <div style={{borderTop:"1px solid "+T.bd,marginTop:24,paddingTop:20}}><div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>Data</div><div style={{display:"flex",gap:10}}><Btn v="s" onClick={doExport}>📤 Export</Btn><Btn v="s" onClick={()=>setScr("import")}>📥 Import</Btn><Btn v="d" onClick={()=>setMod({t:"delAll"})}>🗑️</Btn></div></div>
      <div style={{marginTop:32,fontSize:11,color:T.txD,lineHeight:1.6}}>WorldForge Desktop v5{"\n"}Timeline · COA Emblems · MFCG Links · Multi-Provider{"\n"}Auto-scan · Review · Category Rules · Compiled Lore</div>
    </div></>);

  if(scr==="import")return S(<><div style={{padding:"14px 32px 10px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={()=>setScr("settings")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.gold}}>Import</div></div>
    <div style={{flex:1,overflowY:"auto",padding:"24px 32px",maxWidth:600}}><textarea value={impTxt} onChange={e=>setImpTxt(e.target.value)} placeholder="Paste JSON..." rows={14} style={{width:"100%",resize:"vertical",padding:14,borderRadius:8,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:13,fontFamily:"monospace",outline:"none"}}/><div style={{display:"flex",gap:8,marginTop:12}}><Btn onClick={doImport}>Import</Btn><Btn v="s" onClick={()=>{setImpTxt("");setScr("settings");}}>Cancel</Btn></div></div></>);

  return S(<div style={{padding:40,textAlign:"center",color:T.txD}}>Loading...</div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
