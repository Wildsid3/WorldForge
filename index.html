const IDB={_db:null,
open(){return new Promise((r,j)=>{if(this._db)return r(this._db);const q=indexedDB.open('worldforge',2);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};q.onsuccess=e=>{this._db=e.target.result;r(this._db);};q.onerror=e=>j(e);});},
async get(k){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>r(t.result===undefined?null:t.result);t.onerror=e=>j(e);});},
async set(k,v){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>r(true);t.onerror=e=>j(e);});},
async del(k){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').delete(k);t.onsuccess=()=>r(true);t.onerror=e=>j(e);});},
async list(p){const d=await this.open();return new Promise((r,j)=>{const ks=[];const rng=IDBKeyRange.bound(p,p+'\uffff');const t=d.transaction('kv','readonly').objectStore('kv').openCursor(rng);t.onsuccess=e=>{const c=e.target.result;if(c){ks.push(c.key);c.continue();}else r(ks);};t.onerror=e=>j(e);});},
async clear(){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').clear();t.onsuccess=()=>r(true);t.onerror=e=>j(e);});}};

function normTag(t){return t.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');}
function normTags(arr){return[...new Set((arr||[]).map(normTag).filter(t=>t.length>0))];}
function mkId(){return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);}

// === Azgaar Map Parser ===
window.parseAzgaarMap=function(text){
  const result={svg:null,pack:null,params:null,error:null,debug:[]};
  try{
    result.debug.push("File size: "+text.length+" chars");
    const svgStart=text.indexOf('<svg');
    const svgEnd=text.lastIndexOf('</svg>');
    if(svgStart<0||svgEnd<0){result.error="No SVG found ("+text.length+" chars)";return result;}
    result.svg=text.substring(svgStart,svgEnd+6);
    result.debug.push("SVG: "+result.svg.length+" chars");
    // Params from first line
    const firstLine=text.substring(0,svgStart).split('\n')[0].trim();
    if(firstLine.startsWith('{')){try{result.params=JSON.parse(firstLine);result.debug.push("Params OK");}catch(e){}}
    // After SVG: may contain grid JSON then pack JSON (Azgaar v1.113+ format)
    const afterSvg=text.substring(svgEnd+6);
    result.debug.push("After SVG: "+afterSvg.length+" chars");
    // Find all top-level JSON objects by matching balanced braces
    const jsonObjects=[];
    let depth=0,objStart=-1;
    for(let i=0;i<afterSvg.length;i++){
      const ch=afterSvg[i];
      if(ch==='{'){if(depth===0)objStart=i;depth++;}
      else if(ch==='}'){depth--;if(depth===0&&objStart>=0){jsonObjects.push({start:objStart,end:i+1});objStart=-1;}}
    }
    result.debug.push("Found "+jsonObjects.length+" JSON objects after SVG");
    // Try each JSON object - the pack is the one with "states" or "burgs" keys
    for(let idx=0;idx<jsonObjects.length;idx++){
      const{start,end}=jsonObjects[idx];
      const str=afterSvg.substring(start,end);
      result.debug.push("Object "+idx+": "+str.length+" chars, starts: "+str.substring(0,60));
      try{
        const obj=JSON.parse(str);
        const keys=Object.keys(obj);
        result.debug.push("Object "+idx+" keys: "+keys.slice(0,10).join(","));
        // Check if this is the pack (has states/burgs/cultures)
        if(obj.states||obj.burgs||obj.cultures){
          result.pack=obj;
          result.debug.push("PACK found at object "+idx+"! States:"+((obj.states||[]).length)+", Burgs:"+((obj.burgs||[]).length)+", Cultures:"+((obj.cultures||[]).length)+", Religions:"+((obj.religions||[]).length)+", Rivers:"+((obj.rivers||[]).length));
          break;
        }
        // This might be the grid object - skip and continue
        if(obj.cells||obj.vertices||obj.features){
          result.debug.push("Object "+idx+" is grid data - skipping");
          continue;
        }
      }catch(e){
        result.debug.push("Object "+idx+" parse fail: "+e.message.substring(0,100));
        // For very large objects, try a substring approach
        if(str.length>1000000){
          result.debug.push("Large object - checking for pack markers");
          if(str.indexOf('"states"')>0&&str.indexOf('"burgs"')>0){
            result.debug.push("Has pack markers, retrying parse...");
            try{result.pack=JSON.parse(str);result.debug.push("Retry succeeded!");break;}catch(e2){result.debug.push("Retry failed: "+e2.message.substring(0,100));}
          }
        }
      }
    }
    if(!result.pack&&jsonObjects.length===0){result.error="No JSON data found after SVG";}
    else if(!result.pack){result.error="Pack data not found in "+jsonObjects.length+" JSON objects. Check console for debug.";}
  }catch(e){result.error="Parse error: "+e.message;}
  return result;
};

// Generate WorldForge topics from Azgaar pack data
window.generateTopicsFromPack=function(pack,worldId){
  const topics=[];
  if(!pack)return topics;
  const stateNames={},cultureNames={},religionNames={};
  // Index names for cross-referencing
  (pack.states||[]).forEach(s=>{if(s.i>0)stateNames[s.i]=s.name||s.fullName||("State "+s.i);});
  (pack.cultures||[]).forEach(c=>{if(c.i>0)cultureNames[c.i]=c.name||("Culture "+c.i);});
  (pack.religions||[]).forEach(r=>{if(r.i>0)religionNames[r.i]=r.name||("Religion "+r.i);});

  // States -> politics
  (pack.states||[]).forEach(s=>{
    if(!s.i||s.i===0||s.removed)return;
    const cap=pack.burgs&&s.capital?pack.burgs[s.capital]:null;
    const culture=s.culture?cultureNames[s.culture]:"Unknown";
    const tags=normTags([s.form||"",culture,"state",s.name]);
    topics.push({id:"azg-state-"+s.i,name:s.name||s.fullName,brief:(s.fullName||s.name)+", a "+( s.form||"state")+" of the "+culture+" culture",
      template:"system",tags,aspect_id:"politics",world_id:worldId,source:"azgaar",azgaar_id:s.i,azgaar_type:"state",
      fields:{principle:"Form of government: "+(s.form||"Unknown"),components:["Area: "+(s.area?Math.round(s.area)+" cells":"Unknown"),"Population: "+(s.rural||0)+"/"+(s.urban||0)+" (rural/urban)"],
        practitioners:"Dominant culture: "+culture,effects:"Capital: "+(cap?cap.name:"Unknown"),limitations:"",origin:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // Burgs -> notable-locations
  (pack.burgs||[]).forEach(b=>{
    if(!b.i||b.i===0||!b.name)return;
    const state=b.state?stateNames[b.state]:"Unclaimed";
    const culture=b.culture?cultureNames[b.culture]:"Unknown";
    const religion=b.religion?religionNames[b.religion]:"Unknown";
    const features=[];
    if(b.capital)features.push("Capital city");
    if(b.port)features.push("Port");
    if(b.citadel)features.push("Citadel");
    if(b.walls)features.push("Walled");
    if(b.plaza)features.push("Market plaza");
    if(b.temple)features.push("Temple");
    if(b.shanty)features.push("Shantytown");
    const tags=normTags([state,culture,religion,...features,b.name]);
    topics.push({id:"azg-burg-"+b.i,name:b.name,brief:b.name+(b.capital?" (capital)":"")+", "+state,
      template:"place",tags,aspect_id:"notable-locations",world_id:worldId,source:"azgaar",azgaar_id:b.i,azgaar_type:"burg",
      fields:{type:features.length?features.join(", "):"Settlement",region:state,
        features:features.length?features:["Settlement"],inhabitants:"Culture: "+culture+", Religion: "+religion,
        significance:b.capital?"Capital of "+state:"Settlement in "+state,
        history:"Population: "+(b.population?Math.round(b.population*1000):"Unknown")},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // Cultures -> cultures
  (pack.cultures||[]).forEach(c=>{
    if(!c.i||c.i===0||c.removed)return;
    const tags=normTags([c.type||"",c.name,"culture"]);
    topics.push({id:"azg-culture-"+c.i,name:c.name,brief:c.name+", a "+(c.type||"")+" culture",
      template:"culture",tags,aspect_id:"cultures",world_id:worldId,source:"azgaar",azgaar_id:c.i,azgaar_type:"culture",
      fields:{origin:"Type: "+(c.type||"Unknown")+(c.base!==undefined?", Base: "+c.base:""),
        practices:["Naming convention: "+(c.namingMethod||"default")],
        significance:"",practitioners:"",notable_events:[]},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // Religions -> religion-beliefs
  (pack.religions||[]).forEach(r=>{
    if(!r.i||r.i===0||r.removed)return;
    const tags=normTags([r.type||"",r.form||"",r.name,"religion"]);
    topics.push({id:"azg-religion-"+r.i,name:r.name,brief:r.name+", "+(r.form||"a")+" "+(r.type||"religion"),
      template:"culture",tags,aspect_id:"religion-beliefs",world_id:worldId,source:"azgaar",azgaar_id:r.i,azgaar_type:"religion",
      fields:{origin:"Type: "+(r.type||"Unknown")+", Form: "+(r.form||"Unknown"),
        practices:[r.deity?"Deity: "+r.deity:"No central deity"],
        significance:"",practitioners:"",notable_events:[]},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // Rivers -> geography
  (pack.rivers||[]).forEach(rv=>{
    if(!rv.i||!rv.name)return;
    const tags=normTags([rv.type||"river",rv.name,"geography","river"]);
    topics.push({id:"azg-river-"+rv.i,name:rv.name+(rv.type&&rv.type!=="River"?" ("+rv.type+")":""),
      brief:rv.name+", "+(rv.type||"river"),
      template:"place",tags,aspect_id:"geography",world_id:worldId,source:"azgaar",azgaar_id:rv.i,azgaar_type:"river",
      fields:{type:rv.type||"River",region:"",
        features:["Length: "+(rv.length?Math.round(rv.length):"Unknown"),"Basin: "+(rv.basin||"Unknown")],
        inhabitants:"",significance:"",history:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // Military -> military (aggregate by state)
  if(pack.military&&pack.military.length){
    pack.military.forEach((m,idx)=>{
      if(!m||!m.length||idx===0)return;
      const sn=stateNames[idx]||("State "+idx);
      const regiments=m.map(r=>r.name+" ("+r.type+": "+(r.n||0)+")");
      const tags=normTags([sn,"military","army"]);
      topics.push({id:"azg-military-"+idx,name:sn+" Armed Forces",
        brief:"Military forces of "+sn,template:"event",tags,aspect_id:"military",world_id:worldId,
        source:"azgaar",azgaar_id:idx,azgaar_type:"military",
        fields:{era:"Current",participants:regiments.slice(0,10),cause:"Standing military of "+sn,
          outcome:"Total regiments: "+m.length,impact:""},
        created:new Date().toISOString(),updated:new Date().toISOString()});
    });
  }

  return topics;
};

// === Data Layer ===
window.db={
  async listWorlds(){const ks=await IDB.list("world:");const ws=[];for(const k of ks){const w=await IDB.get(k);if(w)ws.push(w);}ws.sort((a,b)=>(a.created||"").localeCompare(b.created||""));return ws;},
  async createWorld(n,desc){const id=n.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40)+'-'+Math.random().toString(36).slice(2,8);const m={id,name:n,description:desc||"",created:new Date().toISOString(),updated:new Date().toISOString()};await IDB.set("world:"+id,m);await IDB.set("bible:"+id,{world_id:id,world_name:n,last_updated:new Date().toISOString(),facts:{}});return m;},
  async saveWorld(w){w.updated=new Date().toISOString();return IDB.set("world:"+w.id,w);},
  async deleteWorld(wid){await IDB.del("world:"+wid);await IDB.del("bible:"+wid);await IDB.del("mapsvg:"+wid);await IDB.del("mappack:"+wid);const ck=await IDB.list("chat:"+wid+":");for(const k of ck)await IDB.del(k);const tk=await IDB.list("topic:"+wid+":");for(const k of tk)await IDB.del(k);},
  async getBible(wid){return(await IDB.get("bible:"+wid))||{facts:{}};},
  async saveBible(wid,b){b.last_updated=new Date().toISOString();return IDB.set("bible:"+wid,b);},
  async addFact(wid,cat,key,val){const b=await this.getBible(wid);if(!b.facts)b.facts={};if(!b.facts[cat])b.facts[cat]={};b.facts[cat][key]=val;return this.saveBible(wid,b);},
  async listChats(wid,aid){const ks=await IDB.list("chat:"+wid+":"+aid+":");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createChat(wid,aid,title){const id=mkId();const ch={id,world_id:wid,aspect_id:aid,title:title||("Chat "+new Date().toLocaleString()),created:new Date().toISOString(),updated:new Date().toISOString(),messages:[]};await IDB.set("chat:"+wid+":"+aid+":"+id,ch);return ch;},
  async saveChat(c){c.updated=new Date().toISOString();return IDB.set("chat:"+c.world_id+":"+c.aspect_id+":"+c.id,c);},
  async loadChat(wid,aid,cid){return IDB.get("chat:"+wid+":"+aid+":"+cid);},
  async listGeneralChats(){const ks=await IDB.list("chat:__general__:__general__:");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createGeneralChat(t){return this.createChat("__general__","__general__",t);},
  async fileNote(wid,aid,text){const chats=await this.listChats(wid,aid);let tgt=chats.find(c=>c.title==="Cross-World Notes");if(tgt)tgt=await this.loadChat(wid,aid,tgt.id);if(!tgt)tgt=await this.createChat(wid,aid,"Cross-World Notes");tgt.messages.push({role:"user",content:text,timestamp:new Date().toISOString(),source:"cross-world"});await this.saveChat(tgt);},
  async gatherAspectText(wid,aid){const chats=await this.listChats(wid,aid);const ts=[];for(const ch of chats){const f=await this.loadChat(wid,aid,ch.id);if(f)for(const m of f.messages||[])ts.push(m.content||"");}return ts.join("\n\n");},
  // Topics
  async saveTopic(t){t.updated=new Date().toISOString();t.tags=normTags(t.tags);await IDB.set("topic:"+t.world_id+":"+t.aspect_id+":"+t.id,t);return t;},
  async listTopics(wid,aid){const ks=await IDB.list("topic:"+wid+":"+aid+":");const ts=[];for(const k of ks){const t=await IDB.get(k);if(t)ts.push(t);}ts.sort((a,b)=>(a.name||"").localeCompare(b.name||""));return ts;},
  async loadTopic(wid,aid,tid){return IDB.get("topic:"+wid+":"+aid+":"+tid);},
  async deleteTopic(wid,aid,tid){return IDB.del("topic:"+wid+":"+aid+":"+tid);},
  async listAllTags(wid){const ks=await IDB.list("topic:"+wid+":");const tags={};for(const k of ks){const t=await IDB.get(k);if(t&&t.tags)for(const tg of t.tags)tags[tg]=(tags[tg]||0)+1;}return Object.entries(tags).sort((a,b)=>b[1]-a[1]).map(([t,c])=>({tag:t,count:c}));},
  async searchByTag(wid,tag){const ks=await IDB.list("topic:"+wid+":");const r=[];for(const k of ks){const t=await IDB.get(k);if(t&&t.tags&&t.tags.includes(normTag(tag)))r.push(t);}return r;},
  async getWorldSummary(wid){const b=await this.getBible(wid);const f=b.facts||{};const p=[];for(const[c,e] of Object.entries(f)){const k=Object.keys(e).slice(0,3);if(k.length)p.push(c.replace(/-/g,' ')+": "+k.join(", "));}return p.slice(0,4).join(". ")||"New world";},
  // Map
  async saveMapSvg(wid,svg){return IDB.set("mapsvg:"+wid,svg);},
  async getMapSvg(wid){return IDB.get("mapsvg:"+wid);},
  async saveMapPack(wid,pack){return IDB.set("mappack:"+wid,pack);},
  async getMapPack(wid){return IDB.get("mappack:"+wid);},
  async hasMap(wid){return!!(await IDB.get("mapsvg:"+wid));},
  // Import map and generate all topics
  async importAzgaarMap(wid,fileText){
    const parsed=parseAzgaarMap(fileText);
    if(parsed.error)return{error:parsed.error,debug:parsed.debug};
    if(parsed.svg)await this.saveMapSvg(wid,parsed.svg);
    if(parsed.pack){
      await this.saveMapPack(wid,parsed.pack);
      const topics=generateTopicsFromPack(parsed.pack,wid);
      let added=0;
      for(const t of topics){
        const existing=await IDB.get("topic:"+wid+":"+t.aspect_id+":"+t.id);
        if(!existing){await this.saveTopic(t);added++;}
        else{const merged={...existing,fields:{...(existing.fields||{}),...(t.fields||{})},tags:normTags([...(existing.tags||[]),...(t.tags||[])])};await this.saveTopic(merged);}
      }
      return{added,total:topics.length,svg:!!parsed.svg,debug:parsed.debug};
    }

function MapViewer({svgStr,pack,worldId,onSelectEntity,onClose}){
  const containerRef=useRef(null);
  const[zoom,setZoom]=useState(1);
  const[pan,setPan]=useState({x:0,y:0});
  const[dragging,setDragging]=useState(false);
  const[dragStart,setDragStart]=useState({x:0,y:0});
  const[sidebar,setSidebar]=useState(null);

  const handleSvgClick=useCallback((e)=>{
    let el=e.target;
    // Walk up to find a meaningful element
    while(el&&el.tagName!=='svg'){
      const id=el.id||"";const cls=el.getAttribute("class")||"";
      // State detection
      if(id.match(/^state\d+/)||cls.includes("state")){
        const num=parseInt((id.match(/\d+/)||["0"])[0]);
        if(pack&&pack.states&&pack.states[num]){
          const s=pack.states[num];setSidebar({type:"state",data:s,name:s.name||s.fullName});
        }return;
      }
      // Burg detection
      if(id.match(/^burg\d+/)||cls.includes("burg")){
        const num=parseInt((id.match(/\d+/)||["0"])[0]);
        if(pack&&pack.burgs&&pack.burgs[num]){
          const b=pack.burgs[num];setSidebar({type:"burg",data:b,name:b.name});
        }return;
      }
      el=el.parentElement;
    }
  },[pack]);

  const handleWheel=useCallback((e)=>{e.preventDefault();const d=e.deltaY>0?0.9:1.1;setZoom(z=>Math.max(0.1,Math.min(10,z*d)));},[]);
  const handleMouseDown=(e)=>{if(e.button===0){setDragging(true);setDragStart({x:e.clientX-pan.x,y:e.clientY-pan.y});}};
  const handleMouseMove=(e)=>{if(dragging)setPan({x:e.clientX-dragStart.x,y:e.clientY-dragStart.y});};
  const handleMouseUp=()=>setDragging(false);

  return(<div style={{display:"flex",height:"100%",overflow:"hidden"}}>
    <div style={{flex:1,position:"relative",overflow:"hidden",background:"#e8ecf0",cursor:dragging?"grabbing":"grab"}}
      onWheel={handleWheel} onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}>
      <div ref={containerRef} className="map-container" onClick={handleSvgClick}
        style={{transform:`translate(${pan.x}px,${pan.y}px) scale(${zoom})`,transformOrigin:"0 0",transition:dragging?"none":"transform 0.1s"}}
        dangerouslySetInnerHTML={{__html:svgStr}}/>
      <div style={{position:"absolute",bottom:16,right:16,display:"flex",gap:8}}>
        <Btn sm v="s" onClick={()=>setZoom(z=>Math.min(10,z*1.3))}>+</Btn>
        <Btn sm v="s" onClick={()=>setZoom(z=>Math.max(0.1,z/1.3))}>−</Btn>
        <Btn sm v="s" onClick={()=>{setZoom(1);setPan({x:0,y:0});}}>Reset</Btn>
      </div>
    </div>
    {/* Sidebar */}
    <div style={{width:320,flexShrink:0,background:T.sf,borderLeft:"1px solid "+T.bd,overflowY:"auto",padding:20}}>
      {!sidebar?<div style={{color:T.txD,fontSize:13,textAlign:"center",paddingTop:40}}>Click a state or settlement on the map to view its data</div>
      :<div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.gold,marginBottom:8}}>{sidebar.name}</div>
        <div style={{fontSize:11,color:T.txD,textTransform:"uppercase",marginBottom:12}}>{sidebar.type}</div>
        {sidebar.type==="state"&&<div>
          {[["Government",sidebar.data.form],["Culture",sidebar.data.culture!==undefined?(pack.cultures[sidebar.data.culture]||{}).name:"?"],
            ["Religion",sidebar.data.religion!==undefined?(pack.religions&&pack.religions[sidebar.data.religion]||{}).name:"?"],
            ["Area",sidebar.data.area?Math.round(sidebar.data.area)+" cells":"?"],
            ["Population (rural)",sidebar.data.rural?Math.round(sidebar.data.rural*1000).toLocaleString():"?"],
            ["Population (urban)",sidebar.data.urban?Math.round(sidebar.data.urban*1000).toLocaleString():"?"],
          ].map(([k,v],i)=>v&&v!=="?"?<div key={i} style={{marginBottom:8}}><div style={{fontSize:11,color:T.goldD,textTransform:"uppercase"}}>{k}</div><div style={{fontSize:13,color:T.txM}}>{v}</div></div>:null)}
          {sidebar.data.diplomacy&&<div style={{marginTop:12}}><div style={{fontSize:11,color:T.goldD,textTransform:"uppercase",marginBottom:4}}>Diplomacy</div>
            {sidebar.data.diplomacy.map((d,i)=>{if(i===0||i===sidebar.data.i||d==="x"||!pack.states[i]||!pack.states[i].name)return null;
              return<div key={i} style={{fontSize:12,color:T.txM}}>{"• "+pack.states[i].name+": "+d}</div>;}).filter(Boolean).slice(0,10)}
          </div>}
        </div>}
        {sidebar.type==="burg"&&<div>
          {[["State",sidebar.data.state?((pack.states[sidebar.data.state]||{}).name||"?"):"Unclaimed"],
            ["Population",sidebar.data.population?Math.round(sidebar.data.population*1000).toLocaleString():"?"],
            ["Culture",sidebar.data.culture?(pack.cultures[sidebar.data.culture]||{}).name:"?"],
            ["Religion",sidebar.data.religion?(pack.religions&&pack.religions[sidebar.data.religion]||{}).name:"?"],
            ["Features",[sidebar.data.capital?"Capital":"",sidebar.data.port?"Port":"",sidebar.data.citadel?"Citadel":"",sidebar.data.walls?"Walled":"",sidebar.data.plaza?"Market":"",sidebar.data.temple?"Temple":""].filter(Boolean).join(", ")||"None"],
          ].map(([k,v],i)=>v?<div key={i} style={{marginBottom:8}}><div style={{fontSize:11,color:T.goldD,textTransform:"uppercase"}}>{k}</div><div style={{fontSize:13,color:T.txM}}>{v}</div></div>:null)}
        </div>}
        <div style={{marginTop:16,display:"flex",gap:8}}>
          <Btn sm v="a" onClick={()=>{
            const aid=sidebar.type==="state"?"politics":"notable-locations";
            const prefix="azg-"+sidebar.type+"-"+(sidebar.data.i||0);
            onSelectEntity(aid,prefix);
          }}>View Card</Btn>
        </div>
      </div>}
    </div>
  </div>);
}

    <div style={{display:"flex",gap:8}}><Btn sm v="a" onClick={scanTopics} disabled={busy}>{busy?"Scanning...":"🔍 Scan"}</Btn><Btn sm onClick={async()=>{const c=await db.createChat(cW.id,cA.id);setCC(c);setGen(false);setWorldChat(false);setScr("chat");}}>💬 Chat</Btn>{cList.length>0&&<Btn sm v="s" onClick={()=>setScr("chatlist")}>Continue</Btn>}</div></div>
    <div style={{flex:1,overflowY:"auto",padding:"20px 32px"}}>
      {(topicList.length>0||allTags.length>0)&&<div style={{marginBottom:16,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}><span style={{fontSize:11,color:T.txD,textTransform:"uppercase",letterSpacing:1}}>Filter:</span><Tag label="All" active={!tagFilter} onClick={()=>setTagFilter("")}/>{allTags.filter(t=>topicList.some(tp=>(tp.tags||[]).includes(t.tag))).slice(0,15).map(t=><Tag key={t.tag} label={t.tag} active={tagFilter===t.tag} onClick={()=>setTagFilter(tagFilter===t.tag?"":t.tag)}/>)}</div>}
      {filteredTopics.length===0?<div style={{textAlign:"center",padding:40}}><div style={{fontSize:48,opacity:.3}}>{cA.icon}</div><div style={{color:T.txD,margin:"16px 0"}}>{topicList.length===0?"No entries yet. Chat then Scan, or import a map.":"No matches."}</div></div>
        :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220,1fr))",gap:14}}>{filteredTopics.map(t=>(<button key={t.id} onClick={()=>{setCurTopic(t);setScr("card");}} style={{padding:16,background:T.sf,border:"1px solid "+T.bd,borderRadius:10,cursor:"pointer",textAlign:"left",transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}><div style={{fontSize:15,fontWeight:600,color:T.gold,marginBottom:4}}>{t.name}</div>{t.brief&&<div style={{fontSize:12,color:T.txM,lineHeight:1.4,marginBottom:8}}>{t.brief.slice(0,80)}</div>}{t.tags&&t.tags.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{t.tags.slice(0,4).map(tg=><Tag key={tg} label={tg}/>)}</div>}{t.source==="azgaar"&&<div style={{fontSize:10,color:T.accent,marginTop:6}}>📍 From map</div>}</button>))}</div>}
    </div></>);

  // CARD VIEW
  if(scr==="card"&&curTopic)return S(<><div style={{padding:"16px 32px 12px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={()=>setScr("aspect")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{flex:1}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:T.gold}}>{curTopic.name}</div><div style={{fontSize:12,color:T.txD}}>{cA?.name+" · "+cW?.name}</div></div>
    <div style={{display:"flex",gap:8}}><Btn sm v="a" onClick={()=>genCard(curTopic.name)} disabled={busy}>{busy?"...":"🔄 Refresh"}</Btn><Btn sm v="s" onClick={()=>{setTagInput("");setMod({t:"addTag"});}}>🏷️</Btn><Btn sm v="d" onClick={async()=>{await db.deleteTopic(cW.id,cA.id,curTopic.id);setTopicList(await db.listTopics(cW.id,cA.id));flash("Deleted");setScr("aspect");}}>Del</Btn></div></div>
    <div style={{flex:1,overflowY:"auto",padding:"20px 32px"}}><div style={{maxWidth:800,margin:"0 auto"}}><CardView topic={curTopic}/></div></div></>);

  if(scr==="chatlist")return S(<><div style={{padding:"16px 32px 12px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={()=>setScr("aspect")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:T.gold,flex:1}}>Chats</div></div><div style={{flex:1,overflowY:"auto",padding:"20px 32px",maxWidth:700}}>{cList.map(c=><button key={c.id} onClick={()=>goChat(c)} style={{display:"block",width:"100%",padding:"14px 16px",marginBottom:8,background:T.sf,border:"1px solid "+T.bd,borderRadius:8,cursor:"pointer",textAlign:"left",color:T.tx}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}><div style={{fontSize:14,fontWeight:500}}>{c.title}</div><div style={{fontSize:11,color:T.txD,marginTop:4}}>{new Date(c.updated).toLocaleDateString()+" · "+(c.messages?.length||0)+" msgs"}</div></button>)}</div></>);

  if(scr==="worldchatlist")return S(<><div style={{padding:"16px 32px 12px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={()=>setScr("world")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{flex:1}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:T.gold}}>World Chat</div></div><Btn sm onClick={async()=>{const c=await db.createChat(cW.id,"__worldchat__");setCC(c);setGen(false);setWorldChat(true);setScr("chat");}}>+ New</Btn></div><div style={{flex:1,overflowY:"auto",padding:"20px 32px",maxWidth:700}}>{cList.length===0?<div style={{textAlign:"center",padding:40}}><Btn onClick={async()=>{const c=await db.createChat(cW.id,"__worldchat__");setCC(c);setGen(false);setWorldChat(true);setScr("chat");}}>Start</Btn></div>:cList.map(c=><button key={c.id} onClick={()=>goChat(c,false,true)} style={{display:"block",width:"100%",padding:"14px 16px",marginBottom:8,background:T.sf,border:"1px solid "+T.bd,borderRadius:8,cursor:"pointer",textAlign:"left",color:T.tx}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}><div style={{fontSize:14,fontWeight:500}}>{c.title}</div><div style={{fontSize:11,color:T.txD,marginTop:4}}>{new Date(c.updated).toLocaleDateString()}</div></button>)}</div></>);

  if(scr==="general")return S(<><div style={{padding:"16px 32px 12px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={goMain} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{flex:1}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:T.gold}}>ForgeMaster</div></div><Btn sm onClick={async()=>{const c=await db.createGeneralChat();setCC(c);setGen(true);setWorldChat(false);setScr("chat");}}>+ New</Btn></div><div style={{flex:1,overflowY:"auto",padding:"20px 32px",maxWidth:700}}>{cList.length===0?<div style={{textAlign:"center",padding:40}}><Btn onClick={async()=>{const c=await db.createGeneralChat();setCC(c);setGen(true);setWorldChat(false);setScr("chat");}}>New Chat</Btn></div>:cList.map(c=><button key={c.id} onClick={()=>goChat(c,true)} style={{display:"block",width:"100%",padding:"14px 16px",marginBottom:8,background:T.sf,border:"1px solid "+T.bd,borderRadius:8,cursor:"pointer",textAlign:"left",color:T.tx}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}><div style={{fontSize:14,fontWeight:500}}>{c.title}</div><div style={{fontSize:11,color:T.txD,marginTop:4}}>{new Date(c.updated).toLocaleDateString()}</div></button>)}</div></>);

  if(scr==="chat"&&cC)return S(<React.Fragment>
    <div style={{padding:"12px 32px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd,flexShrink:0}}><button onClick={()=>{setScr(gen?"general":(worldChat?"worldchatlist":"aspect"));setCC(null);}} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{flex:1,minWidth:0}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:T.gold,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{gen?"ForgeMaster":(worldChat?"World Chat":cA?.name)}</div><div style={{fontSize:11,color:T.txD}}>{gen?cC.title:cW?.name}</div></div><div style={{display:"flex",gap:6}}>{!gen&&<Btn sm v="g" onClick={openFact}>📝</Btn>}<Btn sm v="g" onClick={openNote}>↗</Btn>{!gen&&<Btn sm v="g" onClick={openBible}>📖</Btn>}</div></div>
    <div style={{flex:1,overflowY:"auto",padding:"16px 32px"}}><div style={{maxWidth:700,margin:"0 auto"}}>{(!cC.messages||cC.messages.length===0)&&<div style={{padding:"40px 0",textAlign:"center",color:T.txD,fontSize:14}}>Start worldbuilding!</div>}{(cC.messages||[]).map((m,i)=><Bub key={i} msg={m}/>)}{busy&&<div style={{padding:"12px 0",color:T.goldD,fontSize:13,fontStyle:"italic"}}>Forging...</div>}<div ref={endRef}/></div></div>
    <div style={{padding:"12px 32px 16px",borderTop:"1px solid "+T.bd,background:T.sf,flexShrink:0}}><div style={{maxWidth:700,margin:"0 auto",display:"flex",gap:10,alignItems:"flex-end"}}><textarea value={inp} onChange={e=>setInp(e.target.value)} placeholder="Type..." onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} rows={1} style={{flex:1,resize:"none",padding:"10px 16px",borderRadius:10,border:"1px solid "+T.bd,background:T.bg,color:T.tx,fontSize:14,fontFamily:"inherit",outline:"none",maxHeight:140,lineHeight:1.4}} onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,140)+"px";}}/><button onClick={send} disabled={busy||!inp.trim()} style={{background:T.gold,border:"none",borderRadius:10,width:44,height:44,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:busy||!inp.trim()?0.4:1,fontSize:18,flexShrink:0,color:T.bg,fontWeight:700}}>{"↑"}</button></div></div>
  </React.Fragment>);

  if(scr==="settings")return S(<><div style={{padding:"16px 32px 12px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={goMain} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:T.gold}}>Settings</div></div>
    <div style={{flex:1,overflowY:"auto",padding:"24px 32px",maxWidth:600}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>API Key</div>
      <input type="password" value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} placeholder="sk-ant-api03-..." style={{...iS,fontFamily:"monospace",fontSize:13,maxWidth:400}}/>
      <div style={{display:"flex",gap:8,marginTop:10}}><Btn onClick={saveApiKey}>{hasKey?"Update":"Save"}</Btn>{hasKey&&<Btn v="s" onClick={async()=>{setApiKeyInput("");await db.setApiKey(null);setHasKey(false);flash("Removed");}}>Remove</Btn>}</div>
      <div style={{fontSize:11,color:T.txD,marginTop:8}}>{hasKey?"✅ Saved.":"⚠️ No key."}</div>
      <div style={{borderTop:"1px solid "+T.bd,marginTop:24,paddingTop:20}}><div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>Data</div><div style={{display:"flex",gap:10}}><Btn v="s" onClick={doExport}>📤 Export</Btn><Btn v="s" onClick={()=>setScr("import")}>📥 Import</Btn><Btn v="d" onClick={()=>setMod({t:"delAll"})}>🗑️</Btn></div></div>
      <div style={{marginTop:32,fontSize:11,color:T.txD,lineHeight:1.6}}>WorldForge Desktop v3{"\n"}Azgaar Map Integration · 6 Card Templates · Tags{"\n"}Compatible with mobile + terminal</div>
    </div></>);

  if(scr==="import")return S(<><div style={{padding:"16px 32px 12px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={()=>setScr("settings")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:T.gold}}>Import</div></div>
    <div style={{flex:1,overflowY:"auto",padding:"24px 32px",maxWidth:600}}><textarea value={impTxt} onChange={e=>setImpTxt(e.target.value)} placeholder="Paste JSON..." rows={14} style={{width:"100%",resize:"vertical",padding:14,borderRadius:8,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:13,fontFamily:"monospace",outline:"none"}}/><div style={{display:"flex",gap:8,marginTop:12}}><Btn onClick={doImport}>Import</Btn><Btn v="s" onClick={()=>{setImpTxt("");setScr("settings");}}>Cancel</Btn></div></div></>);

  return S(<div style={{padding:40,textAlign:"center",color:T.txD}}>Loading...</div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
