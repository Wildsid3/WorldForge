<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f0f0f">
<title>WorldForge Desktop</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:#0a0a0c;color:#e8e4dc;font-family:'Source Sans 3',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}
input,textarea,button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script>
// === IndexedDB (identical to mobile) ===
const IDB={
  _db:null,
  open(){return new Promise((res,rej)=>{if(this._db)return res(this._db);const r=indexedDB.open('worldforge',2);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};r.onsuccess=e=>{this._db=e.target.result;res(this._db);};r.onerror=e=>rej(e);});},
  async get(k){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>res(t.result===undefined?null:t.result);t.onerror=e=>rej(e);});},
  async set(k,v){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>res(true);t.onerror=e=>rej(e);});},
  async del(k){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readwrite').objectStore('kv').delete(k);t.onsuccess=()=>res(true);t.onerror=e=>rej(e);});},
  async list(p){const d=await this.open();return new Promise((res,rej)=>{const ks=[];const rng=IDBKeyRange.bound(p,p+'\uffff');const t=d.transaction('kv','readonly').objectStore('kv').openCursor(rng);t.onsuccess=e=>{const c=e.target.result;if(c){ks.push(c.key);c.continue();}else res(ks);};t.onerror=e=>rej(e);});},
  async clear(){const d=await this.open();return new Promise((res,rej)=>{const t=d.transaction('kv','readwrite').objectStore('kv').clear();t.onsuccess=()=>res(true);t.onerror=e=>rej(e);});}
};

window.ASPECTS=[
  {id:"characters",name:"Characters",icon:"\u{1f464}",topicType:"character",topicPrompt:"List every character name mentioned"},
  {id:"cultures",name:"Cultures",icon:"\u{1f3db}\ufe0f",topicType:"entity",topicPrompt:"List every culture or civilization mentioned"},
  {id:"history",name:"History",icon:"\u{1f4dc}",topicType:"event",topicPrompt:"List every historical event or era mentioned"},
  {id:"geography",name:"Geography",icon:"\u{1f5fa}\ufe0f",topicType:"location",topicPrompt:"List every location or landmark mentioned"},
  {id:"magic-technology",name:"Magic / Technology",icon:"\u2728",topicType:"system",topicPrompt:"List every magic system or technology mentioned"},
  {id:"politics",name:"Politics",icon:"\u2696\ufe0f",topicType:"entity",topicPrompt:"List every political entity mentioned"},
  {id:"religion-beliefs",name:"Religion & Beliefs",icon:"\u{1f56f}\ufe0f",topicType:"entity",topicPrompt:"List every religion or deity mentioned"},
  {id:"languages",name:"Languages",icon:"\u{1f524}",topicType:"entity",topicPrompt:"List every language mentioned"},
  {id:"economy",name:"Economy",icon:"\u{1f4b0}",topicType:"entity",topicPrompt:"List every economic system mentioned"},
  {id:"story-elements",name:"Story Elements",icon:"\u{1f4d6}",topicType:"entity",topicPrompt:"List every plot thread mentioned"},
  {id:"cosmology",name:"Cosmology & Creation",icon:"\u{1f30c}",topicType:"entity",topicPrompt:"List every cosmic entity mentioned"},
  {id:"flora-fauna",name:"Flora & Fauna",icon:"\u{1f33f}",topicType:"entity",topicPrompt:"List every creature or species mentioned"},
  {id:"organizations",name:"Organizations & Factions",icon:"\u{1f3f4}",topicType:"entity",topicPrompt:"List every faction mentioned"},
  {id:"calendar-time",name:"Calendar & Time",icon:"\u{1f4c5}",topicType:"entity",topicPrompt:"List every calendar or festival mentioned"},
  {id:"arts-entertainment",name:"Arts & Entertainment",icon:"\u{1f3ad}",topicType:"entity",topicPrompt:"List every art form mentioned"},
  {id:"food-cuisine",name:"Food & Cuisine",icon:"\u{1f37d}\ufe0f",topicType:"entity",topicPrompt:"List every dish or tradition mentioned"},
  {id:"fashion",name:"Fashion & Appearance",icon:"\u{1f458}",topicType:"entity",topicPrompt:"List every clothing style mentioned"},
  {id:"architecture",name:"Architecture",icon:"\u{1f3f0}",topicType:"entity",topicPrompt:"List every building or style mentioned"},
  {id:"military",name:"Military & Warfare",icon:"\u2694\ufe0f",topicType:"entity",topicPrompt:"List every army or battle mentioned"},
  {id:"transportation",name:"Transportation & Trade",icon:"\u{1f6a2}",topicType:"entity",topicPrompt:"List every trade route mentioned"},
  {id:"education",name:"Education & Knowledge",icon:"\u{1f4da}",topicType:"entity",topicPrompt:"List every school mentioned"},
  {id:"healthcare",name:"Healthcare & Medicine",icon:"\u{1f3e5}",topicType:"entity",topicPrompt:"List every medical practice mentioned"},
  {id:"notable-locations",name:"Notable Locations",icon:"\u{1f4cd}",topicType:"location",topicPrompt:"List every named place mentioned"},
];
window.MAX_WORLDS=10;

// === Data Layer (identical to mobile) ===
window.db={
  async listWorlds(){const ks=await IDB.list("world:");const ws=[];for(const k of ks){const w=await IDB.get(k);if(w)ws.push(w);}ws.sort((a,b)=>(a.created||"").localeCompare(b.created||""));return ws;},
  async createWorld(n,desc){const id=n.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40)+'-'+Math.random().toString(36).slice(2,8);const m={id,name:n,description:desc||"",created:new Date().toISOString(),updated:new Date().toISOString(),chatCount:0};await IDB.set("world:"+id,m);await IDB.set("bible:"+id,{world_id:id,world_name:n,last_updated:new Date().toISOString(),facts:{}});return m;},
  async saveWorld(w){w.updated=new Date().toISOString();return IDB.set("world:"+w.id,w);},
  async deleteWorld(wid){await IDB.del("world:"+wid);await IDB.del("bible:"+wid);const ck=await IDB.list("chat:"+wid+":");for(const k of ck)await IDB.del(k);},
  async getBible(wid){return(await IDB.get("bible:"+wid))||{facts:{}};},
  async saveBible(wid,b){b.last_updated=new Date().toISOString();return IDB.set("bible:"+wid,b);},
  async addFact(wid,cat,key,val){const b=await this.getBible(wid);if(!b.facts)b.facts={};if(!b.facts[cat])b.facts[cat]={};b.facts[cat][key]=val;return this.saveBible(wid,b);},
  async listChats(wid,aid){const ks=await IDB.list("chat:"+wid+":"+aid+":");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createChat(wid,aid,title){const id=Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);const ch={id,world_id:wid,aspect_id:aid,title:title||("Chat "+new Date().toLocaleString()),created:new Date().toISOString(),updated:new Date().toISOString(),messages:[]};await IDB.set("chat:"+wid+":"+aid+":"+id,ch);return ch;},
  async saveChat(c){c.updated=new Date().toISOString();return IDB.set("chat:"+c.world_id+":"+c.aspect_id+":"+c.id,c);},
  async loadChat(wid,aid,cid){return IDB.get("chat:"+wid+":"+aid+":"+cid);},
  async listGeneralChats(){const ks=await IDB.list("chat:__general__:__general__:");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createGeneralChat(t){return this.createChat("__general__","__general__",t);},
  async fileNote(wid,aid,text){const chats=await this.listChats(wid,aid);let tgt=chats.find(c=>c.title==="Cross-World Notes");if(tgt)tgt=await this.loadChat(wid,aid,tgt.id);if(!tgt)tgt=await this.createChat(wid,aid,"Cross-World Notes");tgt.messages.push({role:"user",content:text,timestamp:new Date().toISOString(),source:"cross-world"});await this.saveChat(tgt);},
  async gatherAspectText(wid,aid){const chats=await this.listChats(wid,aid);const ts=[];for(const ch of chats){const f=await this.loadChat(wid,aid,ch.id);if(f)for(const m of f.messages||[])ts.push(m.content||"");}return ts.join("\n\n");},
  async getWorldSummary(wid){
    const b=await this.getBible(wid);const facts=b.facts||{};
    const parts=[];
    for(const[cat,entries] of Object.entries(facts)){
      const keys=Object.keys(entries).slice(0,3);
      if(keys.length)parts.push(cat.replace(/-/g,' ')+": "+keys.join(", "));
    }
    return parts.slice(0,4).join(". ")||"New world — start building!";
  },
  async exportAll(){const data={version:"worldforge-v2",exported:new Date().toISOString(),worlds:[],bibles:[],chats:[],generalChats:[]};const ws=await this.listWorlds();for(const w of ws){data.worlds.push(w);data.bibles.push({wid:w.id,...(await this.getBible(w.id))});for(const asp of ASPECTS){const cs=await this.listChats(w.id,asp.id);for(const ch of cs){const f=await this.loadChat(w.id,asp.id,ch.id);if(f)data.chats.push(f);}}const wgc=await this.listChats(w.id,"__worldchat__");for(const ch of wgc){const f=await this.loadChat(w.id,"__worldchat__",ch.id);if(f)data.chats.push(f);}}const gc=await this.listGeneralChats();for(const ch of gc){const f=await this.loadChat("__general__","__general__",ch.id);if(f)data.generalChats.push(f);}return data;},
  async importAll(data){let ct={worlds:0,chats:0};for(const w of data.worlds||[]){await IDB.set("world:"+w.id,w);ct.worlds++;}for(const b of data.bibles||[]){const wid=b.wid||b.world_id;if(wid)await IDB.set("bible:"+wid,b);}for(const c of data.chats||[]){await IDB.set("chat:"+c.world_id+":"+c.aspect_id+":"+c.id,c);ct.chats++;}for(const c of data.generalChats||[]){await IDB.set("chat:__general__:__general__:"+c.id,c);ct.chats++;}return ct;},
  async getApiKey(){return IDB.get("_apikey");},
  async setApiKey(k){return IDB.set("_apikey",k);},
};

// === AI ===
window.aiCall=async function(system,messages,maxTokens){
  maxTokens=maxTokens||1500;const key=await db.getApiKey();
  if(!key)return"[No API key. Go to Settings to add your Anthropic API key.]";
  try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system,messages:messages.map(m=>({role:m.role,content:m.content}))})});
  if(!r.ok){const e=await r.json().catch(()=>({}));return"API error "+r.status+": "+(e.error?.message||r.statusText);}
  const data=await r.json();return data.content?.map(b=>b.text||"").join("")||"No response.";}catch(e){return"Network error: "+e.message;}
};
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>

<script type="text/babel" data-type="module">
const {useState,useEffect,useCallback,useRef}=React;
const ASPECTS=window.ASPECTS,MAX_WORLDS=window.MAX_WORLDS,db=window.db,aiCall=window.aiCall;

const T={bg:"#0a0a0c",sf:"#141418",sf2:"#1a1a20",sfH:"#222228",card:"#16161c",
  bd:"#2a2a32",bdL:"#3a3a44",gold:"#c8a24e",goldD:"#8a7030",goldB:"#e8c25e",
  tx:"#e8e4dc",txD:"#7a7670",txM:"#b8b4ac",red:"#8a3a3a",redTx:"#d46a6a"};

const iS={width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid "+T.bd,background:T.bg,color:T.tx,fontSize:14,fontFamily:"inherit",outline:"none"};

// === Shared Components ===
function Modal({open,title,children,onClose}){
  if(!open)return null;
  return(<div style={{position:"fixed",inset:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
    <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)"}}/>
    <div style={{position:"relative",background:T.sf,border:"1px solid "+T.bd,borderRadius:12,padding:24,width:"100%",maxWidth:420}} onClick={e=>e.stopPropagation()}>
      {title&&<div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.gold,marginBottom:16}}>{title}</div>}
      {children}</div></div>);
}

function Btn({children,onClick,v="p",full,sm,disabled,style:s}){
  const m={p:{background:T.gold,color:T.bg,fontWeight:600},s:{background:T.sf2,color:T.tx,border:"1px solid "+T.bd},
    g:{background:"none",color:T.gold},d:{background:T.red,color:"#fff"}};
  return(<button onClick={onClick} disabled={disabled} style={{...m[v],border:m[v].border||"none",padding:sm?"6px 14px":"10px 20px",
    borderRadius:8,fontSize:sm?13:14,cursor:disabled?"default":"pointer",width:full?"100%":"auto",fontFamily:"inherit",opacity:disabled?0.4:1,transition:"transform .1s",...s}}
    onMouseDown={e=>{if(!disabled)e.currentTarget.style.transform="scale(0.97)";}}
    onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}
    onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>{children}</button>);
}

function Bub({msg}){
  const u=msg.role==="user";
  return(<div style={{display:"flex",justifyContent:u?"flex-end":"flex-start",padding:"4px 0",maxWidth:700}}>
    <div style={{maxWidth:"75%",padding:"10px 16px",borderRadius:u?"14px 14px 4px 14px":"14px 14px 14px 4px",
      background:u?T.gold+"1a":T.sf2,border:"1px solid "+(u?T.gold+"33":T.bd),
      fontSize:14,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word",color:T.tx}}>
      {msg.content}
      {msg._filed&&msg._filed.length>0&&<div style={{fontSize:11,color:T.goldD,marginTop:6,borderTop:"1px solid "+T.bd,paddingTop:4}}>
        {msg._filed.map((f,i)=><div key={i}>{"📁 → "+f}</div>)}</div>}
    </div>
  </div>);
}

// === Main App ===
function App(){
  const[scr,setScr]=useState("main");
  const[worlds,setWorlds]=useState([]);
  const[worldDescs,setWorldDescs]=useState({});
  const[cW,setCW]=useState(null);
  const[cA,setCA]=useState(null);
  const[cC,setCC]=useState(null);
  const[cList,setCList]=useState([]);
  const[topics,setTopics]=useState([]);
  const[sheet,setSheet]=useState("");
  const[inp,setInp]=useState("");
  const[busy,setBusy]=useState(false);
  const[toast,setToast]=useState("");
  const[gen,setGen]=useState(false);
  const[worldChat,setWorldChat]=useState(false);
  const[impTxt,setImpTxt]=useState("");
  const[mod,setMod]=useState(null);
  const[modIn,setModIn]=useState("");
  const[modIn2,setModIn2]=useState("");
  const[bibleData,setBibleData]=useState(null);
  const[apiKeyInput,setApiKeyInput]=useState("");
  const[hasKey,setHasKey]=useState(false);
  const[aspCounts,setAspCounts]=useState({});
  const endRef=useRef(null);

  const flash=(m)=>{setToast(m);setTimeout(()=>setToast(""),2500);};
  const ldW=useCallback(async()=>{
    const ws=await db.listWorlds();setWorlds(ws);
    const descs={};for(const w of ws){descs[w.id]=w.description||await db.getWorldSummary(w.id);}setWorldDescs(descs);
  },[]);
  useEffect(()=>{ldW();db.getApiKey().then(k=>{if(k)setHasKey(true);});},[]);
  useEffect(()=>{if(scr==="chat")endRef.current?.scrollIntoView({behavior:"smooth"});},[cC?.messages?.length,scr]);

  // Load aspect chat counts when entering a world
  const loadAspCounts=async(wid)=>{
    const counts={};
    for(const a of ASPECTS){const cs=await db.listChats(wid,a.id);counts[a.id]=cs.length;}
    const wc=await db.listChats(wid,"__worldchat__");counts["__worldchat__"]=wc.length;
    setAspCounts(counts);
  };

  const goMain=()=>{setScr("main");setCW(null);setCA(null);setCC(null);setGen(false);setWorldChat(false);};
  const goWorlds=async()=>{await ldW();setScr("worlds");};
  const goWorld=async(w)=>{setCW(w);setCA(null);setCC(null);setWorldChat(false);await loadAspCounts(w.id);setScr("world");};
  const goAspect=async(a)=>{setCA(a);setCList(await db.listChats(cW.id,a.id));setScr("aspect");};
  const goChat=async(ch,g=false,wc=false)=>{
    const wid=g?"__general__":cW.id;const aid=g?"__general__":(wc?"__worldchat__":cA.id);
    const full=await db.loadChat(wid,aid,ch.id);
    if(full){setCC(full);setGen(g);setWorldChat(wc);setScr("chat");}
  };
  const goGen=async()=>{setCList(await db.listGeneralChats());setGen(true);setWorldChat(false);setCW(null);setCA(null);setScr("general");};
  const goWorldChat=async()=>{setCList(await db.listChats(cW.id,"__worldchat__"));setWorldChat(true);setGen(false);setScr("worldchatlist");};

  const openNewWorld=()=>{setModIn("");setModIn2("");setMod({t:"newWorld"});};
  const doNewWorld=async()=>{const n=modIn.trim();const d=modIn2.trim();setMod(null);if(!n)return;if(worlds.length>=MAX_WORLDS){flash("Max "+MAX_WORLDS);return;}const w=await db.createWorld(n,d);flash("Created: "+n);await ldW();goWorld(w);};

  // Send message
  const send=async()=>{
    if(!inp.trim()||busy)return;const txt=inp.trim();setInp("");
    const chat={...cC,messages:[...(cC.messages||[]),{role:"user",content:txt,timestamp:new Date().toISOString()}]};
    setCC(chat);setBusy(true);
    let sys;const aspectIds=ASPECTS.map(a=>a.id).join(", ");
    if(gen){
      const wl=worlds.map(w=>w.name).join(", ");
      sys="You are WorldForge, a creative worldbuilding assistant in General Chat mode.\nAvailable worlds: "+(wl||"None")+"\nIf the user mentions something for a specific world, after your creative response add on its own line:\n[FILE: WorldName > aspect-id] brief summary\nValid aspect IDs: "+aspectIds+"\nBe warm, creative, collaborative.";
    }else if(worldChat){
      const bible=await db.getBible(cW.id);const bt=Object.entries(bible.facts||{}).map(([c,e])=>"["+c+"]\n"+Object.entries(e).map(([k,v])=>"  "+k+": "+v).join("\n")).join("\n");
      sys="You are WorldForge, a creative worldbuilding assistant.\nWorld: \""+cW.name+"\" | Mode: Open Discussion\n\nWORLD BIBLE:\n"+(bt||"(Empty)")+"\n\nThe user is brainstorming freely about this world.\nAfter each response, categorize by adding:\n[CAT: aspect-id] brief summary\nValid aspect IDs: "+aspectIds+"\nBe warm, creative, detailed.";
    }else{
      const bible=await db.getBible(cW.id);const bt=Object.entries(bible.facts||{}).map(([c,e])=>"["+c+"]\n"+Object.entries(e).map(([k,v])=>"  "+k+": "+v).join("\n")).join("\n");
      sys="You are WorldForge, a creative worldbuilding assistant.\nWorld: \""+cW.name+"\" | Aspect: \""+cA.name+"\"\n\nWORLD BIBLE:\n"+(bt||"(Empty)")+"\n\nBe warm, creative, detailed.";
    }
    let resp=await aiCall(sys,chat.messages);const filed=[];
    if(gen){const fp=/\[FILE:\s*(.+?)\s*>\s*(.+?)\]\s*(.+?)(?:\n|$)/g;let m;while((m=fp.exec(resp))!==null){const w=worlds.find(w=>w.name.toLowerCase().includes(m[1].toLowerCase().trim()));const a=ASPECTS.find(a=>a.id===m[2].trim()||a.name.toLowerCase().includes(m[2].toLowerCase().trim()));if(w&&a){await db.fileNote(w.id,a.id,m[3].trim());filed.push(w.name+" > "+a.name);}}resp=resp.replace(fp,"").trim();}
    if(worldChat){const cp=/\[CAT:\s*(.+?)\]\s*(.+?)(?:\n|$)/g;let m;while((m=cp.exec(resp))!==null){const a=ASPECTS.find(a=>a.id===m[1].trim()||a.name.toLowerCase().includes(m[1].toLowerCase().trim()));if(a){await db.fileNote(cW.id,a.id,m[2].trim());filed.push(cW.name+" > "+a.name);}}resp=resp.replace(cp,"").trim();}
    const aiMsg={role:"assistant",content:resp,timestamp:new Date().toISOString()};if(filed.length)aiMsg._filed=filed;
    const upd={...chat,messages:[...chat.messages,aiMsg]};setCC(upd);await db.saveChat(upd);setBusy(false);
  };

  const doTopics=async()=>{if(!cW||!cA)return;setBusy(true);const text=await db.gatherAspectText(cW.id,cA.id);if(!text.trim()){setTopics([]);setBusy(false);flash("No chats yet");return;}const sys="You are a data extractor. "+cA.topicPrompt+" from the text.\nReturn ONLY a JSON array: [{\"name\":\"...\",\"brief\":\"...\"}]\nNo preamble.";const resp=await aiCall(sys,[{role:"user",content:text.slice(0,8000)}],1024);try{const c=resp.trim().replace(/^```\w*\n?/,"").replace(/\n?```$/,"");const a=c.match(/\[[\s\S]*\]/);setTopics(a?JSON.parse(a[0]):[]);}catch(e){setTopics([]);flash("Parse error");}setBusy(false);setScr("topics");};
  const doSheet=async(name)=>{setBusy(true);setScr("charsheet");const text=await db.gatherAspectText(cW.id,"characters");const bible=await db.getBible(cW.id);const sys="Create a Baldur's Gate style character sheet for \""+name+"\" in \""+cW.name+"\". Use ONLY conversation data. For unknowns write \"Unknown\".";const resp=await aiCall(sys,[{role:"user",content:"Bible: "+JSON.stringify(bible.facts)+"\n\nConversations:\n"+text.slice(0,6000)}],1024);setSheet(resp);setBusy(false);};
  const doExport=async()=>{const data=await db.exportAll();const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="worldforge-export.json";a.click();URL.revokeObjectURL(url);flash("Exported!");};
  const doImport=async()=>{if(!impTxt.trim())return;try{const d=JSON.parse(impTxt);const c=await db.importAll(d);flash("Imported "+c.worlds+"w "+c.chats+"c");setImpTxt("");await ldW();setScr("settings");}catch(e){flash("Invalid JSON");}};
  const saveApiKey=async()=>{const k=apiKeyInput.trim();if(k){await db.setApiKey(k);setHasKey(true);flash("API key saved!");}else{await db.setApiKey(null);setHasKey(false);flash("Key removed");}};
  const openBible=async()=>{if(!cW)return;const b=await db.getBible(cW.id);setBibleData(b.facts||{});setMod({t:"bible"});};
  const openFact=()=>{setModIn("");setMod({t:"fact"});};
  const doFact=async()=>{const r=modIn.trim();setMod(null);if(!r||!cW)return;const m=r.match(/(.+?)\s*-\s*(.+?):\s*(.+)/);if(m){await db.addFact(cW.id,m[1].trim().toLowerCase().replace(/\s+/g,'-'),m[2].trim(),m[3].trim());flash("Added to Bible");}else flash("Format: cat - key: value");};
  const openNote=()=>{setModIn("");setMod({t:"note1"});};
  const doNote1=()=>{const r=modIn.trim();if(!r||!r.includes(">")){flash("World > Aspect");return;}const[ws,as]=r.split(">");const w=worlds.find(w=>w.name.toLowerCase().includes(ws.trim().toLowerCase()));const a=ASPECTS.find(a=>a.name.toLowerCase().includes(as.trim().toLowerCase())||a.id.includes(as.trim().toLowerCase()));if(!w||!a){flash("Not found");return;}setMod({t:"note2",w,a});setModIn("");};
  const doNote2=async()=>{const n=modIn.trim();if(!n||!mod?.w||!mod?.a){setMod(null);return;}await db.fileNote(mod.w.id,mod.a.id,n);flash("Filed to "+mod.w.name+" > "+mod.a.name);setMod(null);};

  const S=(ch)=>(<div style={{height:"100%",background:T.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>

    <Modal open={mod?.t==="note2"} title={"Note → "+(mod?.w?.name||"")+" > "+(mod?.a?.name||"")} onClose={()=>setMod(null)}>

  // HOME — 3 big cards

          onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}>
          <div style={{fontSize:14,fontWeight:500}}>{c.title}</div>
          <div style={{fontSize:11,color:T.txD,marginTop:4}}>{new Date(c.updated).toLocaleDateString()+" · "+(c.messages?.length||0)+" msgs"}</div>
        </button>)}

  if(scr==="chat"&&cC)return S(
    <React.Fragment>
      <div style={{padding:"12px 32px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd,flexShrink:0}}>

          <textarea value={inp} onChange={e=>setInp(e.target.value)} placeholder="Type your message..."
            onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
            rows={1} style={{flex:1,resize:"none",padding:"10px 16px",borderRadius:10,border:"1px solid "+T.bd,
              background:T.bg,color:T.tx,fontSize:14,fontFamily:"inherit",outline:"none",maxHeight:140,lineHeight:1.4}}
            onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,140)+"px";}}/>
          <button onClick={send} disabled={busy||!inp.trim()} style={{background:T.gold,border:"none",borderRadius:10,width:44,height:44,
            cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
            opacity:busy||!inp.trim()?0.4:1,fontSize:18,flexShrink:0,color:T.bg,fontWeight:700}}>{"↑"}</button>
        </div>
      </div>
    </React.Fragment>
  );

  // SETTINGS
  if(scr==="settings")return S(<>
    <div style={{padding:"16px 32px 12px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}>
      <button onClick={goMain} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:700,color:T.gold}}>Settings</div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"24px 32px",maxWidth:600}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>Claude API Key</div>
      <div style={{fontSize:12,color:T.txD,marginBottom:10}}>Required for AI. Get yours at console.anthropic.com</div>
      <input type="password" value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} placeholder="sk-ant-api03-..." style={{...iS,fontFamily:"monospace",fontSize:13,maxWidth:400}}/>
      <div style={{display:"flex",gap:8,marginTop:10}}>
        <Btn onClick={saveApiKey}>{hasKey?"Update Key":"Save Key"}</Btn>
        {hasKey&&<Btn v="s" onClick={async()=>{setApiKeyInput("");await db.setApiKey(null);setHasKey(false);flash("Removed");}}>Remove</Btn>}
      </div>
      <div style={{fontSize:11,color:T.txD,marginTop:8}}>{hasKey?"✅ Saved locally.":"⚠️ No key. Chats won't work."}</div>
      <div style={{borderTop:"1px solid "+T.bd,marginTop:24,paddingTop:20}}>
        <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>Data</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <Btn v="s" onClick={doExport}>📤 Export</Btn>
          <Btn v="s" onClick={()=>setScr("import")}>📥 Import</Btn>
          <Btn v="d" onClick={()=>setMod({t:"delAll"})}>🗑️ Delete All</Btn>
        </div>
      </div>
      <div style={{marginTop:32,fontSize:11,color:T.txD,lineHeight:1.6}}>WorldForge Desktop v2<br/>AI: Claude Sonnet<br/>Storage: IndexedDB (local)<br/>Compatible with mobile + terminal</div>
    </div>
  </>);

  // IMPORT
  if(scr==="import")return S(<>
    <div style={{padding:"16px 32px 12px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}>
      <button onClick={()=>setScr("settings")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:T.gold}}>Import Data</div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"24px 32px",maxWidth:600}}>
      <div style={{fontSize:13,color:T.txD,marginBottom:12}}>Paste JSON from mobile or terminal export.</div>
      <textarea value={impTxt} onChange={e=>setImpTxt(e.target.value)} placeholder="Paste JSON..." rows={14}
        style={{width:"100%",resize:"vertical",padding:14,borderRadius:8,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:13,fontFamily:"monospace",outline:"none"}}/>
      <div style={{display:"flex",gap:8,marginTop:12}}><Btn onClick={doImport}>Import</Btn><Btn v="s" onClick={()=>{setImpTxt("");setScr("settings");}}>Cancel</Btn></div>
    </div>
  </>);

  return S(<div style={{padding:40,textAlign:"center",color:T.txD}}>Loading...</div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
