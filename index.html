<script>
// === IDB ===
const IDB={_db:null,
open(){return new Promise((r,j)=>{if(this._db)return r(this._db);const q=indexedDB.open('worldforge',3);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};q.onsuccess=e=>{this._db=e.target.result;r(this._db);};q.onerror=e=>j(e);});},
async get(k){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>r(t.result===undefined?null:t.result);t.onerror=e=>j(e);});},
async set(k,v){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>r(true);t.onerror=e=>j(e);});},
async del(k){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').delete(k);t.onsuccess=()=>r(true);t.onerror=e=>j(e);});},
async list(p){const d=await this.open();return new Promise((r,j)=>{const ks=[];const rng=IDBKeyRange.bound(p,p+'\uffff');const t=d.transaction('kv','readonly').objectStore('kv').openCursor(rng);t.onsuccess=e=>{const c=e.target.result;if(c){ks.push(c.key);c.continue();}else r(ks);};t.onerror=e=>j(e);});},
async clear(){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').clear();t.onsuccess=()=>r(true);t.onerror=e=>j(e);});}};

// === Config ===
const CARD_TMPL={entity:["characters","organizations"],location:["locations"],notable:["notable-locations","architecture"],system:["magic-technology","politics","economy","languages","education","healthcare","transportation"],culture:["cultures","religion-beliefs","arts-entertainment","food-cuisine","fashion","calendar-time"],event:["history","military","story-elements","cosmology"],creature:["flora-fauna"],geography:["geography"]};
const TMPL_FOR={};Object.entries(CARD_TMPL).forEach(([t,ids])=>ids.forEach(id=>TMPL_FOR[id]=t));

const CAT_RULES=`CATEGORY RULES - follow strictly:
- characters: Named individuals with agency who act and decide.
- locations: Every named place (cities, towns, regions, bodies of water).
- notable-locations: Places with narrative SIGNIFICANCE (capitals, battle sites, holy sites).
- cultures: Shared identity groups (customs, language, values). NOT political structures.
- history: Events that HAPPENED. Tag sub-type: battle/death/revolution/birth/nation-formation/tech-advancement/treaty/disaster.
- politics: Current power structures and governance.
- religion-beliefs: Faith systems, deities, doctrines, clergy.
- organizations: Groups with structure (guilds, factions, orders).
- military: Armed forces, warfare doctrine, standing armies.
- magic-technology: Systems enabling capabilities.
- geography: Physical landscape (mountains, rivers, forests, biomes).
- flora-fauna: Non-person organisms.
- economy: Trade, currency, resources.
- languages: Communication systems, scripts.
CRITICAL: ONLY extract entities EXPLICITLY named in the text. NEVER invent from general knowledge. When uncertain, EXCLUDE.
TIMELINE: If any dates or years are mentioned alongside entities, include "year" field in your response.`;

window.ASPECTS=[
{id:"characters",name:"Characters",icon:"\u{1f464}",topicPrompt:"List every named character mentioned"},
{id:"locations",name:"Locations",icon:"\u{1f3d8}\ufe0f",topicPrompt:"List every named place, city, town, village, region mentioned"},
{id:"notable-locations",name:"Notable Locations",icon:"\u{1f4cd}",topicPrompt:"List every location of narrative significance"},
{id:"cultures",name:"Cultures",icon:"\u{1f3db}\ufe0f",topicPrompt:"List every culture or civilization mentioned"},
{id:"history",name:"History",icon:"\u{1f4dc}",topicPrompt:"List every historical event mentioned. Include year if stated."},
{id:"geography",name:"Geography",icon:"\u{1f5fa}\ufe0f",topicPrompt:"List every physical landscape feature mentioned"},
{id:"politics",name:"Politics",icon:"\u2696\ufe0f",topicPrompt:"List every political entity or government mentioned"},
{id:"religion-beliefs",name:"Religion & Beliefs",icon:"\u{1f56f}\ufe0f",topicPrompt:"List every religion or faith system mentioned"},
{id:"organizations",name:"Organizations",icon:"\u{1f3f4}",topicPrompt:"List every organized group mentioned"},
{id:"military",name:"Military & Warfare",icon:"\u2694\ufe0f",topicPrompt:"List every military force mentioned"},
{id:"magic-technology",name:"Magic / Technology",icon:"\u2728",topicPrompt:"List every magic system or technology mentioned"},
{id:"economy",name:"Economy",icon:"\u{1f4b0}",topicPrompt:"List every economic system mentioned"},
{id:"languages",name:"Languages",icon:"\u{1f524}",topicPrompt:"List every language mentioned"},
{id:"flora-fauna",name:"Flora & Fauna",icon:"\u{1f33f}",topicPrompt:"List every creature or species mentioned"},
{id:"story-elements",name:"Story Elements",icon:"\u{1f4d6}",topicPrompt:"List every plot thread mentioned"},
{id:"cosmology",name:"Cosmology",icon:"\u{1f30c}",topicPrompt:"List every cosmic entity mentioned"},
{id:"calendar-time",name:"Calendar & Time",icon:"\u{1f4c5}",topicPrompt:"List every calendar or festival mentioned"},
{id:"arts-entertainment",name:"Arts & Entertainment",icon:"\u{1f3ad}",topicPrompt:"List every art form mentioned"},
{id:"food-cuisine",name:"Food & Cuisine",icon:"\u{1f37d}\ufe0f",topicPrompt:"List every dish mentioned"},
{id:"fashion",name:"Fashion",icon:"\u{1f458}",topicPrompt:"List every clothing style mentioned"},
{id:"architecture",name:"Architecture",icon:"\u{1f3f0}",topicPrompt:"List every building mentioned"},
{id:"transportation",name:"Transportation",icon:"\u{1f6a2}",topicPrompt:"List every transport system mentioned"},
{id:"education",name:"Education",icon:"\u{1f4da}",topicPrompt:"List every school mentioned"},
{id:"healthcare",name:"Healthcare",icon:"\u{1f3e5}",topicPrompt:"List every medical practice mentioned"},
];
window.MAX_WORLDS=10;

// Subcategories are dynamic — derived from topic.subcategory fields.
// Created by: AI scan (auto-suggests), Azgaar import (auto-assigns from data), user (manual assignment).
// No hardcoded list — the filter bar on aspect screens reads unique subcategories from loaded topics.

// === Template fields per aspect (for template-aware chat) ===
window.ASPECT_FIELDS={
  "characters":"Name, Race/Species, Class/Role, Skills, Equipment, Relationships, Personal History, Motivations, Quote",
  "locations":"Type, Region, Population, Government, Culture, Religion, Climate, Resources, Features, Notable Buildings",

  "cultures":"Origin, Values & Beliefs, Customs, Art Expression, Social Structure, Language, Relations",

  "geography":"Type, Scale, Physical Description, Climate & Ecology, Resources, Connections",

  "religion-beliefs":"Doctrine, Origin, Practices, Clergy, Sacred Sites, Relationship to Society",

  "magic-technology":"Principles, Practitioners, Effects, Limitations, Origin, Cost",

  "cosmology":"Nature, Inhabitants, Access Method, Rules, Relationship to Material World",
  "calendar-time":"Duration, Seasons, Festivals, Astronomical Events, Cultural Significance",
  "arts-entertainment":"Medium, Practitioners, Cultural Role, Famous Works, Patronage",
  "food-cuisine":"Ingredients, Preparation, Cultural Context, Regional Variations",
  "fashion":"Materials, Cultural Meaning, Class Distinctions, Ceremonial vs Daily",
  "architecture":"Style, Materials, Purpose, Notable Examples, Cultural Influences",
  "transportation":"Method, Speed, Capacity, Routes, Cost, Limitations",
  "education":"Institutions, Curriculum, Access, Duration, Cultural Role",
  "healthcare":"Methods, Practitioners, Common Ailments, Magical vs Natural, Access",
};

// === Universe Aspects (6) ===
window.UNIVERSE_ASPECTS=[
{id:"cosmology-planes",name:"Cosmology & Planes",icon:"\u{1f30c}",topicPrompt:"List every cosmic plane, dimension, or realm mentioned"},
{id:"universal-laws",name:"Universal Laws",icon:"\u26a1",topicPrompt:"List every universal law, rule, or fundamental force mentioned"},
{id:"creation-myths",name:"Creation Myths",icon:"\u{1f4dc}",topicPrompt:"List every creation myth or origin story mentioned"},
{id:"overarching-timeline",name:"Overarching Timeline",icon:"\u23f3",topicPrompt:"List every universe-spanning event or epoch mentioned"},
{id:"cross-world-entities",name:"Cross-World Entities",icon:"\u{1f517}",topicPrompt:"List every entity that exists across multiple worlds"},
{id:"pantheon-deities",name:"Pantheon & Deities",icon:"\u{1f451}",topicPrompt:"List every deity, god, or divine being mentioned"},
];

function normTag(t){return t.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');}
function normTags(a){return[...new Set((a||[]).map(normTag).filter(t=>t.length>0))];}
function mkId(){return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);}
function safeArr(v){if(!v)return[];if(Array.isArray(v))return v;if(typeof v==='object')return Object.values(v);return[];}

// === COA (Coat of Arms) Rendering ===
window.coaUrl=function(coa){
  if(!coa)return null;
  try{return"https://armoria.herokuapp.com/?coa="+encodeURIComponent(JSON.stringify(coa));}catch(e){return null;}
};
// MFCG city map link
window.mfcgUrl=function(burg,seed){
  if(!burg)return null;
  const s=seed||burg.MFCG||burg.i||0;
  const size=Math.max(1,Math.min(60,Math.round((burg.population||1)*10)));
  return"https://watabou.github.io/city-generator/?seed="+s+"&size="+size+(burg.port?"&coast=1":"")+(burg.citadel?"&citadel=1":"")+(burg.walls?"&walls=1":"")+(burg.plaza?"&plaza=1":"")+(burg.temple?"&temple=1":"")+(burg.shanty?"&shanty=1":"");
};
// Watabou generators
window.villageUrl=function(name,seed){const s=seed||Math.abs(name?name.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0):Math.random()*99999|0);return"https://watabou.github.io/village-generator/?seed="+s;};
window.dungeonUrl=function(name,seed){const s=seed||Math.abs(name?name.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0):Math.random()*99999|0);return"https://watabou.github.io/one-page-dungeon/?seed="+s;};
window.dwellingUrl=function(name,seed){const s=seed||Math.abs(name?name.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0):Math.random()*99999|0);return"https://watabou.github.io/dwellings/?seed="+s;};
window.neighbourhoodUrl=function(name,seed){const s=seed||Math.abs(name?name.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0),0):Math.random()*99999|0);return"https://watabou.github.io/neighbourhood/?seed="+s;};

// === Enriched Azgaar Parser ===
window.parseAzgaarMap=function(text){
  const R={svg:null,pack:null,params:null,error:null,debug:[]};
  try{
    R.debug.push("Size:"+text.length);
    const ss=text.indexOf('<svg'),se=text.lastIndexOf('</svg>');
    if(ss<0||se<0){R.error="No SVG";return R;}
    R.svg=text.substring(ss,se+6);
    // Params from first line
    const fl=text.substring(0,ss).split('\n')[0].trim();
    if(fl.startsWith('{')){try{R.params=JSON.parse(fl);}catch(e){}}
    // Find pack JSON
    const after=text.substring(se+6);
    const objs=[];let d=0,os=-1;
    for(let i=0;i<after.length;i++){if(after[i]==='{'){if(d===0)os=i;d++;}else if(after[i]==='}'){d--;if(d===0&&os>=0){objs.push({s:os,e:i+1});os=-1;}}}
    for(let i=0;i<objs.length;i++){
      const str=after.substring(objs[i].s,objs[i].e);
      try{const o=JSON.parse(str);if(o.states||o.burgs||o.cultures){R.pack=o;R.debug.push("Pack at "+i);break;}
        if(o.cells||o.vertices){continue;}}catch(e){R.debug.push("Obj "+i+" fail");}
    }
    if(!R.pack)R.error="Pack not found";
  }catch(e){R.error=e.message;}
  return R;
};

// === Enriched topic generation from Azgaar pack ===
window.generateTopicsFromPack=function(pack,wid,params){
  const T=[];if(!pack)return T;
  const states=safeArr(pack.states),burgs=safeArr(pack.burgs),cultures=safeArr(pack.cultures),
    religions=safeArr(pack.religions),rivers=safeArr(pack.rivers),military=safeArr(pack.military),
    provinces=safeArr(pack.provinces),biomes=safeArr(pack.biomes),cells=pack.cells||{};
  const sN={},cN={},rN={},sColor={},sCoa={};
  states.forEach(s=>{if(s&&s.i>0){sN[s.i]=s.name||s.fullName||"State "+s.i;sColor[s.i]=s.color||"";sCoa[s.i]=s.coa||null;}});
  cultures.forEach(c=>{if(c&&c.i>0)cN[c.i]=c.name||"Culture "+c.i;});
  religions.forEach(r=>{if(r&&r.i>0)rN[r.i]=r.name||"Religion "+r.i;});

  // Get biome name for a cell
  const biomeNames=["Marine","Hot desert","Cold desert","Savanna","Grassland","Tropical seasonalForest","Temperate deciduous forest","Tropical rainforest","Temperate rainforest","Taiga","Tundra","Glacier","Wetland"];
  const getBiome=(cellId)=>{
    if(cells.biome&&cells.biome[cellId]!==undefined){const bi=cells.biome[cellId];return biomeNames[bi]||"Biome "+bi;}return"";
  };
  const getElev=(cellId)=>cells.h&&cells.h[cellId]!==undefined?cells.h[cellId]:null;
  const getTemp=(cellId)=>cells.temp&&cells.temp[cellId]!==undefined?cells.temp[cellId]:null;

  // World year from params
  const worldYear=params?.options?.year||params?.year||null;
  const eraName=params?.options?.eraName||params?.eraName||"";

  // === STATES -> politics ===
  states.forEach(s=>{
    if(!s||!s.i||s.i===0||s.removed)return;
    const cap=s.capital&&burgs[s.capital]?burgs[s.capital]:null;
    const cult=s.culture?cN[s.culture]||"?":"?";
    const rel=s.religion?rN[s.religion]||"?":"?";
    const totalPop=Math.round(((s.rural||0)+(s.urban||0))*1000);
    // Diplomacy
    const diplo=[];
    if(s.diplomacy)s.diplomacy.forEach((d,i)=>{if(i>0&&d&&d!=="x"&&d!=="Neutral"&&sN[i])diplo.push(sN[i]+": "+d);});
    // Provinces
    const provs=provinces.filter(p=>p&&p.state===s.i&&p.name).map(p=>p.fullName||p.name);

    T.push({id:"azg-state-"+s.i,name:s.fullName||s.name,brief:(s.fullName||s.name)+", "+cult+" "+(s.form||"state")+". Pop: "+totalPop.toLocaleString(),
      template:"system",tags:normTags([s.form||"",cult,"state",s.name]),aspect_id:"politics",world_id:wid,source:"azgaar",subcategory:(s.form||"State").charAt(0).toUpperCase()+(s.form||"state").slice(1),
      coa:s.coa||null,color:s.color||"",born_year:null,died_year:null,timeline:[],
      fields:{principle:"Government: "+(s.form||"Unknown"),
        components:["Total population: "+totalPop.toLocaleString(),"Rural: "+Math.round((s.rural||0)*1000).toLocaleString(),"Urban: "+Math.round((s.urban||0)*1000).toLocaleString(),"Area: "+(s.area?Math.round(s.area):"?")+" cells"],
        practitioners:"Culture: "+cult+"\nReligion: "+rel,effects:"Capital: "+(cap?cap.name:"?")+"\n"+(provs.length?"Provinces: "+provs.join(", "):""),
        limitations:diplo.length?"Diplomacy:\n"+diplo.join("\n"):"",origin:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // === BURGS -> locations + notable-locations ===
  burgs.forEach(b=>{
    if(!b||!b.i||b.i===0||!b.name)return;
    const st=b.state?sN[b.state]||"Unclaimed":"Unclaimed";
    const cult=b.culture?cN[b.culture]||"?":"?";
    const rel=b.religion?rN[b.religion]||"?":"?";
    const pop=Math.round((b.population||0)*1000);
    const feats=[];
    if(b.capital)feats.push("Capital");if(b.port)feats.push("Port");if(b.citadel)feats.push("Citadel");
    if(b.walls)feats.push("Walled");if(b.plaza)feats.push("Market");if(b.temple)feats.push("Temple");if(b.shanty)feats.push("Shantytown");
    const biome=b.cell?getBiome(b.cell):"";
    const elev=b.cell?getElev(b.cell):null;
    const temp=b.cell?getTemp(b.cell):null;
    const tags=normTags([st,cult,...feats,b.name,biome]);
    const mfcg=mfcgUrl(b);
    const coa=b.coa||null;
    const subcat=b.capital?"Capital":pop>5000?"City":b.citadel||b.walls?"Fortress":b.port?"Port":pop<500?"Village":"Town";

    T.push({id:"azg-loc-"+b.i,name:b.name,brief:b.name+(b.capital?" (capital)":"")+", "+st+". Pop: "+pop.toLocaleString(),
      template:"location",tags,aspect_id:"locations",world_id:wid,source:"azgaar",subcategory:subcat,
      coa,mfcg_url:mfcg,coords:{x:b.x||0,y:b.y||0},born_year:null,died_year:null,timeline:[],
      fields:{type:feats.length?feats.join(", "):"Settlement",region:st,population:pop.toLocaleString(),
        government:st,culture:cult,religion:rel,
        climate:(biome||"")+(temp!==null?" ("+temp+"\u00b0)":""),
        resources:"Elevation: "+(elev!==null?elev:"?"),
        features:feats,mfcg_url:mfcg},
      created:new Date().toISOString(),updated:new Date().toISOString()});

    if(b.capital||feats.length>=2){
      T.push({id:"azg-notable-"+b.i,name:b.name,brief:b.name+" — "+(b.capital?"Capital of "+st:feats.join(", ")),
        template:"notable",tags:[...tags,"notable"],aspect_id:"notable-locations",world_id:wid,source:"azgaar",subcategory:b.capital?"Capital":(b.citadel?"Fortress":(b.temple?"Sacred Site":"Landmark")),
        coa,mfcg_url:mfcg,coords:{x:b.x||0,y:b.y||0},born_year:null,died_year:null,timeline:[],
        fields:{significance:b.capital?"Capital of "+st:"Notable for "+feats.join(", "),
          physical_desc:feats.join(", ")+(biome?" in "+biome:""),history_events:"",connected_entities:st+", "+cult,history:"Pop: "+pop.toLocaleString()},
        created:new Date().toISOString(),updated:new Date().toISOString()});
    }
  });

  // === CULTURES ===
  cultures.forEach(c=>{
    if(!c||!c.i||c.i===0||c.removed)return;
    const parentCulture=c.base!==undefined&&cN[c.base]?cN[c.base]:"Indigenous";
    const shieldShape=c.shield||"heater";
    T.push({id:"azg-culture-"+c.i,name:c.name||"Culture "+c.i,
      brief:(c.name||"")+" — "+(c.type||"")+" culture"+(c.base?" (from "+parentCulture+")":""),
      template:"culture",tags:normTags([c.type||"",c.name,"culture"]),aspect_id:"cultures",world_id:wid,source:"azgaar",subcategory:(c.type||"Culture").charAt(0).toUpperCase()+(c.type||"culture").slice(1),
      coa:c.coa||null,born_year:null,died_year:null,timeline:[],
      fields:{origin:"Type: "+(c.type||"?")+"\nDerived from: "+parentCulture+"\nShield style: "+shieldShape,
        values_beliefs:"",customs_practices:"Naming method: "+(c.code||"default"),
        art_expression:"",social_structure:"",language:"",relations:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // === RELIGIONS ===
  religions.forEach(r=>{
    if(!r||!r.i||r.i===0||r.removed)return;
    const originCult=r.culture!==undefined?cN[r.culture]||"?":"?";
    T.push({id:"azg-religion-"+r.i,name:r.name||"Religion "+r.i,
      brief:(r.name||"")+" — "+(r.form||"")+" "+(r.type||"religion")+". Origin: "+originCult,
      template:"culture",tags:normTags([r.type||"",r.form||"",r.name,"religion"]),aspect_id:"religion-beliefs",world_id:wid,source:"azgaar",subcategory:(r.form||r.type||"Religion").charAt(0).toUpperCase()+(r.form||r.type||"religion").slice(1),
      born_year:null,died_year:null,timeline:[],
      fields:{origin:"Type: "+(r.type||"?")+"\nForm: "+(r.form||"?")+"\nOrigin culture: "+originCult,
        values_beliefs:r.deity?"Central deity: "+r.deity:"No central deity",
        customs_practices:"",art_expression:"",social_structure:"",language:"",relations:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // === RIVERS -> geography ===
  rivers.forEach(rv=>{

  });

};

  // === Auto-enrich from Azgaar pack (NO AI needed) ===
  async autoEnrichFromPack(wid){
    const pack=await this.getMapPack(wid);if(!pack)return{enriched:0};
    const states=safeArr(pack.states),burgs=safeArr(pack.burgs),cultures=safeArr(pack.cultures),
      religions=safeArr(pack.religions);
    const sN={},cN={},rN={};
    states.forEach(s=>{if(s&&s.i>0)sN[s.i]=s.name||s.fullName||"";});
    cultures.forEach(c=>{if(c&&c.i>0)cN[c.i]=c.name||"";});
    religions.forEach(r=>{if(r&&r.i>0)rN[r.i]=r.name||"";});
    let enriched=0;
    // Auto-populate Bible from pack data
    const b=await this.getBible(wid);if(!b.facts)b.facts={};
    // States -> politics facts
    states.forEach(s=>{if(!s||!s.i||s.i===0||s.removed)return;
      const name=s.fullName||s.name;if(!name)return;
      if(!b.facts['politics'])b.facts['politics']={};
      b.facts['politics'][name]=(s.form||"state")+", culture: "+(cN[s.culture]||"?")+", pop: "+Math.round(((s.rural||0)+(s.urban||0))*1000).toLocaleString();
    });
    // Cultures -> culture facts
    cultures.forEach(c=>{if(!c||!c.i||c.i===0||c.removed)return;
      if(!b.facts['cultures'])b.facts['cultures']={};
      b.facts['cultures'][c.name||"Culture "+c.i]=(c.type||"")+" culture";
    });
    // Religions -> religion facts
    religions.forEach(r=>{if(!r||!r.i||r.i===0||r.removed)return;
      if(!b.facts['religions'])b.facts['religions']={};
      b.facts['religions'][r.name||"Religion "+r.i]=(r.form||"")+" "+(r.type||"religion")+(r.deity?" — deity: "+r.deity:"");
    });
    await this.saveBible(wid,b);
    // Cross-reference: for each burg topic, add tags for its state, culture, religion
    const locTopics=await this.listTopics(wid,"locations");
    for(const t of locTopics){
      if(t.source!=="azgaar")continue;
      const burgId=parseInt((t.id.match(/\d+$/)||["0"])[0]);
      const burg=burgs[burgId];if(!burg)continue;
      const newTags=[...t.tags];
      if(burg.state&&sN[burg.state])newTags.push(sN[burg.state]);
      if(burg.culture&&cN[burg.culture])newTags.push(cN[burg.culture]);
      if(burg.religion&&rN[burg.religion])newTags.push(rN[burg.religion]);
      // Add biome if available
      if(burg.capital)newTags.push("capital");
      if(burg.port)newTags.push("port");
      const merged={...t,tags:normTags(newTags)};
      if(merged.tags.length!==t.tags.length){await this.saveTopic(merged);enriched++;}
    }
    // Cross-ref: state topics get tags for their burgs
    const polTopics=await this.listTopics(wid,"politics");
    for(const t of polTopics){
      if(t.source!=="azgaar")continue;
      const stateId=parseInt((t.id.match(/\d+$/)||["0"])[0]);
      const stateBurgs=burgs.filter(b=>b&&b.state===stateId&&b.name);
      const newTags=[...t.tags];
      stateBurgs.slice(0,10).forEach(b=>newTags.push(b.name));
      // Add diplomatic tags
      const s=states[stateId];
      if(s&&s.diplomacy){s.diplomacy.forEach((d,i)=>{
        if(i>0&&d&&d!=="x"&&d!=="Neutral"&&sN[i])newTags.push(sN[i]);
      });}
      const merged={...t,tags:normTags(newTags)};
      if(merged.tags.length!==t.tags.length){await this.saveTopic(merged);enriched++;}
    }
    return{enriched};
  },

// === Map Viewer (compact) ===
function MapViewer({svgStr,pack,onSelectEntity,onEditBurgs}){
  // viewbox is Azgaar's main container — always on, never toggleable
  const ALWAYS_ON=new Set(['viewbox']);
  const DEFAULT_ON=new Set(['viewbox','rivers','regions','borders','routes','ice','icons','labels','vignette','ocean','lakes','landmass','coastline']);

  const[zoom,setZoom]=useState(1);const[pan,setPan]=useState({x:0,y:0});
  const[drag,setDrag]=useState(false);const[ds,setDs]=useState({x:0,y:0});const[sb,setSb]=useState(null);
  const[layers,setLayers]=useState({});const[sideTab,setSideTab]=useState("info");const[sideOpen,setSideOpen]=useState(true);
  const[selMode,setSelMode]=useState(false);const[selRect,setSelRect]=useState(null);const[selStart,setSelStart]=useState(null);const[selBurgs,setSelBurgs]=useState([]);const[editPack,setEditPack]=useState(null);
  const mob=useIsMobile();
  const containerRef=useRef(null);const mapRef=useRef(null);const sa=window.safeArr;
  const zRef=useRef(1);const pRef=useRef({x:0,y:0});
  zRef.current=zoom;pRef.current=pan;

  // Detect layers, apply defaults, center map
  useEffect(()=>{
    if(!mapRef.current)return;
    const svg=mapRef.current.querySelector('svg');if(!svg)return;
    // Set SVG to its native viewBox pixel dimensions — CSS transform handles scaling
    const vb=svg.getAttribute('viewBox');
    let vw=1920,vh=937;
    if(vb){const p=vb.split(/[\s,]+/).map(Number);if(p.length===4){vw=p[2];vh=p[3];}}
    svg.setAttribute('width',vw);svg.setAttribute('height',vh);
    svg.style.width=vw+'px';svg.style.height=vh+'px';svg.style.display='block';
    const groups={};
    const scanGroups=(parent,depth)=>{if(depth>2)return;
      parent.querySelectorAll(':scope > g').forEach(g=>{
        const id=g.id;if(!id||id.length<2)return;
        groups[id]={visible:true,el:g};
      });};
    scanGroups(svg,0);svg.querySelectorAll(':scope > g').forEach(g=>scanGroups(g,1));
    // Apply defaults — viewbox always on, others per DEFAULT_ON
    Object.keys(groups).forEach(id=>{
      if(ALWAYS_ON.has(id)){groups[id].visible=true;groups[id].el.style.display='';}
      else{const vis=DEFAULT_ON.has(id);groups[id].visible=vis;groups[id].el.style.display=vis?'':'none';}
    });
    setLayers(groups);
    // Center map using already-parsed viewBox dimensions
    const rect=containerRef.current?.getBoundingClientRect();
    if(rect){const s=Math.min(rect.width/vw,rect.height/vh)*0.9;
      const ox=(rect.width-vw*s)/2;const oy=(rect.height-vh*s)/2;
      setZoom(s);setPan({x:ox,y:oy});
      zRef.current=s;pRef.current={x:ox,y:oy};
    }
  },[svgStr]);

  // Toggle — never toggle always-on layers
  const toggleLayer=id=>{if(ALWAYS_ON.has(id))return;
    setLayers(prev=>{const n={...prev};if(n[id]){n[id]={...n[id],visible:!n[id].visible};if(n[id].el)n[id].el.style.display=n[id].visible?'':'none';}return n;});};

  // Presets — viewbox always included
  const applyPreset=preset=>{
    const presets={
      political:['ocean','lakes','landmass','coastline','rivers','borders','regions','labels','icons','markers','routes','zones','terrs'],
      physical:['ocean','lakes','landmass','coastline','rivers','borders','labels','icons','markers','terrs'],
      religious:['ocean','lakes','landmass','coastline','rivers','relig','borders','labels','icons'],
      cultural:['ocean','lakes','landmass','coastline','rivers','cults','borders','labels','icons'],
      provinces:['ocean','lakes','landmass','coastline','rivers','provs','borders','labels','icons'],
      biomes:['ocean','lakes','landmass','coastline','rivers','biomes','labels','icons'],
      heightmap:['ocean','lakes','landmass','coastline','rivers','terrs'],
      military:['ocean','lakes','landmass','coastline','rivers','borders','regions','armies','labels','icons'],
      emblems:['ocean','lakes','landmass','coastline','borders','regions','emblems','labels']
    };
    const show=new Set(presets[preset]||[]);
    ALWAYS_ON.forEach(id=>show.add(id));
    setLayers(prev=>{const n={...prev};Object.keys(n).forEach(id=>{
      const vis=show.size===0||show.has(id);
      n[id]={...n[id],visible:vis};if(n[id].el)n[id].el.style.display=vis?'':'none';
    });return n;});
  };

  // Wheel zoom — must use addEventListener with passive:false
  useEffect(()=>{
    const el=containerRef.current;if(!el)return;
    const handler=e=>{
      e.preventDefault();e.stopPropagation();
      const f=e.deltaY<0?1.15:1/1.15;
      const rect=el.getBoundingClientRect();
      const cx=e.clientX-rect.left;const cy=e.clientY-rect.top;
      const oz=zRef.current;const op=pRef.current;
      const nz=Math.max(0.01,Math.min(100,oz*f));
      const mx=(cx-op.x)/oz;const my=(cy-op.y)/oz;
      const np={x:cx-mx*nz,y:cy-my*nz};
      setZoom(nz);setPan(np);zRef.current=nz;pRef.current=np;
    };
    el.addEventListener('wheel',handler,{passive:false});
    return ()=>el.removeEventListener('wheel',handler);
  },[]);

  // Click — walk up from target, match state/burg IDs and text labels
  const handleClick=useCallback(e=>{

        if(b&&b.name){setSb({type:"burg",d:b,name:b.name});setSideTab("info");return;}

  const endDrag=useCallback(()=>{if(selMode&&selRect&&selRect.w>5&&selRect.h>5&&pack?.burgs){const found=pack.burgs.filter(b=>b&&b.i&&b.x>=selRect.x&&b.x<=selRect.x+selRect.w&&b.y>=selRect.y&&b.y<=selRect.y+selRect.h);setSelBurgs(found);setSideTab("select");setSelStart(null);return;}setSelStart(null);setSelRect(null);setDrag(false);},[selMode,selRect,pack]);

    if(e.touches.length===2){const t=e.touches;touchRef.current.dist=Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY);}
  },[]);
  const onTouchMove=useCallback(e=>{e.preventDefault();
    if(e.touches.length===1&&drag){

    }
    if(e.touches.length===2){
      const t=e.touches;const dist=Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY);
      const f=dist/touchRef.current.dist;if(!f||!isFinite(f))return;
      const rect=containerRef.current.getBoundingClientRect();
      const cx=(t[0].clientX+t[1].clientX)/2-rect.left;const cy=(t[0].clientY+t[1].clientY)/2-rect.top;
      const oz=zRef.current;const op=pRef.current;const nz=Math.max(0.01,Math.min(100,oz*f));
      const mx=(cx-op.x)/oz;const my=(cy-op.y)/oz;
      const np={x:cx-mx*nz,y:cy-my*nz};

  const zoomBtn=f=>{const rect=containerRef.current?.getBoundingClientRect();if(!rect)return;
    const cx=rect.width/2;const cy=rect.height/2;const oz=zRef.current;const op=pRef.current;

    const np={x:cx-mx*nz,y:cy-my*nz};setZoom(nz);setPan(np);zRef.current=nz;pRef.current=np;};

  const PRESETS=[["Political","political"],["Physical","physical"],["Religious","religious"],["Cultural","cultural"],["Provinces","provinces"],["Biomes","biomes"],["Heightmap","heightmap"],["Military","military"],["Emblems","emblems"],["Show All",null]];
  const layerIds=Object.keys(layers).filter(id=>!ALWAYS_ON.has(id)).sort();

  return(<div style={{display:"flex",height:"100%"}}>
    <div ref={containerRef} style={{flex:1,position:"relative",overflow:"hidden",background:"#e8ecf0",cursor:selMode?"crosshair":(drag?"grabbing":"grab"),userSelect:"none",touchAction:"none"}}

      onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={endDrag}>
      <div ref={mapRef} className="map-container" onClick={handleClick}
        style={{position:"absolute",top:0,left:0,transformOrigin:"0 0",transform:"translate("+pan.x+"px,"+pan.y+"px) scale("+zoom+")"}}
        dangerouslySetInnerHTML={{__html:svgStr}}/>
      {selRect&&<div style={{position:"absolute",border:"2px dashed "+T.gold,background:T.gold+"22",pointerEvents:"none",left:selRect.x*zoom+pan.x,top:selRect.y*zoom+pan.y,width:selRect.w*zoom,height:selRect.h*zoom,zIndex:4}}/>}

        <Btn sm v="s" onClick={()=>{

        {mob&&<Btn sm v="s" onClick={()=>setSideOpen(!sideOpen)}>{sideOpen?"▼":"▲"}</Btn>}

      <div style={{display:"flex",borderBottom:"1px solid "+T.bd}}>

          style={{flex:1,padding:"10px 0",background:"none",border:"none",borderBottom:sideTab===tab?"2px solid "+T.gold:"2px solid transparent",
            color:sideTab===tab?T.gold:T.txD,fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:1,cursor:"pointer"}}>{tab}</button>)}

          :<div>
            {sb.d.coa&&<div style={{textAlign:"center",marginBottom:12}}><CoaImg coa={sb.d.coa} size={80}/></div>}
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700,color:T.gold,marginBottom:10}}>{sb.name}</div>
            {sb.type==="state"&&<div>{[["Government",sb.d.form],["Pop",Math.round(((sb.d.rural||0)+(sb.d.urban||0))*1000).toLocaleString()],["Culture",sb.d.culture!==undefined?(sa(pack.cultures)[sb.d.culture]||{}).name:"?"],["Religion",sb.d.religion!==undefined&&pack.religions?(sa(pack.religions)[sb.d.religion]||{}).name:"?"]].map(([k,v],i)=>v&&v!=="?"?<div key={i} style={{marginBottom:6}}><div style={{fontSize:10,color:T.goldD,textTransform:"uppercase"}}>{k}</div><div style={{fontSize:13,color:T.txM}}>{v}</div></div>:null)}</div>}
            {sb.type==="burg"&&<div>{[["State",sb.d.state?(sa(pack.states)[sb.d.state]||{}).name:"?"],["Pop",sb.d.population?Math.round(sb.d.population*1000).toLocaleString():"?"],["Culture",sb.d.culture!==undefined?(sa(pack.cultures)[sb.d.culture]||{}).name:"?"],["Features",[sb.d.capital?"Capital":"",sb.d.port?"Port":"",sb.d.citadel?"Citadel":"",sb.d.walls?"Walled":"",sb.d.temple?"Temple":""].filter(Boolean).join(", ")||"None"]].map(([k,v],i)=>v&&v!=="?"?<div key={i} style={{marginBottom:6}}><div style={{fontSize:10,color:T.goldD,textTransform:"uppercase"}}>{k}</div><div style={{fontSize:13,color:T.txM}}>{v}</div></div>:null)}
              {sb.d.coa&&<div style={{marginTop:8}}><CoaImg coa={sb.d.coa} size={60}/></div>}

            </div>}

              {[["Name","name",b.name],["Population","population",String(Math.round((b.population||0)*1000))],["State",null,st?.fullName||st?.name||"?"],["Culture",null,cult?.name||"?"],["Religion",null,rel?.name||"?"]].map(([label,key,val])=>
                <div key={label} style={{marginBottom:4}}>
                  <div style={{fontSize:9,color:T.goldD,textTransform:"uppercase"}}>{label}</div>
                  {key?<input defaultValue={val} onBlur={e=>{if(!e.target.value.trim()||e.target.value===val)return;const nb={...b};if(key==="name")nb.name=e.target.value.trim();if(key==="population")nb.population=(parseInt(e.target.value)||0)/1000;const newBurgs=[...selBurgs];newBurgs[bi]=nb;setSelBurgs(newBurgs);}} style={{width:"100%",padding:"4px 6px",borderRadius:4,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:12,fontFamily:"inherit",outline:"none"}}/>
                  :<div style={{fontSize:12,color:T.txM}}>{val}</div>}

          {selBurgs.length>0&&<Btn full v="a" onClick={()=>{if(typeof onEditBurgs==="function")onEditBurgs(selBurgs);setSelBurgs([]);setSelRect(null);setSideTab("info");}}>Save Changes</Btn>}
          <Btn full v="s" onClick={()=>{setSelBurgs([]);setSelRect(null);setSideTab("info");}} style={{marginTop:6}}>Clear Selection</Btn>
        </>}
      </div>
    </div>
  </div>);
}

  if(scr==="general")return S(<><div style={{padding:px,display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={goMain} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:mob?8:16}}>{"‹"}</button><div style={{flex:1}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:mob?20:26,fontWeight:700,color:T.gold}}>ForgeMaster</div></div><Btn sm onClick={async()=>{const c=await db.createGeneralChat();setCC(c);setGen(true);setWc(false);setUc(false);setScr("chat");}}>+ New</Btn></div><div style={{flex:1,overflowY:"auto",padding:mob?"12px 16px":"16px 32px",maxWidth:700}}>{cList.length===0?<div style={{textAlign:"center",padding:40}}><Btn onClick={async()=>{const c=await db.createGeneralChat();setCC(c);setGen(true);setWc(false);setUc(false);setScr("chat");}}>New Chat</Btn></div>:cList.map(c=><button key={c.id} onClick={()=>goChat(c,true)} style={{display:"block",width:"100%",padding:"12px 14px",marginBottom:6,background:T.sf,border:"1px solid "+T.bd,borderRadius:8,cursor:"pointer",textAlign:"left",color:T.tx}} onMouseEnter={e=>e.currentTarget.style.borderColor=T.gold} onMouseLeave={e=>e.currentTarget.style.borderColor=T.bd}><div style={{fontSize:14,fontWeight:500}}>{c.title}</div></button>)}</div></>);

  if(scr==="chat"&&cC)return S(<React.Fragment>
    <div style={{padding:mob?"8px 12px":"10px 32px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd,flexShrink:0}}><button onClick={exitChat} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:mob?8:16}}>{"‹"}</button><div style={{flex:1,minWidth:0}}><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:mob?16:18,fontWeight:700,color:T.gold,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{uc?(uAspChat==="__universechat__"?"Universe Chat":UNIVERSE_ASPECTS.find(a=>a.id===uAspChat)?.name||"Chat"):(gen?"ForgeMaster":(wc?"World Chat":cA?.name))}</div><div style={{fontSize:11,color:T.txD}}>{uc?cU?.name:(gen?cC.title:cW?.name)}</div></div><div style={{display:"flex",gap:6}}>{uc&&<Btn sm v="g" onClick={openFact}>📝</Btn>}{uc&&<Btn sm v="g" onClick={openBible}>📖</Btn>}{!gen&&!uc&&<Btn sm v="g" onClick={openFact}>📝</Btn>}{!gen&&!uc&&<Btn sm v="g" onClick={openBible}>📖</Btn>}</div></div>
    <div style={{flex:1,overflowY:"auto",padding:mob?"10px 12px":"12px 32px"}}><div style={{maxWidth:700,margin:"0 auto"}}>{(!cC.messages||cC.messages.length===0)&&<div style={{padding:"40px 0",textAlign:"center",color:T.txD,fontSize:14}}>Start worldbuilding!</div>}{(cC.messages||[]).map((m,i)=><Bub key={i} msg={m}/>)}{busy&&<div style={{padding:"12px 0",color:T.goldD,fontSize:13,fontStyle:"italic"}}>Forging...</div>}<div ref={endRef}/></div></div>
    <div style={{padding:mob?"8px 12px 12px":"10px 32px 14px",borderTop:"1px solid "+T.bd,background:T.sf,flexShrink:0}}><div style={{maxWidth:700,margin:"0 auto",display:"flex",gap:mob?8:10,alignItems:"flex-end"}}><textarea value={inp} onChange={e=>setInp(e.target.value)} placeholder="Type..." onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} rows={1} style={{flex:1,resize:"none",padding:mob?"8px 12px":"10px 16px",borderRadius:10,border:"1px solid "+T.bd,background:T.bg,color:T.tx,fontSize:mob?13:14,fontFamily:"inherit",outline:"none",maxHeight:140,lineHeight:1.4}} onInput={e=>{e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,140)+"px";}}/><button onClick={send} disabled={busy||!inp.trim()} style={{background:T.gold,border:"none",borderRadius:10,width:mob?40:44,height:mob?40:44,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:busy||!inp.trim()?.4:1,fontSize:18,flexShrink:0,color:T.bg,fontWeight:700}}>{"↑"}</button></div></div>
  </React.Fragment>);

  if(scr==="settings")return S(<><div style={{padding:px,display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={goMain} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:mob?8:16}}>{"‹"}</button><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:mob?20:26,fontWeight:700,color:T.gold}}>Settings</div></div>
    <div style={{flex:1,overflowY:"auto",padding:mob?"16px":"24px 32px",maxWidth:600}}>
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>AI Provider</div>
      <select value={providerSel} onChange={e=>setProviderSel(e.target.value)} style={{...iS,maxWidth:300,marginBottom:12}}><option value="claude">Claude (Anthropic)</option><option value="deepseek">DeepSeek</option><option value="custom">Custom</option></select>
      {providerSel==="custom"&&<input value={customEndpoint} onChange={e=>setCustomEndpoint(e.target.value)} placeholder="https://..." style={{...iS,maxWidth:400,marginBottom:12}}/>}
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,marginTop:16,textTransform:"uppercase",letterSpacing:1}}>API Key</div>
      <input type="password" value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} placeholder="API key..." style={{...iS,fontFamily:"monospace",fontSize:13,maxWidth:400}}/>
      <div style={{display:"flex",gap:8,marginTop:10}}><Btn onClick={saveSettings}>Save</Btn>{hasKey&&<Btn v="s" onClick={async()=>{setApiKeyInput("");await db.setApiKey(null);setHasKey(false);flash("Removed");}}>Remove</Btn>}</div>
      <div style={{fontSize:11,color:T.txD,marginTop:8}}>{hasKey?"✅ "+providerSel:"⚠️ No key"}</div>
      <div style={{borderTop:"1px solid "+T.bd,marginTop:24,paddingTop:20}}><div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>Data</div><div style={{display:"flex",gap:10,flexWrap:"wrap"}}><Btn v="s" onClick={doExport}>📤 Export</Btn><Btn v="s" onClick={()=>setScr("import")}>📥 Import</Btn><Btn v="s" onClick={async()=>{if(navigator.serviceWorker){const regs=await navigator.serviceWorker.getRegistrations();for(const r of regs)await r.unregister();}if(window.caches){const keys=await caches.keys();for(const k of keys)await caches.delete(k);}flash("Cache cleared — reload page");}}>🔄 Clear Cache</Btn><Btn v="d" onClick={()=>setMod({t:"delAll"})}>🗑️</Btn></div></div>
      <div style={{marginTop:32,fontSize:11,color:T.txD,lineHeight:1.6}}>CelestialForge Desktop v6.3{"\n"}Search · Dashboard · Audit · Dialogue · Bulk Ops · Field Edit · Watabou{"\n"}Universes · Subcategories · Relations · Lore Gen · Responsive</div>
    </div></>);

  if(scr==="import")return S(<><div style={{padding:px,display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={()=>setScr("settings")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:mob?8:16}}>{"‹"}</button><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:mob?18:22,fontWeight:700,color:T.gold}}>Import</div></div>
    <div style={{flex:1,overflowY:"auto",padding:mob?"16px":"24px 32px",maxWidth:600}}>
      <div style={{marginBottom:16,padding:16,background:T.sf,border:"2px dashed "+T.bd,borderRadius:10,textAlign:"center"}}><label style={{cursor:"pointer",display:"block"}}><div style={{fontSize:14,color:T.gold,marginBottom:6}}>📁 Upload JSON File</div><div style={{fontSize:11,color:T.txD}}>Click to select a .json export file</div><input type="file" accept=".json" style={{display:"none"}} onChange={async e=>{const f=e.target.files[0];if(!f)return;const txt=await f.text();setImpTxt(txt);flash("File loaded — click Import");}}/></label></div>
      <div style={{fontSize:11,color:T.txD,marginBottom:8,textAlign:"center"}}>— or paste manually —</div>
      <textarea value={impTxt} onChange={e=>setImpTxt(e.target.value)} placeholder="Paste JSON (v5 or v6)..." rows={mob?6:10} style={{width:"100%",resize:"vertical",padding:mob?10:14,borderRadius:8,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:mob?12:13,fontFamily:"monospace",outline:"none"}}/>
      {impTxt&&<div style={{fontSize:11,color:T.accent,marginTop:4}}>{(impTxt.length/1024).toFixed(1)}KB loaded</div>}
      <div style={{display:"flex",gap:8,marginTop:12}}><Btn onClick={doImport} disabled={!impTxt.trim()}>Import</Btn><Btn v="s" onClick={()=>{setImpTxt("");setScr("settings");}}>Cancel</Btn></div>
    </div></>);

  return S(<div style={{padding:40,textAlign:"center",color:T.txD}}>Loading...</div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
