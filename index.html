// === IDB ===
const IDB={_db:null,
open(){return new Promise((r,j)=>{if(this._db)return r(this._db);const q=indexedDB.open('worldforge',3);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv');};q.onsuccess=e=>{this._db=e.target.result;r(this._db);};q.onerror=e=>j(e);});},
async get(k){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>r(t.result===undefined?null:t.result);t.onerror=e=>j(e);});},
async set(k,v){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>r(true);t.onerror=e=>j(e);});},
async del(k){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').delete(k);t.onsuccess=()=>r(true);t.onerror=e=>j(e);});},
async list(p){const d=await this.open();return new Promise((r,j)=>{const ks=[];const rng=IDBKeyRange.bound(p,p+'\uffff');const t=d.transaction('kv','readonly').objectStore('kv').openCursor(rng);t.onsuccess=e=>{const c=e.target.result;if(c){ks.push(c.key);c.continue();}else r(ks);};t.onerror=e=>j(e);});},
async clear(){const d=await this.open();return new Promise((r,j)=>{const t=d.transaction('kv','readwrite').objectStore('kv').clear();t.onsuccess=()=>r(true);t.onerror=e=>j(e);});}};

// === Template mappings ===
const CARD_TMPL={entity:["characters","organizations"],location:["locations"],notable:["notable-locations","architecture"],system:["magic-technology","politics","economy","languages","education","healthcare","transportation"],culture:["cultures","religion-beliefs","arts-entertainment","food-cuisine","fashion","calendar-time"],event:["history","military","story-elements","cosmology"],creature:["flora-fauna"],geography:["geography"]};
const TMPL_FOR={};Object.entries(CARD_TMPL).forEach(([t,ids])=>ids.forEach(id=>TMPL_FOR[id]=t));

// History sub-types
const HIST_TYPES=["battle","death","revolution","birth","nation-formation","tech-advancement","treaty","disaster","conquest","general"];

// Category rules for AI prompts
const CAT_RULES=`CATEGORY RULES (follow strictly):
- characters: Named individuals with agency. Must be a person/being who acts and has motivations.
- locations: Every named place - cities, towns, villages, regions, provinces, continents, bodies of water. The broad gazetteer.
- notable-locations: Places with narrative SIGNIFICANCE - capitals, religious centres, battle sites, places of power. Must have a story.
- cultures: Shared identity groups defined by customs, language, values, aesthetics. NOT political structures.
- history: Events that HAPPENED at a point in time with cause and effect. Tag sub-type: battle/death/revolution/birth/nation-formation/tech-advancement/treaty/disaster.
- politics: Current power structures and governance. Who rules NOW, what laws exist NOW.
- religion-beliefs: Faith systems - deities, doctrines, practices, clergy, holy sites. NOT cultural practices that aren't religious.
- organizations: Groups with structure and purpose - guilds, factions, orders. Must have membership/hierarchy.
- military: Armed forces, warfare doctrine, standing armies. NOT individual battles (history) or warriors (characters).
- magic-technology: Systems that enable capabilities. How it works, who uses it, what it costs.
- geography: Physical landscape - mountains, rivers, forests, climate, biomes. NOT settlements (locations).
- flora-fauna: Non-person organisms - species, behaviours, habitats.
- economy: Trade, currency, resources, how wealth flows.
- languages: Communication systems, scripts, dialects.

CRITICAL: ONLY extract entities EXPLICITLY named and discussed in the text. NEVER invent, assume, or draw from general knowledge. If something is not clearly stated in the text, do not include it. When uncertain, exclude rather than include.`;

window.ASPECTS=[
{id:"characters",name:"Characters",icon:"\u{1f464}",topicPrompt:"List every named character or individual mentioned"},
{id:"locations",name:"Locations",icon:"\u{1f3d8}\ufe0f",topicPrompt:"List every named place, city, town, village, region, or body of water mentioned"},
{id:"notable-locations",name:"Notable Locations",icon:"\u{1f4cd}",topicPrompt:"List every location of narrative significance - capitals, religious centres, battle sites, places of power"},
{id:"cultures",name:"Cultures",icon:"\u{1f3db}\ufe0f",topicPrompt:"List every culture or civilization mentioned"},
{id:"history",name:"History",icon:"\u{1f4dc}",topicPrompt:"List every historical event, battle, death, revolution, founding, discovery, or treaty mentioned"},
{id:"geography",name:"Geography",icon:"\u{1f5fa}\ufe0f",topicPrompt:"List every physical landscape feature - mountains, rivers, forests, biomes mentioned"},
{id:"politics",name:"Politics",icon:"\u2696\ufe0f",topicPrompt:"List every current political entity, government, or power structure mentioned"},
{id:"religion-beliefs",name:"Religion & Beliefs",icon:"\u{1f56f}\ufe0f",topicPrompt:"List every religion, deity, or faith system mentioned"},
{id:"organizations",name:"Organizations & Factions",icon:"\u{1f3f4}",topicPrompt:"List every guild, faction, order, or organized group mentioned"},
{id:"military",name:"Military & Warfare",icon:"\u2694\ufe0f",topicPrompt:"List every army, military force, or warfare doctrine mentioned"},

{id:"economy",name:"Economy",icon:"\u{1f4b0}",topicPrompt:"List every currency, trade system, or economic structure mentioned"},
{id:"languages",name:"Languages",icon:"\u{1f524}",topicPrompt:"List every language or writing system mentioned"},
{id:"flora-fauna",name:"Flora & Fauna",icon:"\u{1f33f}",topicPrompt:"List every creature, plant, or species mentioned"},
{id:"story-elements",name:"Story Elements",icon:"\u{1f4d6}",topicPrompt:"List every plot thread or story arc mentioned"},
{id:"cosmology",name:"Cosmology & Creation",icon:"\u{1f30c}",topicPrompt:"List every cosmic entity, plane, or creation myth mentioned"},
{id:"calendar-time",name:"Calendar & Time",icon:"\u{1f4c5}",topicPrompt:"List every calendar system or festival mentioned"},

{id:"education",name:"Education & Knowledge",icon:"\u{1f4da}",topicPrompt:"List every school, academy, or knowledge system mentioned"},
{id:"healthcare",name:"Healthcare & Medicine",icon:"\u{1f3e5}",topicPrompt:"List every healing art or medical practice mentioned"},
];
window.MAX_WORLDS=10;

function normTag(t){return t.toLowerCase().trim().replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'');}
function normTags(arr){return[...new Set((arr||[]).map(normTag).filter(t=>t.length>0))];}
function mkId(){return Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,6);}
function safeArr(v){if(!v)return[];if(Array.isArray(v))return v;if(typeof v==='object')return Object.values(v);return[];}

// === Azgaar Parser (with Array safety) ===
window.parseAzgaarMap=function(text){
  const R={svg:null,pack:null,error:null,debug:[]};
  try{
    R.debug.push("Size:"+text.length);
    const ss=text.indexOf('<svg'),se=text.lastIndexOf('</svg>');
    if(ss<0||se<0){R.error="No SVG found";return R;}
    R.svg=text.substring(ss,se+6);
    R.debug.push("SVG:"+R.svg.length);
    const after=text.substring(se+6);
    const objs=[];let d=0,os=-1;
    for(let i=0;i<after.length;i++){if(after[i]==='{'){if(d===0)os=i;d++;}else if(after[i]==='}'){d--;if(d===0&&os>=0){objs.push({s:os,e:i+1});os=-1;}}}
    R.debug.push("JSON objects:"+objs.length);
    for(let i=0;i<objs.length;i++){
      const str=after.substring(objs[i].s,objs[i].e);
      try{const o=JSON.parse(str);
        if(o.states||o.burgs||o.cultures){R.pack=o;R.debug.push("Pack at obj "+i);break;}
        if(o.cells||o.vertices){R.debug.push("Grid at obj "+i);continue;}
      }catch(e){R.debug.push("Obj "+i+" fail:"+e.message.substring(0,50));}
    }
    if(!R.pack)R.error="Pack not found in "+objs.length+" objects";
  }catch(e){R.error=e.message;}
  return R;
};

window.generateTopicsFromPack=function(pack,wid){
  const topics=[];if(!pack)return topics;
  const states=safeArr(pack.states),burgs=safeArr(pack.burgs),cultures=safeArr(pack.cultures),
    religions=safeArr(pack.religions),rivers=safeArr(pack.rivers),military=safeArr(pack.military),
    provinces=safeArr(pack.provinces);
  const sName={},cName={},rName={};
  states.forEach(s=>{if(s&&s.i>0)sName[s.i]=s.name||s.fullName||"State "+s.i;});
  cultures.forEach(c=>{if(c&&c.i>0)cName[c.i]=c.name||"Culture "+c.i;});
  religions.forEach(r=>{if(r&&r.i>0)rName[r.i]=r.name||"Religion "+r.i;});

  // States -> politics
  states.forEach(s=>{
    if(!s||!s.i||s.i===0||s.removed)return;
    const cap=s.capital&&burgs[s.capital]?burgs[s.capital]:null;
    const cult=s.culture?cName[s.culture]||"Unknown":"Unknown";
    topics.push({id:"azg-state-"+s.i,name:s.fullName||s.name,brief:(s.fullName||s.name)+", "+cult+" "+(s.form||"state"),
      template:"system",tags:normTags([s.form||"",cult,"state",s.name]),aspect_id:"politics",world_id:wid,source:"azgaar",azgaar_type:"state",
      fields:{principle:"Government: "+(s.form||"Unknown"),components:["Area: "+(s.area?Math.round(s.area):"?")+", Pop: "+Math.round(((s.rural||0)+(s.urban||0))*1000).toLocaleString()],
        practitioners:"Culture: "+cult,effects:"Capital: "+(cap?cap.name:"Unknown"),limitations:"",origin:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // Burgs -> locations (broad) + notable-locations (capitals/features)
  burgs.forEach(b=>{
    if(!b||!b.i||b.i===0||!b.name)return;
    const st=b.state?sName[b.state]||"Unclaimed":"Unclaimed";
    const cult=b.culture?cName[b.culture]||"Unknown":"Unknown";
    const rel=b.religion?rName[b.religion]||"Unknown":"Unknown";
    const feats=[];
    if(b.capital)feats.push("Capital");if(b.port)feats.push("Port");if(b.citadel)feats.push("Citadel");
    if(b.walls)feats.push("Walled");if(b.plaza)feats.push("Market");if(b.temple)feats.push("Temple");
    const tags=normTags([st,cult,...feats,b.name]);
    // All burgs go to locations
    topics.push({id:"azg-loc-"+b.i,name:b.name,brief:b.name+(b.capital?" (capital)":"")+", "+st,
      template:"location",tags,aspect_id:"locations",world_id:wid,source:"azgaar",azgaar_type:"burg",
      fields:{type:feats.length?feats.join(", "):"Settlement",region:st,population:Math.round((b.population||0)*1000).toLocaleString(),
        government:st,culture:cult,religion:rel,climate:"",resources:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
    // Capitals and featured burgs also go to notable-locations
    if(b.capital||feats.length>=2){
      topics.push({id:"azg-notable-"+b.i,name:b.name,brief:b.name+" — "+(b.capital?"Capital of "+st:feats.join(", ")),
        template:"notable",tags:[...tags,"notable"],aspect_id:"notable-locations",world_id:wid,source:"azgaar",azgaar_type:"burg",
        fields:{significance:b.capital?"Capital city of "+st:"Notable settlement with "+feats.join(", "),
          physical_desc:feats.join(", "),history_events:"",connected_entities:st+", "+cult,history:"Population: "+Math.round((b.population||0)*1000).toLocaleString()},
        created:new Date().toISOString(),updated:new Date().toISOString()});
    }
  });

  // Cultures
  cultures.forEach(c=>{
    if(!c||!c.i||c.i===0||c.removed)return;
    topics.push({id:"azg-culture-"+c.i,name:c.name||"Culture "+c.i,brief:(c.name||"")+" — "+(c.type||"")+" culture",
      template:"culture",tags:normTags([c.type||"",c.name,"culture"]),aspect_id:"cultures",world_id:wid,source:"azgaar",azgaar_type:"culture",
      fields:{origin:"Type: "+(c.type||"Unknown"),values_beliefs:"",customs_practices:"",art_expression:"",
        social_structure:"",language:"",relations:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // Religions
  religions.forEach(r=>{
    if(!r||!r.i||r.i===0||r.removed)return;
    topics.push({id:"azg-religion-"+r.i,name:r.name||"Religion "+r.i,brief:(r.name||"")+" — "+(r.form||"")+" "+(r.type||"religion"),
      template:"culture",tags:normTags([r.type||"",r.form||"",r.name,"religion"]),aspect_id:"religion-beliefs",world_id:wid,source:"azgaar",azgaar_type:"religion",
      fields:{origin:"Type: "+(r.type||"Unknown")+", Form: "+(r.form||"Unknown"),
        values_beliefs:r.deity?"Central deity: "+r.deity:"No central deity",customs_practices:"",
        art_expression:"",social_structure:"",language:"",relations:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // Rivers -> geography
  rivers.forEach(rv=>{
    if(!rv||!rv.i||!rv.name)return;
    topics.push({id:"azg-river-"+rv.i,name:rv.name+(rv.type&&rv.type!=="River"?" ("+rv.type+")":""),
      brief:rv.name+" — "+(rv.type||"river"),template:"geography",
      tags:normTags([rv.type||"river",rv.name,"geography"]),aspect_id:"geography",world_id:wid,source:"azgaar",azgaar_type:"river",
      fields:{type:rv.type||"River",scale:"Length: "+(rv.length?Math.round(rv.length):"?"),
        physical_desc:"",climate_ecology:"Basin: "+(rv.basin||"?"),resources:"",connected:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  // Military (aggregate by state)
  military.forEach((m,idx)=>{
    if(!m||!Array.isArray(m)&&typeof m!=='object'||idx===0)return;
    const units=safeArr(m);if(!units.length)return;
    const sn=sName[idx]||"State "+idx;
    const regs=units.map(r=>(r.name||"Unit")+" ("+(r.type||"?")+": "+(r.n||0)+")").slice(0,10);
    topics.push({id:"azg-mil-"+idx,name:sn+" Armed Forces",brief:"Military of "+sn+" — "+units.length+" regiments",
      template:"event",tags:normTags([sn,"military"]),aspect_id:"military",world_id:wid,source:"azgaar",azgaar_type:"military",
      fields:{composition:"Total regiments: "+units.length,command:sn+" command",doctrine:"",
        campaigns:regs,strengths:"",weaknesses:""},
      created:new Date().toISOString(),updated:new Date().toISOString()});
  });

  return topics;
};

// === Data Layer ===
window.db={
  async listWorlds(){const ks=await IDB.list("world:");const ws=[];for(const k of ks){const w=await IDB.get(k);if(w)ws.push(w);}ws.sort((a,b)=>(a.created||"").localeCompare(b.created||""));return ws;},
  async createWorld(n,desc){const id=n.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40)+'-'+Math.random().toString(36).slice(2,8);const m={id,name:n,description:desc||"",created:new Date().toISOString(),updated:new Date().toISOString()};await IDB.set("world:"+id,m);await IDB.set("bible:"+id,{world_id:id,world_name:n,last_updated:new Date().toISOString(),facts:{}});return m;},
  async saveWorld(w){w.updated=new Date().toISOString();return IDB.set("world:"+w.id,w);},
  async deleteWorld(wid){await IDB.del("world:"+wid);await IDB.del("bible:"+wid);await IDB.del("mapsvg:"+wid);await IDB.del("mappack:"+wid);const ck=await IDB.list("chat:"+wid+":");for(const k of ck)await IDB.del(k);const tk=await IDB.list("topic:"+wid+":");for(const k of tk)await IDB.del(k);},
  async getBible(wid){return(await IDB.get("bible:"+wid))||{world_id:wid,facts:{}};},
  async saveBible(wid,b){b.last_updated=new Date().toISOString();return IDB.set("bible:"+wid,b);},
  async addFact(wid,cat,key,val){
    if(!wid){console.error("addFact: no world id");return false;}
    const b=await this.getBible(wid);if(!b.facts)b.facts={};
    const c=cat.toLowerCase().replace(/\s+/g,'-');
    if(!b.facts[c])b.facts[c]={};b.facts[c][key]=val;
    await this.saveBible(wid,b);console.log("Bible fact added:",c,key,val);return true;
  },
  async removeFact(wid,cat,key){const b=await this.getBible(wid);if(b.facts&&b.facts[cat]){delete b.facts[cat][key];if(!Object.keys(b.facts[cat]).length)delete b.facts[cat];await this.saveBible(wid,b);}},
  async listChats(wid,aid){const ks=await IDB.list("chat:"+wid+":"+aid+":");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createChat(wid,aid,title){const id=mkId();const ch={id,world_id:wid,aspect_id:aid,title:title||("Chat "+new Date().toLocaleString()),created:new Date().toISOString(),updated:new Date().toISOString(),messages:[]};await IDB.set("chat:"+wid+":"+aid+":"+id,ch);return ch;},
  async saveChat(c){c.updated=new Date().toISOString();return IDB.set("chat:"+c.world_id+":"+c.aspect_id+":"+c.id,c);},
  async loadChat(wid,aid,cid){return IDB.get("chat:"+wid+":"+aid+":"+cid);},
  async listGeneralChats(){const ks=await IDB.list("chat:__general__:__general__:");const cs=[];for(const k of ks){const c=await IDB.get(k);if(c)cs.push(c);}cs.sort((a,b)=>(b.updated||"").localeCompare(a.updated||""));return cs;},
  async createGeneralChat(t){return this.createChat("__general__","__general__",t);},
  async fileNote(wid,aid,text){const chats=await this.listChats(wid,aid);let tgt=chats.find(c=>c.title==="Cross-World Notes");if(tgt)tgt=await this.loadChat(wid,aid,tgt.id);if(!tgt)tgt=await this.createChat(wid,aid,"Cross-World Notes");tgt.messages.push({role:"user",content:text,timestamp:new Date().toISOString(),source:"cross-world"});await this.saveChat(tgt);},
  async gatherAspectText(wid,aid){const chats=await this.listChats(wid,aid);const ts=[];for(const ch of chats){const f=await this.loadChat(wid,aid,ch.id);if(f)for(const m of f.messages||[])ts.push(m.content||"");}return ts.join("\n\n");},
  async gatherAllText(wid){const ASPECTS=window.ASPECTS;let all="";for(const a of ASPECTS){const t=await this.gatherAspectText(wid,a.id);if(t)all+="\n["+a.name+"]\n"+t;}const wc=await this.gatherAspectText(wid,"__worldchat__");if(wc)all+="\n[World Chat]\n"+wc;return all;},
  // Topics
  async saveTopic(t){t.updated=new Date().toISOString();t.tags=normTags(t.tags);await IDB.set("topic:"+t.world_id+":"+t.aspect_id+":"+t.id,t);return t;},
  async listTopics(wid,aid){const ks=await IDB.list("topic:"+wid+":"+aid+":");const ts=[];for(const k of ks){const t=await IDB.get(k);if(t)ts.push(t);}ts.sort((a,b)=>(a.name||"").localeCompare(b.name||""));return ts;},
  async deleteTopic(wid,aid,tid){return IDB.del("topic:"+wid+":"+aid+":"+tid);},
  async countTopics(wid,aid){return(await IDB.list("topic:"+wid+":"+aid+":")).length;},
  async listAllTags(wid){const ks=await IDB.list("topic:"+wid+":");const tags={};for(const k of ks){const t=await IDB.get(k);if(t&&t.tags)for(const tg of t.tags)tags[tg]=(tags[tg]||0)+1;}return Object.entries(tags).sort((a,b)=>b[1]-a[1]).map(([t,c])=>({tag:t,count:c}));},
  async getWorldSummary(wid){const b=await this.getBible(wid);const f=b.facts||{};const p=[];for(const[c,e] of Object.entries(f)){const k=Object.keys(e).slice(0,3);if(k.length)p.push(c.replace(/-/g,' ')+": "+k.join(", "));}return p.slice(0,4).join(". ")||"New world";},
  // Map
  async saveMapSvg(wid,svg){return IDB.set("mapsvg:"+wid,svg);},
  async getMapSvg(wid){return IDB.get("mapsvg:"+wid);},
  async saveMapPack(wid,pack){return IDB.set("mappack:"+wid,pack);},
  async getMapPack(wid){return IDB.get("mappack:"+wid);},
  async hasMap(wid){return!!(await IDB.get("mapsvg:"+wid));},
  async importAzgaarMap(wid,fileText){
    const parsed=parseAzgaarMap(fileText);
    if(parsed.error)return{error:parsed.error,debug:parsed.debug};
    if(parsed.svg)await this.saveMapSvg(wid,parsed.svg);
    if(parsed.pack){
      await this.saveMapPack(wid,parsed.pack);
      const topics=generateTopicsFromPack(parsed.pack,wid);
      let added=0;for(const t of topics){
        const ex=await IDB.get("topic:"+wid+":"+t.aspect_id+":"+t.id);
        if(!ex){await this.saveTopic(t);added++;}
        else{await this.saveTopic({...ex,fields:{...(ex.fields||{}),...(t.fields||{})},tags:normTags([...(ex.tags||[]),...(t.tags||[])])});}
      }
      return{added,total:topics.length,debug:parsed.debug};
    }
    return{added:0,total:0,debug:parsed.debug,error:"No pack data"};
  },
  async importJsonExport(wid,jsonText){
    let pack;
    try{pack=JSON.parse(jsonText);}catch(e){return{error:"Invalid JSON: "+e.message};}
    // Azgaar full JSON export might have data at root or under 'pack'
    if(pack.pack)pack=pack.pack;
    if(!pack.states&&!pack.burgs){return{error:"No states/burgs found. Keys: "+Object.keys(pack).join(",")};}
    await this.saveMapPack(wid,pack);
    const topics=generateTopicsFromPack(pack,wid);
    let added=0;for(const t of topics){
      const ex=await IDB.get("topic:"+wid+":"+t.aspect_id+":"+t.id);
      if(!ex){await this.saveTopic(t);added++;}
      else{await this.saveTopic({...ex,fields:{...(ex.fields||{}),...(t.fields||{})},tags:normTags([...(ex.tags||[]),...(t.tags||[])])});}
    }
    return{added,total:topics.length};
  },
  // Export/Import
  async exportAll(){const data={version:"worldforge-v4",exported:new Date().toISOString(),worlds:[],bibles:[],chats:[],topics:[],generalChats:[]};const ws=await this.listWorlds();for(const w of ws){data.worlds.push(w);data.bibles.push({wid:w.id,...(await this.getBible(w.id))});for(const asp of ASPECTS){const cs=await this.listChats(w.id,asp.id);for(const ch of cs){const f=await this.loadChat(w.id,asp.id,ch.id);if(f)data.chats.push(f);}const tps=await this.listTopics(w.id,asp.id);for(const t of tps)data.topics.push(t);}const wgc=await this.listChats(w.id,"__worldchat__");for(const ch of wgc){const f=await this.loadChat(w.id,"__worldchat__",ch.id);if(f)data.chats.push(f);}}const gc=await this.listGeneralChats();for(const ch of gc){const f=await this.loadChat("__general__","__general__",ch.id);if(f)data.generalChats.push(f);}return data;},
  async importAll(data){let ct={worlds:0,chats:0,topics:0};for(const w of data.worlds||[]){await IDB.set("world:"+w.id,w);ct.worlds++;}for(const b of data.bibles||[]){const wid=b.wid||b.world_id;if(wid)await IDB.set("bible:"+wid,b);}for(const c of data.chats||[]){await IDB.set("chat:"+c.world_id+":"+c.aspect_id+":"+c.id,c);ct.chats++;}for(const c of data.generalChats||[]){await IDB.set("chat:__general__:__general__:"+c.id,c);ct.chats++;}for(const t of data.topics||[]){await IDB.set("topic:"+t.world_id+":"+t.aspect_id+":"+t.id,t);ct.topics++;}return ct;},
  async getApiKey(){return IDB.get("_apikey");},
  async setApiKey(k){return IDB.set("_apikey",k);},
  async getProvider(){return(await IDB.get("_provider"))||"claude";},
  async setProvider(p){return IDB.set("_provider",p);},
  async getCustomEndpoint(){return(await IDB.get("_custom_endpoint"))||"";},
  async setCustomEndpoint(u){return IDB.set("_custom_endpoint",u);},
};

// === Multi-Provider AI ===
window.aiCall=async function(sys,msgs,mt){
  mt=mt||1500;const key=await db.getApiKey();if(!key)return"[No API key. Go to Settings.]";
  const provider=await db.getProvider();
  try{
    if(provider==="deepseek"){
      const r=await fetch("https://api.deepseek.com/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
        body:JSON.stringify({model:"deepseek-chat",max_tokens:mt,messages:[{role:"system",content:sys},...msgs.map(m=>({role:m.role,content:m.content}))]})});
      if(!r.ok){const e=await r.json().catch(()=>({}));return"DeepSeek error "+r.status+": "+(e.error?.message||r.statusText);}
      const d=await r.json();return d.choices?.[0]?.message?.content||"No response.";
    }
    if(provider==="custom"){
      const endpoint=await db.getCustomEndpoint();if(!endpoint)return"[No custom endpoint set.]";
      const r=await fetch(endpoint,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
        body:JSON.stringify({model:"default",max_tokens:mt,messages:[{role:"system",content:sys},...msgs.map(m=>({role:m.role,content:m.content}))]})});
      if(!r.ok)return"Custom API error "+r.status;
      const d=await r.json();return d.choices?.[0]?.message?.content||d.content?.[0]?.text||"No response.";
    }
    // Default: Claude
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:mt,system:sys,messages:msgs.map(m=>({role:m.role,content:m.content}))})});
    if(!r.ok){const e=await r.json().catch(()=>({}));return"Claude error "+r.status+": "+(e.error?.message||r.statusText);}
    const d=await r.json();return d.content?.map(b=>b.text||"").join("")||"No response.";
  }catch(e){return"Error: "+e.message;}
};

};

window.buildLorePrompt=function(name,worldName){

};

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

}

// === Map Viewer ===
function MapViewer({svgStr,pack,onSelectEntity}){
  const containerRef=useRef(null);const[zoom,setZoom]=useState(1);const[pan,setPan]=useState({x:0,y:0});
  const[drag,setDrag]=useState(false);const[ds,setDs]=useState({x:0,y:0});const[sb,setSb]=useState(null);
  const safeArr=window.safeArr||function(v){return Array.isArray(v)?v:v?Object.values(v):[];};
  const handleClick=useCallback(e=>{let el=e.target;while(el&&el.tagName!=='svg'){const id=el.id||"";
    if(id.match(/^state\d+/)){const n=parseInt((id.match(/\d+/)||[0])[0]);const s=safeArr(pack?.states)[n];if(s)setSb({type:"state",d:s,name:s.name||s.fullName});return;}
    if(id.match(/^burg\d+/)){const n=parseInt((id.match(/\d+/)||[0])[0]);const b=safeArr(pack?.burgs)[n];if(b)setSb({type:"burg",d:b,name:b.name});return;}
    el=el.parentElement;}},[pack]);
  const onWheel=useCallback(e=>{e.preventDefault();setZoom(z=>Math.max(.1,Math.min(10,z*(e.deltaY>0?.9:1.1))));},[]);

  return(<div style={{display:"flex",height:"100%"}}>
    <div style={{flex:1,position:"relative",overflow:"hidden",background:"#e8ecf0",cursor:drag?"grabbing":"grab"}}
      onWheel={onWheel} onMouseDown={e=>{setDrag(true);setDs({x:e.clientX-pan.x,y:e.clientY-pan.y});}}
      onMouseMove={e=>{if(drag)setPan({x:e.clientX-ds.x,y:e.clientY-ds.y});}} onMouseUp={()=>setDrag(false)} onMouseLeave={()=>setDrag(false)}>
      <div ref={containerRef} className="map-container" onClick={handleClick}
        style={{transform:"translate("+pan.x+"px,"+pan.y+"px) scale("+zoom+")",transformOrigin:"0 0",transition:drag?"none":"transform .1s"}}
        dangerouslySetInnerHTML={{__html:svgStr}}/>
      <div style={{position:"absolute",bottom:16,right:16,display:"flex",gap:8}}>
        <Btn sm v="s" onClick={()=>setZoom(z=>Math.min(10,z*1.3))}>+</Btn>
        <Btn sm v="s" onClick={()=>setZoom(z=>Math.max(.1,z/1.3))}>−</Btn>
        <Btn sm v="s" onClick={()=>{setZoom(1);setPan({x:0,y:0});}}>Reset</Btn></div></div>
    <div style={{width:320,flexShrink:0,background:T.sf,borderLeft:"1px solid "+T.bd,overflowY:"auto",padding:20}}>
      {!sb?<div style={{color:T.txD,fontSize:13,textAlign:"center",paddingTop:40}}>Click a state or settlement</div>
      :<div><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:700,color:T.gold,marginBottom:12}}>{sb.name}</div>
        {sb.type==="state"&&<div>{[["Government",sb.d.form],["Area",sb.d.area?Math.round(sb.d.area)+"":"?"],["Pop (rural)",sb.d.rural?Math.round(sb.d.rural*1000).toLocaleString():"?"],["Pop (urban)",sb.d.urban?Math.round(sb.d.urban*1000).toLocaleString():"?"]].map(([k,v],i)=>v&&v!=="?"?<div key={i} style={{marginBottom:6}}><div style={{fontSize:10,color:T.goldD,textTransform:"uppercase"}}>{k}</div><div style={{fontSize:13,color:T.txM}}>{v}</div></div>:null)}</div>}
        {sb.type==="burg"&&<div>{[["State",sb.d.state?(safeArr(pack.states)[sb.d.state]||{}).name:"?"],["Pop",sb.d.population?Math.round(sb.d.population*1000).toLocaleString():"?"],["Features",[sb.d.capital?"Capital":"",sb.d.port?"Port":"",sb.d.citadel?"Citadel":"",sb.d.walls?"Walled":""].filter(Boolean).join(", ")||"None"]].map(([k,v],i)=>v?<div key={i} style={{marginBottom:6}}><div style={{fontSize:10,color:T.goldD,textTransform:"uppercase"}}>{k}</div><div style={{fontSize:13,color:T.txM}}>{v}</div></div>:null)}</div>}
        <Btn sm v="a" style={{marginTop:12}} onClick={()=>{const aid=sb.type==="state"?"politics":"locations";const pre="azg-"+(sb.type==="state"?"state":"loc")+"-"+(sb.d.i||0);onSelectEntity(aid,pre);}}>View Card</Btn>
      </div>}
    </div></div>);
}

// === APP ===
function App(){
  const[scr,setScr]=useState("main");const[worlds,setWorlds]=useState([]);const[wDescs,setWDescs]=useState({});
  const[cW,setCW]=useState(null);const[cA,setCA]=useState(null);const[cC,setCC]=useState(null);
  const[cList,setCList]=useState([]);const[topicList,setTopicList]=useState([]);const[curTopic,setCurTopic]=useState(null);
  const[compiledLore,setCompiledLore]=useState("");const[loadingLore,setLoadingLore]=useState(false);
  const[inp,setInp]=useState("");const[busy,setBusy]=useState(false);const[toast,setToast]=useState("");
  const[gen,setGen]=useState(false);const[wc,setWc]=useState(false);
  const[impTxt,setImpTxt]=useState("");const[mod,setMod]=useState(null);const[modIn,setModIn]=useState("");const[modIn2,setModIn2]=useState("");
  const[bibleData,setBibleData]=useState(null);const[apiKeyInput,setApiKeyInput]=useState("");const[hasKey,setHasKey]=useState(false);
  const[providerSel,setProviderSel]=useState("claude");const[customEndpoint,setCustomEndpoint]=useState("");
  const[aspCounts,setAspCounts]=useState({});const[aspChats,setAspChats]=useState({});
  const[tagFilter,setTagFilter]=useState("");const[allTags,setAllTags]=useState([]);const[tagInput,setTagInput]=useState("");
  const[mapSvg,setMapSvg]=useState(null);const[mapPack,setMapPack]=useState(null);const[hasMapData,setHasMapData]=useState(false);
  const[scanResults,setScanResults]=useState(null);const[scanNotif,setScanNotif]=useState("");
  const endRef=useRef(null);const svgFileRef=useRef(null);const jsonFileRef=useRef(null);const mapFileRef=useRef(null);

  const flash=m=>{setToast(m);setTimeout(()=>setToast(""),3000);};
  const ldW=useCallback(async()=>{const ws=await db.listWorlds();setWorlds(ws);const d={};for(const w of ws)d[w.id]=w.description||await db.getWorldSummary(w.id);setWDescs(d);},[]);
  useEffect(()=>{ldW();(async()=>{const k=await db.getApiKey();if(k)setHasKey(true);const p=await db.getProvider();setProviderSel(p);const ce=await db.getCustomEndpoint();setCustomEndpoint(ce);})();},[]);
  useEffect(()=>{if(scr==="chat")endRef.current?.scrollIntoView({behavior:"smooth"});},[cC?.messages?.length,scr]);

  const loadAspCounts=async wid=>{const c={},ch={};for(const a of ASPECTS){c[a.id]=await db.countTopics(wid,a.id);ch[a.id]=(await db.listChats(wid,a.id)).length;}ch["__worldchat__"]=(await db.listChats(wid,"__worldchat__")).length;setAspCounts(c);setAspChats(ch);setHasMapData(await db.hasMap(wid));};

  const goMain=()=>{setScr("main");setCW(null);setCA(null);setCC(null);setCurTopic(null);setGen(false);setWc(false);setMapSvg(null);setMapPack(null);};
  const goWorlds=async()=>{await ldW();setScr("worlds");};
  const goWorld=async w=>{setCW(w);setCA(null);setCC(null);setCurTopic(null);setWc(false);await loadAspCounts(w.id);setScr("world");};
  const goAspect=async a=>{setCA(a);setTopicList(await db.listTopics(cW.id,a.id));setCList(await db.listChats(cW.id,a.id));setTagFilter("");setAllTags(await db.listAllTags(cW.id));setScr("aspect");};
  const goChat=async(ch,g=false,w=false)=>{const wid=g?"__general__":cW.id;const aid=g?"__general__":(w?"__worldchat__":cA.id);const full=await db.loadChat(wid,aid,ch.id);if(full){setCC(full);setGen(g);setWc(w);setScr("chat");}};
  const goGen=async()=>{setCList(await db.listGeneralChats());setGen(true);setWc(false);setCW(null);setCA(null);setScr("general");};
  const goWorldChat=async()=>{setCList(await db.listChats(cW.id,"__worldchat__"));setWc(true);setGen(false);setScr("worldchatlist");};
  const goMap=async()=>{setBusy(true);setMapSvg(await db.getMapSvg(cW.id));setMapPack(await db.getMapPack(cW.id));setBusy(false);setScr("mapview");};

  const openNewWorld=()=>{setModIn("");setModIn2("");setMod({t:"nw"});};
  const doNewWorld=async()=>{const n=modIn.trim();setMod(null);if(!n)return;if(worlds.length>=MAX_WORLDS){flash("Max "+MAX_WORLDS);return;}const w=await db.createWorld(n,modIn2.trim());flash("Created: "+n);await ldW();goWorld(w);};
  const deleteWorld=async wid=>{await db.deleteWorld(wid);flash("Deleted");await ldW();goMain();};

  // === File handlers ===
  const handleSvgFile=async e=>{const f=e.target.files[0];if(!f||!cW)return;setBusy(true);const t=await f.text();await db.saveMapSvg(cW.id,t);await loadAspCounts(cW.id);flash("Map loaded!");setMod(null);setBusy(false);if(svgFileRef.current)svgFileRef.current.value="";};
  const handleJsonFile=async e=>{const f=e.target.files[0];if(!f||!cW)return;setBusy(true);flash("Parsing...");
    const t=await f.text();const r=await db.importJsonExport(cW.id,t);
    if(r.error){flash("Error: "+r.error);console.error(r);}else{flash(r.added+" topics from "+r.total+" entities");await loadAspCounts(cW.id);setMod(null);}
    setBusy(false);if(jsonFileRef.current)jsonFileRef.current.value="";};
  const handleMapFile=async e=>{const f=e.target.files[0];if(!f||!cW)return;setBusy(true);flash("Parsing .map...");
    const t=await f.text();const r=await db.importAzgaarMap(cW.id,t);console.log("Map debug:",r.debug);
    if(r.error){flash("Error: "+r.error);}else{flash(r.added+" topics from "+r.total);await loadAspCounts(cW.id);setMod(null);}
    setBusy(false);if(mapFileRef.current)mapFileRef.current.value="";};

  // === Scan topics ===
  const scanAspect=async(wid,aspect,showReview)=>{
    const text=await db.gatherAspectText(wid,aspect.id);
    // Also gather from world chat
    const wcText=await db.gatherAspectText(wid,"__worldchat__");
    const combined=(text+"\n"+wcText).trim();
    if(!combined){return{added:0,name:aspect.name};}
    const sys=window.buildExtractPrompt(aspect);
    const resp=await aiCall(sys,[{role:"user",content:combined.slice(0,12000)}],2048);
    let parsed=[];
    try{const c=resp.trim().replace(/^```\w*\n?/,"").replace(/\n?```$/,"");const a=c.match(/\[[\s\S]*\]/);parsed=a?JSON.parse(a[0]):[];}
    catch(e){return{added:0,name:aspect.name,error:"parse"};}
    if(showReview){return{parsed,name:aspect.name};}
    // Auto-save
    const existing=await db.listTopics(wid,aspect.id);const byName={};existing.forEach(t=>byName[t.name.toLowerCase()]=t);
    let added=0;
    for(const p of parsed){const key=p.name?.toLowerCase();if(!key)continue;
      if(byName[key]){const old=byName[key];await db.saveTopic({...old,brief:p.brief||old.brief,tags:normTags([...(old.tags||[]),...(p.tags||[])]),hist_type:p.hist_type||old.hist_type});}
      else{await db.saveTopic({id:mkId(),name:p.name,brief:p.brief||"",template:TMPL_FOR[aspect.id]||"culture",tags:normTags(p.tags||[]),hist_type:p.hist_type||"general",fields:{},aspect_id:aspect.id,world_id:wid,created:new Date().toISOString(),updated:new Date().toISOString()});added++;}
    }
    return{added,name:aspect.name};
  };

  const scanCurrentAspect=async()=>{
    if(!cW||!cA)return;setBusy(true);
    const r=await scanAspect(cW.id,cA,true);
    setBusy(false);
    if(r.parsed){setScanResults(r.parsed);setMod({t:"review"});}
    else flash("Nothing found");
  };

  const saveScanResults=async()=>{
    if(!scanResults||!cW||!cA)return;
    const existing=await db.listTopics(cW.id,cA.id);const byName={};existing.forEach(t=>byName[t.name.toLowerCase()]=t);
    let added=0;
    for(const p of scanResults){if(!p._accept)continue;const key=p.name?.toLowerCase();if(!key)continue;
      if(byName[key]){const old=byName[key];await db.saveTopic({...old,brief:p.brief||old.brief,tags:normTags([...(old.tags||[]),...(p.tags||[])]),hist_type:p.hist_type||old.hist_type});}
      else{await db.saveTopic({id:mkId(),name:p.name,brief:p.brief||"",template:TMPL_FOR[cA.id]||"culture",tags:normTags(p.tags||[]),hist_type:p.hist_type||"general",fields:{},aspect_id:cA.id,world_id:cW.id,created:new Date().toISOString(),updated:new Date().toISOString()});added++;}
    }
    setTopicList(await db.listTopics(cW.id,cA.id));await loadAspCounts(cW.id);
    flash("+"+added+" saved");setMod(null);setScanResults(null);
  };

  const scanAll=async()=>{
    if(!cW)return;setBusy(true);setScanNotif("Scanning all categories...");
    let total=0;
    for(const a of ASPECTS){setScanNotif("Scanning "+a.name+"...");const r=await scanAspect(cW.id,a,false);total+=r.added||0;}
    await loadAspCounts(cW.id);setScanNotif("");setBusy(false);flash("Scan complete: +"+total+" new entries");
  };

  // Auto-scan on chat exit
  const exitChat=async()=>{
    const prevAspect=cA;const prevWorld=cW;
    if(!gen&&!wc&&prevWorld&&prevAspect&&cC?.messages?.length>1){
      setScanNotif("Auto-scanning "+prevAspect.name+"...");
      setTimeout(async()=>{await scanAspect(prevWorld.id,prevAspect,false);await loadAspCounts(prevWorld.id);setScanNotif("Scan complete");setTimeout(()=>setScanNotif(""),2000);},100);
    }
    setCC(null);setScr(gen?"general":(wc?"worldchatlist":"aspect"));
  };

  // Compile lore for topic
  const compileLore=async()=>{
    if(!curTopic||!cW)return;setLoadingLore(true);
    const allText=await db.gatherAllText(cW.id);
    const sys=window.buildLorePrompt(curTopic.name,cW.name);
    const resp=await aiCall(sys,[{role:"user",content:allText.slice(0,15000)}],2048);
    setCompiledLore(resp);setLoadingLore(false);
  };

  // Chat send
  const send=async()=>{
    if(!inp.trim()||busy)return;const txt=inp.trim();setInp("");
    const chat={...cC,messages:[...(cC.messages||[]),{role:"user",content:txt,timestamp:new Date().toISOString()}]};
    setCC(chat);setBusy(true);const aIds=ASPECTS.map(a=>a.id).join(", ");
    let sys;
    if(gen){const wl=worlds.map(w=>w.name).join(", ");sys=CAT_RULES+"\n\nYou are WorldForge in General Chat.\nWorlds: "+(wl||"None")+"\nAfter your response, add [FILE: World > aspect-id] lines to categorize.\nIDs: "+aIds;}
    else if(wc){const bible=await db.getBible(cW.id);const bt=Object.entries(bible.facts||{}).map(([c,e])=>"["+c+"] "+Object.entries(e).map(([k,v])=>k+":"+v).join(", ")).join("\n");sys=CAT_RULES+"\n\nWorldForge for \""+cW.name+"\" open discussion.\nBIBLE: "+(bt||"empty")+"\nAfter your response add [CAT: aspect-id] lines.\nIDs: "+aIds;}
    else{const bible=await db.getBible(cW.id);const bt=Object.entries(bible.facts||{}).map(([c,e])=>"["+c+"] "+Object.entries(e).map(([k,v])=>k+":"+v).join(", ")).join("\n");sys="You are WorldForge for \""+cW.name+"\" | \""+cA.name+"\".\nBIBLE: "+(bt||"empty")+"\nBe creative and detailed. Suggest /addfact for new lore.";}
    let resp=await aiCall(sys,chat.messages);const filed=[];
    if(gen){const fp=/\[FILE:\s*(.+?)\s*>\s*(.+?)\]\s*(.+?)(?:\n|$)/g;let m;while((m=fp.exec(resp))!==null){const w=worlds.find(w=>w.name.toLowerCase().includes(m[1].toLowerCase().trim()));const a=ASPECTS.find(a=>a.id===m[2].trim()||a.name.toLowerCase().includes(m[2].toLowerCase().trim()));if(w&&a){await db.fileNote(w.id,a.id,m[3].trim());filed.push(w.name+" > "+a.name);}}resp=resp.replace(fp,"").trim();}
    if(wc){const cp=/\[CAT:\s*(.+?)\]\s*(.+?)(?:\n|$)/g;let m;while((m=cp.exec(resp))!==null){const a=ASPECTS.find(a=>a.id===m[1].trim()||a.name.toLowerCase().includes(m[1].toLowerCase().trim()));if(a){await db.fileNote(cW.id,a.id,m[2].trim());filed.push(cW.name+" > "+a.name);}}resp=resp.replace(cp,"").trim();}
    const aiMsg={role:"assistant",content:resp,timestamp:new Date().toISOString()};if(filed.length)aiMsg._filed=filed;
    const upd={...chat,messages:[...chat.messages,aiMsg]};setCC(upd);await db.saveChat(upd);setBusy(false);
  };

  const doExport=async()=>{const data=await db.exportAll();const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="worldforge-export.json";a.click();URL.revokeObjectURL(url);flash("Exported!");};
  const doImport=async()=>{if(!impTxt.trim())return;try{const d=JSON.parse(impTxt);const c=await db.importAll(d);flash("Imported "+c.worlds+"w "+c.chats+"c "+c.topics+"t");setImpTxt("");await ldW();setScr("settings");}catch(e){flash("Invalid JSON");}};
  const saveSettings=async()=>{const k=apiKeyInput.trim();if(k){await db.setApiKey(k);setHasKey(true);}else{await db.setApiKey(null);setHasKey(false);}await db.setProvider(providerSel);await db.setCustomEndpoint(customEndpoint);flash("Settings saved");};
  const openBible=async()=>{if(!cW)return;const b=await db.getBible(cW.id);setBibleData(b.facts||{});setMod({t:"bible"});};
  const openFact=()=>{setModIn("");setMod({t:"fact"});};
  const doFact=async()=>{const r=modIn.trim();setMod(null);if(!r||!cW)return;const m=r.match(/(.+?)\s*-\s*(.+?):\s*(.+)/);if(m){const ok=await db.addFact(cW.id,m[1].trim(),m[2].trim(),m[3].trim());if(ok)flash("Added to Bible");else flash("Failed");}else flash("Format: category - key: value");};
  const openNote=()=>{setModIn("");setMod({t:"note1"});};
  const doNote1=()=>{const r=modIn.trim();if(!r||!r.includes(">")){flash("World > Aspect");return;}const[ws,as]=r.split(">");const w=worlds.find(w=>w.name.toLowerCase().includes(ws.trim().toLowerCase()));const a=ASPECTS.find(a=>a.name.toLowerCase().includes(as.trim().toLowerCase())||a.id.includes(as.trim().toLowerCase()));if(!w||!a){flash("Not found");return;}setMod({t:"note2",w,a});setModIn("");};
  const doNote2=async()=>{const n=modIn.trim();if(!n||!mod?.w||!mod?.a){setMod(null);return;}await db.fileNote(mod.w.id,mod.a.id,n);flash("Filed");setMod(null);};

  const filteredTopics=tagFilter?topicList.filter(t=>(t.tags||[]).includes(tagFilter)):topicList;

  const S=ch=>(<div style={{height:"100%",background:T.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>{ch}
    {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:T.card,border:"1px solid "+T.gold+"44",color:T.gold,padding:"10px 24px",borderRadius:10,fontSize:13,zIndex:100}}>{toast}</div>}
    {scanNotif&&<div style={{position:"fixed",top:12,left:"50%",transform:"translateX(-50%)",background:T.accent,color:T.tx,padding:"8px 20px",borderRadius:8,fontSize:12,zIndex:100}}>{scanNotif}</div>}
    {/* Modals */}
    <Modal open={mod?.t==="nw"} title="Create World" onClose={()=>setMod(null)}><input autoFocus value={modIn} onChange={e=>setModIn(e.target.value)} placeholder="World name..." style={{...iS,marginBottom:10}}/><textarea value={modIn2} onChange={e=>setModIn2(e.target.value)} placeholder="Description..." rows={2} style={{...iS,resize:"vertical"}}/><div style={{display:"flex",gap:8,marginTop:14}}><Btn full onClick={doNewWorld} disabled={!modIn.trim()}>Create</Btn><Btn v="s" onClick={()=>setMod(null)}>Cancel</Btn></div></Modal>
    <Modal open={mod?.t==="fact"} title="Add to Bible" onClose={()=>setMod(null)}><div style={{fontSize:12,color:T.txD,marginBottom:8}}>category - key: value</div><input autoFocus value={modIn} onChange={e=>setModIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doFact()} placeholder="characters - Kael: Former soldier" style={iS}/><div style={{display:"flex",gap:8,marginTop:12}}><Btn full onClick={doFact} disabled={!modIn.trim()}>Add</Btn><Btn v="s" onClick={()=>setMod(null)}>Cancel</Btn></div></Modal>
    <Modal open={mod?.t==="note1"} title="File Note" onClose={()=>setMod(null)}><input autoFocus value={modIn} onChange={e=>setModIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doNote1()} placeholder="World > Aspect" style={iS}/><div style={{display:"flex",gap:8,marginTop:12}}><Btn full onClick={doNote1} disabled={!modIn.trim()}>Next</Btn><Btn v="s" onClick={()=>setMod(null)}>Cancel</Btn></div></Modal>
    <Modal open={mod?.t==="note2"} title={"→ "+(mod?.w?.name||"")+" > "+(mod?.a?.name||"")} onClose={()=>setMod(null)}><textarea autoFocus value={modIn} onChange={e=>setModIn(e.target.value)} placeholder="Note..." rows={3} style={{...iS,resize:"vertical"}}/><div style={{display:"flex",gap:8,marginTop:12}}><Btn full onClick={doNote2} disabled={!modIn.trim()}>File</Btn><Btn v="s" onClick={()=>setMod(null)}>Cancel</Btn></div></Modal>
    <Modal open={mod?.t==="bible"} title={(cW?.name||"")+" Bible"} onClose={()=>setMod(null)} wide>{bibleData&&Object.keys(bibleData).length>0?<div style={{maxHeight:500,overflowY:"auto"}}>{Object.entries(bibleData).map(([cat,ent])=>(<div key={cat} style={{marginBottom:14}}><div style={{fontSize:14,fontWeight:600,color:T.gold,textTransform:"capitalize"}}>{cat.replace(/-/g,' ')}</div>{Object.entries(ent).map(([k,v])=><div key={k} style={{fontSize:13,color:T.txM,paddingLeft:14}}>{k}: {v}</div>)}</div>))}</div>:<div style={{color:T.txD}}>Bible is empty. Use the chat to build lore, then /addfact or the 📝 button.</div>}<Btn full v="s" onClick={()=>setMod(null)} style={{marginTop:14}}>Close</Btn></Modal>
    <Modal open={mod?.t==="delAll"} title="Delete Everything?" onClose={()=>setMod(null)}><div style={{display:"flex",gap:8}}><Btn full v="d" onClick={async()=>{setMod(null);await IDB.clear();await ldW();flash("Deleted");goMain();}}>Delete All</Btn><Btn full v="s" onClick={()=>setMod(null)}>Cancel</Btn></div></Modal>
    <Modal open={mod?.t==="mapImport"} title={"Import Map — "+(cW?.name||"")} onClose={()=>setMod(null)} wide>
      <div style={{display:"flex",gap:16,marginBottom:20}}>
        <div style={{flex:1,padding:20,background:T.bg,borderRadius:10,border:"1px solid "+T.bd}}>

      {providerSel==="custom"&&<input value={customEndpoint} onChange={e=>setCustomEndpoint(e.target.value)} placeholder="https://api.example.com/v1/chat/completions" style={{...iS,maxWidth:400,marginBottom:12}}/>}
      <div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:8,marginTop:16,textTransform:"uppercase",letterSpacing:1}}>API Key</div>
      <input type="password" value={apiKeyInput} onChange={e=>setApiKeyInput(e.target.value)} placeholder={providerSel==="claude"?"sk-ant-api03-...":providerSel==="deepseek"?"sk-...":"API key"} style={{...iS,fontFamily:"monospace",fontSize:13,maxWidth:400}}/>
      <div style={{display:"flex",gap:8,marginTop:10}}><Btn onClick={saveSettings}>Save</Btn>{hasKey&&<Btn v="s" onClick={async()=>{setApiKeyInput("");await db.setApiKey(null);setHasKey(false);flash("Removed");}}>Remove</Btn>}</div>
      <div style={{fontSize:11,color:T.txD,marginTop:8}}>{hasKey?"✅ Saved. Provider: "+providerSel:"⚠️ No key."}</div>
      <div style={{borderTop:"1px solid "+T.bd,marginTop:24,paddingTop:20}}><div style={{fontSize:13,fontWeight:600,color:T.gold,marginBottom:12,textTransform:"uppercase",letterSpacing:1}}>Data</div><div style={{display:"flex",gap:10}}><Btn v="s" onClick={doExport}>📤 Export</Btn><Btn v="s" onClick={()=>setScr("import")}>📥 Import</Btn><Btn v="d" onClick={()=>setMod({t:"delAll"})}>🗑️</Btn></div></div>
      <div style={{marginTop:32,fontSize:11,color:T.txD,lineHeight:1.6}}>WorldForge Desktop v4{"\n"}Multi-provider AI · Azgaar Integration · 8+ Card Templates · Tags · Compiled Lore{"\n"}Auto-scan · Review-before-save · Category rules</div>
    </div></>);

  if(scr==="import")return S(<><div style={{padding:"16px 32px 12px",display:"flex",alignItems:"center",borderBottom:"1px solid "+T.bd}}><button onClick={()=>setScr("settings")} style={{background:"none",border:"none",color:T.gold,fontSize:22,cursor:"pointer",marginRight:16}}>{"‹"}</button><div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,color:T.gold}}>Import</div></div>
    <div style={{flex:1,overflowY:"auto",padding:"24px 32px",maxWidth:600}}><textarea value={impTxt} onChange={e=>setImpTxt(e.target.value)} placeholder="Paste JSON..." rows={14} style={{width:"100%",resize:"vertical",padding:14,borderRadius:8,border:"1px solid "+T.bd,background:T.sf,color:T.tx,fontSize:13,fontFamily:"monospace",outline:"none"}}/><div style={{display:"flex",gap:8,marginTop:12}}><Btn onClick={doImport}>Import</Btn><Btn v="s" onClick={()=>{setImpTxt("");setScr("settings");}}>Cancel</Btn></div></div></>);

  return S(<div style={{padding:40,textAlign:"center",color:T.txD}}>Loading...</div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
